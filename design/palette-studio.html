<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Palette Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
:root {
  --ink:    #1a1a1a;
  --muted:  #6a6a6a;
  --rule:   #d8d8d8;
  --card:   #ffffff;
  --page:   #eeeeee;
  --chip:   #f2f2f2;
  --accent: oklch(55% 0.14 260);
  --accent-text: #ffffff;
  color-scheme: light;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: "IBM Plex Mono", ui-monospace, monospace;
  font-size: 13px;
  line-height: 1.5;
  background: var(--page);
  color: var(--ink);
}

.toolbar {
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--card);
  border-bottom: solid 1px var(--rule);
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 10px 20px;
  flex-wrap: wrap;
}
.toolbar .title {
  font-weight: 500;
  font-size: 14px;
  margin-right: auto;
}
.toolbar .title small { color: var(--muted); font-weight: 400; margin-left: 8px; }

.hue-group {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--muted);
}
.hue-group label {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.hue-group input[type="range"] { width: 140px; }
.hue-group .hue-swatch {
  width: 16px; height: 16px; border-radius: 3px; border: solid 1px var(--rule);
}
.hue-group output {
  font-variant-numeric: tabular-nums;
  min-width: 3ch;
  text-align: right;
}

button.primary, button.ghost {
  appearance: none;
  font: inherit;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 5px;
  border: 0;
  cursor: pointer;
}
button.primary { background: var(--accent); color: var(--accent-text); }
button.primary:hover { filter: brightness(1.1); }
button.ghost { background: transparent; color: var(--muted); padding: 4px 8px; font-size: 11px; }
button.ghost:hover { color: var(--ink); background: var(--chip); }

main { padding: 16px 20px 40px; display: flex; flex-direction: column; gap: 16px; }

.candidate {
  background: var(--card);
  border: solid 1px var(--rule);
  border-radius: 8px;
  padding: 14px 18px;
  display: grid;
  gap: 12px;
}
.candidate header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.candidate h2 {
  font-size: 13px;
  font-weight: 500;
}
.candidate .notes { color: var(--muted); font-size: 11px; }
.candidate .badges { display: flex; gap: 6px; flex-wrap: wrap; }
.candidate .badge {
  font-size: 10px;
  color: var(--muted);
  padding: 1px 7px;
  border: solid 1px var(--rule);
  border-radius: 10px;
  font-variant-numeric: tabular-nums;
}
.candidate .actions {
  margin-left: auto;
  display: flex;
  gap: 4px;
}

.mocks {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr);
  gap: 0 10px;
  height: 42dvh;
  min-height: 360px;
}
.role-col {
  display: flex;
  flex-direction: column;
  gap: 3px;
  width: 48px;
}
.role-col .col-label {
  font-size: 9px;
  color: var(--muted);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding-bottom: 2px;
  line-height: 1.1;
}
.role-col .role-chip {
  position: relative;
  flex: 1;
  min-height: 14px;
  border-radius: 3px;
  border: solid 1px rgba(0, 0, 0, 0.08);
  cursor: help;
}
.role-col .role-chip[data-alpha] {
  background-image:
    linear-gradient(45deg, rgba(0, 0, 0, 0.08) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(0, 0, 0, 0.08) 25%, transparent 25%);
  background-size: 8px 8px;
}
.role-col .role-chip::after {
  content: attr(data-label);
  position: absolute;
  left: 50%;
  bottom: 100%;
  transform: translate(-50%, -4px);
  background: rgba(0, 0, 0, 0.8);
  color: #fff;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 100ms ease;
}
.role-col .role-chip:hover::after { opacity: 1; }

.preview {
  position: relative;
  display: flex;
  flex-direction: column;
  border: solid 1px var(--rule);
  border-radius: 6px;
  overflow: hidden;
}
.preview .preview-label {
  padding: 4px 6px 4px 10px;
  font-size: 10px;
  color: var(--muted);
  background: var(--card);
  border-bottom: solid 1px var(--rule);
  display: flex;
  align-items: center;
  gap: 8px;
}
.preview .preview-label .theme { text-transform: uppercase; letter-spacing: 0.08em; }
.preview .preview-label .spacer { margin-left: auto; }
.preview .interact-toggle {
  appearance: none;
  font: inherit;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
  border: solid 1px var(--rule);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
}
.preview .interact-toggle:hover { color: var(--ink); }
.preview.interactive .interact-toggle {
  background: var(--accent);
  color: var(--accent-text);
  border-color: transparent;
}
.preview iframe {
  flex: 1;
  width: 100%;
  border: 0;
  pointer-events: none;
}
.preview.interactive iframe { pointer-events: auto; }
.preview.interactive { outline: solid 2px var(--accent); outline-offset: -2px; }

.overlay {
  position: fixed; inset: 0; z-index: 10;
  background: rgba(30, 30, 30, 0.55);
  display: none;
}
.overlay.open { display: block; }
.overlay .frame-wrap {
  position: absolute;
  inset: 16px;
  background: #111;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.overlay .frame-wrap iframe { flex: 1; width: 100%; border: 0; }
.overlay .overlay-close {
  position: absolute;
  top: 8px; right: 10px;
  z-index: 1;
  font-size: 18px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.6);
  color: #fff;
  border: 0; cursor: pointer; line-height: 1;
}
.overlay .overlay-close:hover { background: rgba(0, 0, 0, 0.8); }
.overlay .overlay-hint {
  position: absolute; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255, 255, 255, 0.75);
  font-size: 11px;
  background: rgba(0, 0, 0, 0.45);
  padding: 4px 10px; border-radius: 4px;
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="title">Palette Studio <small>only the color system varies between candidates — hues + role mapping are studio-wide</small></div>

  <div class="hue-group" id="global-hue">
    <label>
      surface hue
      <input type="range" id="global-surface-hue" min="0" max="359" value="162" step="1">
      <output for="global-surface-hue">162</output>
      <span class="hue-swatch" id="global-surface-swatch"></span>
    </label>
    <label>
      accent hue
      <input type="range" id="global-accent-hue" min="0" max="359" value="162" step="1">
      <output for="global-accent-hue">162</output>
      <span class="hue-swatch" id="global-accent-swatch"></span>
    </label>
  </div>

  <button class="primary" id="open-designer">+ New system</button>
</div>

<main id="gallery"></main>

<div class="overlay" id="designer-overlay" aria-hidden="true">
  <div class="frame-wrap">
    <button class="overlay-close" id="overlay-close" aria-label="Close designer">×</button>
    <iframe id="designer-iframe" title="Color System Designer"></iframe>
    <div class="overlay-hint">Esc to close · click <strong>Save as candidate</strong> in the designer to add it to the gallery</div>
  </div>
</div>

<script type="module">
import {
  cssAtGrid, cssAtGridDark,
  cssAtArc,  cssAtArcDark,
} from "./palette.js";

/*
 * CONCEPTUAL MODEL
 *
 *   system      = hue-agnostic shape. Only this varies between
 *                 candidates. For "grid": {kind, space, N}.
 *                 Defines what coordinates exist at any hue.
 *
 *   Studio-wide (not per candidate):
 *     hues     — surface + accent brand choices
 *     ROLE_MAP — semantic role → scale + coord
 *
 *   A role entry's coord is stored in LIGHT-MODE convention.
 *   Dark mode auto-flips W and B (keeps C); {i, k} → (N - i - k, k).
 */

const LS_KEY = "palette-studio.candidates";
const LS_HUES = "palette-studio.hues";

// Ordered list — drives the role chip display. Surface roles first.
const ROLE_ORDER = [
  "--color-bg-base",
  "--color-bg-raised",
  "--color-bg-panel",
  "--color-bg-hover",
  "--color-input-bg",
  "--color-border-subtle",
  "--color-border-strong",
  "--color-text-tertiary",
  "--color-text-secondary",
  "--color-text-primary",
  "--color-accent",
  "--color-accent-subtle",
  "--color-accent-text",
  "--color-toggle-track",
  "--color-toggle-thumb",
  "--color-toggle-icon",
  "--color-glyph-bg",
  "--color-focus",
];

// Shared role mapping — the SAME for all candidates.
// Each entry carries BOTH a grid coord and an arc coord, pre-authored
// so they address the same target color. Candidates pick the matching
// field based on their system's kind.
//
//   grid: { iFrac, kFrac } — higher iFrac = more white, higher kFrac = more pure
//   arc:  { peakFrac, stepFrac } — peakFrac = chroma pull, stepFrac = 0 (W) → 1 (B)
//
// On the greyscale edge (kFrac = 0): arc peakFrac = 0, stepFrac = 1 - iFrac.
// For interior points, arc's stepFrac = (1 - iFrac - kFrac) / (1 - kFrac),
// and peakFrac = kFrac / (4 * stepFrac * (1 - stepFrac)).
const ROLE_MAP = {
  "--color-bg-base":        { scale: "surface", grid: { iFrac: 1.0, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.0 } },
  "--color-bg-raised":      { scale: "surface", grid: { iFrac: 0.9, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.1 } },
  "--color-bg-panel":       { scale: "surface", grid: { iFrac: 0.8, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.2 } },
  "--color-bg-hover":       { scale: "surface", grid: { iFrac: 0.7, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.3 } },
  "--color-input-bg":       { scale: "surface", grid: { iFrac: 0.7, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.3 } },
  "--color-border-subtle":  { scale: "surface", grid: { iFrac: 0.5, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.5 } },
  "--color-border-strong":  { scale: "surface", grid: { iFrac: 0.3, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.7 } },
  "--color-text-tertiary":  { scale: "surface", grid: { iFrac: 0.2, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.8 } },
  "--color-text-secondary": { scale: "surface", grid: { iFrac: 0.1, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.9 } },
  "--color-text-primary":   { scale: "surface", grid: { iFrac: 0.0, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 1.0 } },
  "--color-accent":         { scale: "accent",  grid: { iFrac: 0.3, kFrac: 0.5 }, arc: { peakFrac: 0.52, stepFrac: 0.4 } },
  "--color-accent-subtle":  { scale: "accent",  grid: { iFrac: 0.8, kFrac: 0.1 }, arc: { peakFrac: 0.125, stepFrac: 0.11 } },
  "--color-accent-text":    { scale: "surface", grid: { iFrac: 1.0, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.0 } },
  "--color-toggle-track":   { scale: "surface", grid: { iFrac: 0.8, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.2 } },
  "--color-toggle-thumb":   { scale: "surface", grid: { iFrac: 0.3, kFrac: 0.5 }, arc: { peakFrac: 0.52, stepFrac: 0.4 } },
  "--color-toggle-icon":    { scale: "surface", grid: { iFrac: 1.0, kFrac: 0.0 }, arc: { peakFrac: 0.0, stepFrac: 0.0 } },
  "--color-glyph-bg":       { scale: "accent",  grid: { iFrac: 0.3, kFrac: 0.5 }, arc: { peakFrac: 0.52, stepFrac: 0.4 }, alpha: 0.06 },
  "--color-focus":          { scale: "accent",  grid: { iFrac: 0.3, kFrac: 0.5 }, arc: { peakFrac: 0.52, stepFrac: 0.4 }, alpha: 0.45 },
};

function loadCandidates() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) return parsed;
    }
  } catch (e) {}
  return [
    {
      id: "grid-n10",
      name: "grid · oklch · N=10",
      notes: "Ternary grid. Roles addressable by (i, k).",
      system: { kind: "grid", space: "oklch", N: 10 },
    },
    {
      id: "grid-n6",
      name: "grid · oklch · N=6",
      notes: "Coarser grid — fewer in-between stops, colors snap harder.",
      system: { kind: "grid", space: "oklch", N: 6 },
    },
    {
      id: "arc-a11-n11",
      name: "arc · oklch · 11 arcs × 11 stops",
      notes: "Family of tonal arcs. Roles addressable by (peakFrac, stepFrac).",
      system: { kind: "arc", space: "oklch", arcCount: 11, arcN: 11 },
    },
    {
      id: "arc-a5-n9",
      name: "arc · oklch · 5 arcs × 9 stops",
      notes: "Coarser arc family.",
      system: { kind: "arc", space: "oklch", arcCount: 5, arcN: 9 },
    },
  ];
}

function saveCandidates() {
  localStorage.setItem(LS_KEY, JSON.stringify(candidates));
}

function loadHues() {
  try {
    const raw = localStorage.getItem(LS_HUES);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { surface: 162, accent: 162 };
}

function saveHues() {
  localStorage.setItem(LS_HUES, JSON.stringify(hues));
}

const candidates = loadCandidates();
const hues = loadHues();

// ─── CSS generation — system + shared role map + shared hues ────

// Given a role, produce a {light, dark, labelBits} triple for the
// candidate's system. Branches on system.kind.
function resolveRole(role, system, hueSurface, hueAccent) {
  const hue = role.scale === "accent" ? hueAccent : hueSurface;
  const { alpha } = role;

  if (system.kind === "grid") {
    const { N } = system;
    const i = Math.round(role.grid.iFrac * N);
    const kRaw = Math.round(role.grid.kFrac * N);
    const k = Math.min(kRaw, N - i);
    return {
      light: cssAtGrid({ i, k, N, hue, alpha }),
      dark:  cssAtGridDark({ i, k, N, hue, alpha }),
      label: `i=${i} k=${k}`,
    };
  }

  if (system.kind === "arc") {
    const { arcCount, arcN } = system;
    const { peakFrac, stepFrac } = role.arc;
    const a = Math.round(peakFrac * (arcCount - 1));
    const j = Math.round(stepFrac * (arcN - 1));
    return {
      light: cssAtArc({ peakFrac, stepFrac, arcCount, arcN, hue, alpha }),
      dark:  cssAtArcDark({ peakFrac, stepFrac, arcCount, arcN, hue, alpha }),
      label: `a=${a} j=${j}`,
    };
  }

  return { light: "", dark: "", label: "" };
}

// Returns { lightCss, darkCss, roleColors: { name: { light, dark, label, role } } }
function resolveCandidate(cand) {
  const { system } = cand;
  if (!system) return { lightCss: "", darkCss: "", roleColors: {} };

  const roleColors = {};
  const lightLines = [];
  const darkLines = [];

  for (const name of ROLE_ORDER) {
    const role = ROLE_MAP[name];
    if (!role) continue;
    const { light, dark, label } = resolveRole(role, system, hues.surface, hues.accent);
    lightLines.push(`  ${name}: ${light};`);
    darkLines.push(`  ${name}: ${dark};`);
    roleColors[name] = { light, dark, label, role };
  }

  // style.css's default (no data-theme) is dark; [data-theme="light"] overrides.
  const lightCss = `[data-theme="light"] {\n${lightLines.join("\n")}\n}`;
  const darkCss = `:root {\n${darkLines.join("\n")}\n}`;
  return { lightCss, darkCss, roleColors };
}

function candidateOverridesCss(cand) {
  const { lightCss, darkCss } = resolveCandidate(cand);
  return `${darkCss}\n${lightCss}`;
}

// ─── Gallery rendering ───────────────────────────────────────────

const gallery = document.getElementById("gallery");

function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") node.className = v;
    else if (k === "style") node.setAttribute("style", v);
    else if (k.startsWith("data-")) node.setAttribute(k, v);
    else node[k] = v;
  }
  for (const c of children) {
    if (c == null) continue;
    node.append(c.nodeType ? c : document.createTextNode(c));
  }
  return node;
}

function roleShortLabel(name) {
  return name.replace(/^--color-/, "").replace(/-/g, " ");
}

function renderCandidate(cand) {
  const section = el("section", { class: "candidate", id: `c-${cand.id}` });

  const header = el("header", {},
    el("h2", {}, cand.name),
    el("span", { class: "notes" }, cand.notes || ""),
  );
  const badges = el("div", { class: "badges" });
  if (cand.system) {
    const sys = cand.system;
    badges.append(el("span", { class: "badge" }, `${sys.kind} · ${sys.space}`));
    if (sys.kind === "grid" && sys.N) {
      badges.append(el("span", { class: "badge" }, `N=${sys.N}`));
    }
    if (sys.kind === "arc") {
      badges.append(el("span", { class: "badge" }, `${sys.arcCount}×${sys.arcN}`));
    }
  }
  if (badges.children.length) header.append(badges);

  const actions = el("div", { class: "actions" });
  if (cand.id !== "baseline") {
    const delBtn = el("button", { class: "ghost", type: "button" }, "delete");
    delBtn.addEventListener("click", () => deleteCandidate(cand.id));
    actions.append(delBtn);
  }
  header.append(actions);
  section.append(header);

  const { roleColors } = resolveCandidate(cand);
  const mocks = el("div", { class: "mocks" });
  for (const theme of ["light", "dark"]) {
    const palette = el("div", { class: "role-col", "data-theme": theme });
    palette.append(el("div", { class: "col-label" }, "roles"));
    for (const name of ROLE_ORDER) {
      const role = ROLE_MAP[name];
      if (!role) continue;
      const info = roleColors[name];
      const chip = el("div", {
        class: "role-chip",
        "data-role": name,
        "data-theme": theme,
        "data-label": `${roleShortLabel(name)} · ${role.scale} ${info?.label ?? ""}`,
      });
      if (role.alpha != null) chip.setAttribute("data-alpha", role.alpha);
      palette.append(chip);
    }
    mocks.append(palette);

    const wrap = el("div", { class: "preview" });
    const label = el("div", { class: "preview-label" },
      el("span", { class: "theme" }, theme),
      el("span", { class: "spacer" }),
    );
    const interactBtn = el("button", {
      class: "interact-toggle",
      type: "button",
      title: "Toggle whether this iframe receives mouse/keyboard input",
    }, "interact");
    interactBtn.addEventListener("click", () => {
      const on = wrap.classList.toggle("interactive");
      interactBtn.textContent = on ? "locked" : "interact";
    });
    label.append(interactBtn);
    wrap.append(label);
    const iframe = el("iframe", {
      src: "/index.html",
      title: `${cand.name} / ${theme}`,
      loading: "lazy",
      "data-theme": theme,
      "data-candidate": cand.id,
    });
    iframe.addEventListener("load", () => applyToIframe(cand, iframe, theme, section));
    wrap.append(iframe);
    mocks.append(wrap);
  }
  section.append(mocks);

  return section;
}

function applyToIframe(cand, iframe, theme, section) {
  const doc = iframe.contentDocument;
  if (!doc) return;
  doc.documentElement.dataset.theme = theme;

  const css = candidateOverridesCss(cand);
  upsertStyle(doc, "palette-studio-candidate", css);

  requestAnimationFrame(() => paintRoleChips(cand, theme, section));
}

function paintRoleChips(cand, theme, section) {
  const { roleColors } = resolveCandidate(cand);
  const palette = section.querySelector(`.role-col[data-theme="${theme}"]`);
  if (!palette) return;
  for (const chip of palette.querySelectorAll(".role-chip")) {
    const name = chip.dataset.role;
    const colors = roleColors[name];
    if (!colors) continue;
    chip.style.background = theme === "light" ? colors.light : colors.dark;
  }
}

function upsertStyle(doc, id, css) {
  let el = doc.getElementById(id);
  if (!el) {
    el = doc.createElement("style");
    el.id = id;
    doc.head.appendChild(el);
  }
  el.textContent = css;
}

function refreshIframe(iframe, section, candId) {
  const cand = candidates.find(c => c.id === candId);
  if (!cand) return;
  const theme = iframe.dataset.theme;
  applyToIframe(cand, iframe, theme, section);
}

function refreshAllIframes() {
  for (const section of gallery.querySelectorAll(".candidate")) {
    for (const iframe of section.querySelectorAll("iframe")) {
      refreshIframe(iframe, section, iframe.dataset.candidate);
    }
  }
}

function addCandidate(cand) {
  candidates.push(cand);
  saveCandidates();
  gallery.append(renderCandidate(cand));
  sectionEl(cand.id).scrollIntoView({ behavior: "smooth", block: "start" });
}

function sectionEl(id) { return document.getElementById(`c-${id}`); }

function deleteCandidate(id) {
  if (!confirm("Delete this candidate?")) return;
  const i = candidates.findIndex(c => c.id === id);
  if (i < 0) return;
  candidates.splice(i, 1);
  saveCandidates();
  sectionEl(id)?.remove();
}

// ─── Hue toolbar (studio-wide, applies to every candidate) ──────
const surfaceInput = document.getElementById("global-surface-hue");
const accentInput = document.getElementById("global-accent-hue");
const surfaceOut = surfaceInput.nextElementSibling;
const accentOut = accentInput.nextElementSibling;
const surfaceSwatch = document.getElementById("global-surface-swatch");
const accentSwatch = document.getElementById("global-accent-swatch");

function renderHueUi() {
  surfaceInput.value = hues.surface;
  accentInput.value = hues.accent;
  surfaceOut.textContent = hues.surface;
  accentOut.textContent = hues.accent;
  surfaceSwatch.style.background = `oklch(60% 0.12 ${hues.surface})`;
  accentSwatch.style.background = `oklch(60% 0.18 ${hues.accent})`;
}

for (const [input, key] of [[surfaceInput, "surface"], [accentInput, "accent"]]) {
  input.addEventListener("input", () => {
    hues[key] = +input.value;
    renderHueUi();
    saveHues();
    refreshAllIframes();
  });
}
renderHueUi();

// ─── Designer overlay ───────────────────────────────────────────
const overlay = document.getElementById("designer-overlay");
const designerIframe = document.getElementById("designer-iframe");
const openDesignerBtn = document.getElementById("open-designer");
const closeBtn = document.getElementById("overlay-close");

let editingId = null;

function openDesigner(forCand = null) {
  editingId = forCand ? forCand.id : null;
  overlay.classList.add("open");
  overlay.setAttribute("aria-hidden", "false");
  designerIframe.src = "/design/color-triangle.html";

  if (forCand) {
    designerIframe.addEventListener("load", () => {
      designerIframe.contentWindow.postMessage({
        type: "designer:load",
        state: {
          space: forCand.system?.space,
          hue: hues.surface,
        },
      }, "*");
    }, { once: true });
  }
}

function closeDesigner() {
  overlay.classList.remove("open");
  overlay.setAttribute("aria-hidden", "true");
  designerIframe.src = "about:blank";
  editingId = null;
}

openDesignerBtn.addEventListener("click", () => openDesigner());
closeBtn.addEventListener("click", closeDesigner);
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeDesigner(); });
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && overlay.classList.contains("open")) closeDesigner();
});

// Incoming save from the designer — a new or updated SYSTEM.
// The designer's hue becomes the studio surface hue (convenience).
window.addEventListener("message", (ev) => {
  const msg = ev.data;
  if (!msg || msg.type !== "designer:save") return;

  // Adopt the designer's hue as the studio surface hue.
  if (typeof msg.state?.hue === "number") {
    hues.surface = Math.round(msg.state.hue);
    saveHues();
    renderHueUi();
  }

  const newSystem = { kind: "grid", space: msg.state?.space || "oklch", N: 10 };

  if (editingId) {
    const cand = candidates.find(c => c.id === editingId);
    if (cand) {
      cand.name = msg.name || cand.name;
      cand.system = newSystem;
      saveCandidates();
      const oldSection = sectionEl(cand.id);
      if (oldSection) {
        const fresh = renderCandidate(cand);
        oldSection.replaceWith(fresh);
      }
      refreshAllIframes();
      closeDesigner();
      return;
    }
  }

  const cand = {
    id: "c-" + Date.now().toString(36),
    name: msg.name,
    notes: "",
    system: newSystem,
  };
  addCandidate(cand);
  refreshAllIframes();
  closeDesigner();
});

// ─── Initial render ─────────────────────────────────────────────
for (const cand of candidates) gallery.append(renderCandidate(cand));
</script>
</body>
</html>
