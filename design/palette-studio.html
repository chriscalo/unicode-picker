<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Palette Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
:root {
  --ink:    #1a1a1a;
  --muted:  #6a6a6a;
  --rule:   #d8d8d8;
  --card:   #ffffff;
  --page:   #eeeeee;
  --chip:   #f2f2f2;
  --accent: oklch(55% 0.14 260);
  --accent-text: #ffffff;
  color-scheme: light;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: "IBM Plex Mono", ui-monospace, monospace;
  font-size: 13px;
  line-height: 1.5;
  background: var(--page);
  color: var(--ink);
}

.toolbar {
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--card);
  border-bottom: solid 1px var(--rule);
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 10px 20px;
  flex-wrap: wrap;
}
.toolbar .title {
  font-weight: 500;
  font-size: 14px;
  margin-right: auto;
}
.toolbar .title small { color: var(--muted); font-weight: 400; margin-left: 8px; }

.hue-group {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--muted);
}
.hue-group label {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.hue-group input[type="range"] { width: 140px; }
.hue-group .hue-swatch {
  width: 16px; height: 16px; border-radius: 3px; border: solid 1px var(--rule);
}
.hue-group output {
  font-variant-numeric: tabular-nums;
  min-width: 3ch;
  text-align: right;
}

button.primary, button.ghost {
  appearance: none;
  font: inherit;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 5px;
  border: 0;
  cursor: pointer;
}
button.primary { background: var(--accent); color: var(--accent-text); }
button.primary:hover { filter: brightness(1.1); }
button.ghost { background: transparent; color: var(--muted); padding: 4px 8px; font-size: 11px; }
button.ghost:hover { color: var(--ink); background: var(--chip); }

main { padding: 16px 20px 40px; display: flex; flex-direction: column; gap: 16px; }

.candidate {
  background: var(--card);
  border: solid 1px var(--rule);
  border-radius: 8px;
  padding: 14px 18px;
  display: grid;
  gap: 12px;
}
.candidate header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.candidate h2 {
  font-size: 13px;
  font-weight: 500;
}
.candidate .notes { color: var(--muted); font-size: 11px; }
.candidate .badges { display: flex; gap: 6px; flex-wrap: wrap; }
.candidate .badge {
  font-size: 10px;
  color: var(--muted);
  padding: 1px 7px;
  border: solid 1px var(--rule);
  border-radius: 10px;
  font-variant-numeric: tabular-nums;
}
.candidate .actions {
  margin-left: auto;
  display: flex;
  gap: 4px;
}

.mocks {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto minmax(0, 1fr);
  gap: 0 10px;
  height: 42dvh;
  min-height: 360px;
}
.role-col {
  display: flex;
  flex-direction: column;
  gap: 3px;
  width: 48px;
}
.role-col .col-label {
  font-size: 9px;
  color: var(--muted);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding-bottom: 2px;
  line-height: 1.1;
}
.role-col .role-chip {
  position: relative;
  flex: 1;
  min-height: 14px;
  border-radius: 3px;
  border: solid 1px rgba(0, 0, 0, 0.08);
  cursor: help;
}
.role-col .role-chip[data-alpha] {
  background-image:
    linear-gradient(45deg, rgba(0, 0, 0, 0.08) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(0, 0, 0, 0.08) 25%, transparent 25%);
  background-size: 8px 8px;
}
.role-col .role-chip::after {
  content: attr(data-label);
  position: absolute;
  left: 50%;
  bottom: 100%;
  transform: translate(-50%, -4px);
  background: rgba(0, 0, 0, 0.8);
  color: #fff;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 100ms ease;
}
.role-col .role-chip:hover::after { opacity: 1; }

.preview {
  position: relative;
  display: flex;
  flex-direction: column;
  border: solid 1px var(--rule);
  border-radius: 6px;
  overflow: hidden;
}
.preview .preview-label {
  padding: 4px 6px 4px 10px;
  font-size: 10px;
  color: var(--muted);
  background: var(--card);
  border-bottom: solid 1px var(--rule);
  display: flex;
  align-items: center;
  gap: 8px;
}
.preview .preview-label .theme { text-transform: uppercase; letter-spacing: 0.08em; }
.preview .preview-label .spacer { margin-left: auto; }
.preview .interact-toggle {
  appearance: none;
  font: inherit;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
  border: solid 1px var(--rule);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
}
.preview .interact-toggle:hover { color: var(--ink); }
.preview.interactive .interact-toggle {
  background: var(--accent);
  color: var(--accent-text);
  border-color: transparent;
}
.preview iframe {
  flex: 1;
  width: 100%;
  border: 0;
  pointer-events: none;
}
.preview.interactive iframe { pointer-events: auto; }
.preview.interactive { outline: solid 2px var(--accent); outline-offset: -2px; }

.overlay {
  position: fixed; inset: 0; z-index: 10;
  background: rgba(30, 30, 30, 0.55);
  display: none;
}
.overlay.open { display: block; }
.overlay .frame-wrap {
  position: absolute;
  inset: 16px;
  background: #111;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.overlay .frame-wrap iframe { flex: 1; width: 100%; border: 0; }
.overlay .overlay-close {
  position: absolute;
  top: 8px; right: 10px;
  z-index: 1;
  font-size: 18px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.6);
  color: #fff;
  border: 0; cursor: pointer; line-height: 1;
}
.overlay .overlay-close:hover { background: rgba(0, 0, 0, 0.8); }
.overlay .overlay-hint {
  position: absolute; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255, 255, 255, 0.75);
  font-size: 11px;
  background: rgba(0, 0, 0, 0.45);
  padding: 4px 10px; border-radius: 4px;
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="title">Palette Studio <small>only the color system varies between candidates — hues + role mapping are studio-wide</small></div>

  <div class="hue-group" id="global-hue">
    <label>
      surface hue
      <input type="range" id="global-surface-hue" min="0" max="345" value="165" step="15">
      <output for="global-surface-hue">165</output>
      <span class="hue-swatch" id="global-surface-swatch"></span>
    </label>
    <label>
      accent hue
      <input type="range" id="global-accent-hue" min="0" max="345" value="165" step="15">
      <output for="global-accent-hue">165</output>
      <span class="hue-swatch" id="global-accent-swatch"></span>
    </label>
  </div>

  <button class="primary" id="open-designer">+ New system</button>
</div>

<main id="gallery"></main>

<div class="overlay" id="designer-overlay" aria-hidden="true">
  <div class="frame-wrap">
    <button class="overlay-close" id="overlay-close" aria-label="Close designer">×</button>
    <iframe id="designer-iframe" title="Color System Designer"></iframe>
    <div class="overlay-hint">Esc to close · click <strong>Save as candidate</strong> in the designer to add it to the gallery</div>
  </div>
</div>

<script type="module">
import {
  exportArcSystem,
  exportGridSystem,
  hueKey,
  arcSuffixSwap,
  gridSuffixSwap,
  nearestArcSuffix,
  nearestGridSuffix,
} from "./palette.js";

/*
 * CONCEPTUAL MODEL
 *
 *   candidate = { meta, stops } — meta describes how the system was
 *               generated; stops is a flat table of every named color
 *               at every hue, like Material Red 050 / 100 / 200 / ...
 *
 *   Studio-wide (not per candidate):
 *     hues     — surface + accent hue picks (snap to one of hueCount)
 *     ROLE_MAP — semantic role → { scale, arc-suffix, grid-suffix }
 *
 *   Render flow per role:
 *     1. Pick scale's hue → "h180" prefix
 *     2. Pick model-specific suffix from role → "c80-40"
 *     3. Look up "h180 c80-40" in the candidate's stops table
 *     4. Dark mode = look up the swapped suffix instead.
 */

const LS_KEY = "palette-studio.candidates";
const LS_HUES = "palette-studio.hues";

// Ordered list — drives the role chip display. Surface roles first.
const ROLE_ORDER = [
  "--color-bg-base",
  "--color-bg-raised",
  "--color-bg-panel",
  "--color-bg-hover",
  "--color-input-bg",
  "--color-border-subtle",
  "--color-border-strong",
  "--color-text-tertiary",
  "--color-text-secondary",
  "--color-text-primary",
  "--color-accent",
  "--color-accent-subtle",
  "--color-accent-text",
  "--color-toggle-track",
  "--color-toggle-thumb",
  "--color-toggle-icon",
  "--color-glyph-bg",
  "--color-focus",
];

// Shared role mapping — the SAME for all candidates.
// Each role names a stop in BOTH model namings:
//   arc:  "c{peakPct}-{stepPct}"
//         step 0 = pure black, step 100 = pure white, mid-step = peak chroma.
//   grid: "b{bPct}-w{wPct}"
//         origin (b00-w00) = pure color; (b00-w100) = pure white;
//         (b100-w00) = pure black; chroma = 100 - b - w (implicit).
// All values authored for LIGHT MODE. Dark mode swaps W ↔ B.
const ROLE_MAP = {
  "--color-bg-base":        { scale: "surface", arc: "c00-100", grid: "b00-w100" },
  "--color-bg-raised":      { scale: "surface", arc: "c00-90",  grid: "b10-w90"  },
  "--color-bg-panel":       { scale: "surface", arc: "c00-80",  grid: "b20-w80"  },
  "--color-bg-hover":       { scale: "surface", arc: "c00-70",  grid: "b30-w70"  },
  "--color-input-bg":       { scale: "surface", arc: "c00-70",  grid: "b30-w70"  },
  "--color-border-subtle":  { scale: "surface", arc: "c00-50",  grid: "b50-w50"  },
  "--color-border-strong":  { scale: "surface", arc: "c00-30",  grid: "b70-w30"  },
  "--color-text-tertiary":  { scale: "surface", arc: "c00-20",  grid: "b80-w20"  },
  "--color-text-secondary": { scale: "surface", arc: "c00-10",  grid: "b90-w10"  },
  "--color-text-primary":   { scale: "surface", arc: "c00-00",  grid: "b100-w00" },
  "--color-accent":         { scale: "accent",  arc: "c50-40",  grid: "b20-w30"  },
  "--color-accent-subtle":  { scale: "accent",  arc: "c10-90",  grid: "b10-w80"  },
  "--color-accent-text":    { scale: "surface", arc: "c00-100", grid: "b00-w100" },
  "--color-toggle-track":   { scale: "surface", arc: "c00-80",  grid: "b20-w80"  },
  "--color-toggle-thumb":   { scale: "surface", arc: "c50-40",  grid: "b20-w30"  },
  "--color-toggle-icon":    { scale: "surface", arc: "c00-100", grid: "b00-w100" },
  "--color-glyph-bg":       { scale: "accent",  arc: "c50-40",  grid: "b20-w30", alpha: 0.06 },
  "--color-focus":          { scale: "accent",  arc: "c50-40",  grid: "b20-w30", alpha: 0.45 },
};

// Quantized hue choices — every candidate exports at hueCount = 24.
const HUE_COUNT = 24;
const HUE_STEP_DEG = 360 / HUE_COUNT;
const HUE_ANGLES = Array.from({ length: HUE_COUNT }, (_, i) =>
  Math.round(i * HUE_STEP_DEG)
);
function snapHue(angle) {
  const idx = Math.round(((angle % 360) + 360) % 360 / HUE_STEP_DEG) % HUE_COUNT;
  return HUE_ANGLES[idx];
}

// Materialise a candidate by exporting from its meta.
function buildCandidate({ id, name, notes, meta }) {
  const exporter = meta.model === "tonalarc" ? exportArcSystem : exportGridSystem;
  const { stops, meta: filledMeta } = exporter({
    space: meta.space,
    hueCount: HUE_COUNT,
    N: meta.N,
    arcs: meta.arcs,
    scheme: meta.scheme,
    curves: meta.curves,
  });
  return { id, name, notes, meta: { ...meta, ...filledMeta }, stops };
}

const DEFAULT_CURVES = { tint: 0, shade: 0, pure: 0, magnitude: 2 };

function loadCandidates() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) return parsed;
    }
  } catch (e) {}
  return [
    buildCandidate({
      id: "arc-11x11",
      name: "tonalarc · oklch · 11 × 11",
      notes: "Tonal arc scales: 11 arcs × 11 stops, OKLCH, no easing.",
      meta: { model: "tonalarc", space: "oklch", arcs: 11, N: 11, curves: DEFAULT_CURVES },
    }),
    buildCandidate({
      id: "arc-5x9",
      name: "tonalarc · oklch · 5 × 9",
      notes: "Coarser arc family.",
      meta: { model: "tonalarc", space: "oklch", arcs: 5, N: 9, curves: DEFAULT_CURVES },
    }),
    buildCandidate({
      id: "grid-n10",
      name: "tonalgrid · oklch · N=10",
      notes: "Ternary grid at N=10.",
      meta: { model: "tonalgrid", space: "oklch", N: 10, scheme: "cl", curves: DEFAULT_CURVES },
    }),
    buildCandidate({
      id: "grid-n5",
      name: "tonalgrid · oklch · N=5",
      notes: "Coarser ternary grid.",
      meta: { model: "tonalgrid", space: "oklch", N: 5, scheme: "cl", curves: DEFAULT_CURVES },
    }),
  ];
}

function saveCandidates() {
  localStorage.setItem(LS_KEY, JSON.stringify(candidates));
}

function loadHues() {
  try {
    const raw = localStorage.getItem(LS_HUES);
    if (raw) {
      const parsed = JSON.parse(raw);
      return { surface: snapHue(parsed.surface), accent: snapHue(parsed.accent) };
    }
  } catch (e) {}
  return { surface: snapHue(165), accent: snapHue(165) };
}

function saveHues() {
  localStorage.setItem(LS_HUES, JSON.stringify(hues));
}

const candidates = loadCandidates();
const hues = loadHues();

// ─── CSS generation — flat lookup in candidate.stops ────────────

function applyAlpha(hex, alpha) {
  if (alpha == null || alpha >= 1) return hex;
  const a = Math.max(0, Math.min(1, alpha));
  // rgba() with hex base — emit the hex plus an alpha channel via
  // an 8-digit hex (browser-friendly).
  const aHex = Math.round(a * 255).toString(16).padStart(2, "0");
  return hex + aHex;
}

function lookupRole(role, cand, hue) {
  const { meta, stops } = cand;
  const target = meta.model === "tonalarc" ? role.arc : role.grid;
  if (!target) return null;
  const nearest = meta.model === "tonalarc" ? nearestArcSuffix : nearestGridSuffix;
  const swap = meta.model === "tonalarc" ? arcSuffixSwap : gridSuffixSwap;

  // Snap the role's target stop to the nearest one this candidate has.
  const snapLight = nearest(target, meta);
  const snapDark = nearest(swap(snapLight), meta);
  const hk = hueKey(hue);
  const lightHex = stops[`${hk} ${snapLight}`];
  const darkHex = stops[`${hk} ${snapDark}`];
  return {
    light: applyAlpha(lightHex || "#ff00ff", role.alpha),
    dark:  applyAlpha(darkHex  || "#ff00ff", role.alpha),
    label: `${meta.model === "tonalarc" ? "arc" : "grid"} ${snapLight}`,
  };
}

function resolveCandidate(cand) {
  if (!cand?.stops) return { lightCss: "", darkCss: "", roleColors: {} };
  const roleColors = {};
  const lightLines = [];
  const darkLines = [];

  for (const name of ROLE_ORDER) {
    const role = ROLE_MAP[name];
    if (!role) continue;
    const hue = role.scale === "accent" ? hues.accent : hues.surface;
    const out = lookupRole(role, cand, hue);
    if (!out) continue;
    lightLines.push(`  ${name}: ${out.light};`);
    darkLines.push(`  ${name}: ${out.dark};`);
    roleColors[name] = { light: out.light, dark: out.dark, label: out.label, role };
  }

  // style.css's default (no data-theme) is dark; [data-theme="light"] overrides.
  const lightCss = `[data-theme="light"] {\n${lightLines.join("\n")}\n}`;
  const darkCss = `:root {\n${darkLines.join("\n")}\n}`;
  return { lightCss, darkCss, roleColors };
}

function candidateOverridesCss(cand) {
  const { lightCss, darkCss } = resolveCandidate(cand);
  return `${darkCss}\n${lightCss}`;
}

// ─── Gallery rendering ───────────────────────────────────────────

const gallery = document.getElementById("gallery");

function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") node.className = v;
    else if (k === "style") node.setAttribute("style", v);
    else if (k.startsWith("data-")) node.setAttribute(k, v);
    else node[k] = v;
  }
  for (const c of children) {
    if (c == null) continue;
    node.append(c.nodeType ? c : document.createTextNode(c));
  }
  return node;
}

function roleShortLabel(name) {
  return name.replace(/^--color-/, "").replace(/-/g, " ");
}

function renderCandidate(cand) {
  const section = el("section", { class: "candidate", id: `c-${cand.id}` });

  const header = el("header", {},
    el("h2", {}, cand.name),
    el("span", { class: "notes" }, cand.notes || ""),
  );
  const badges = el("div", { class: "badges" });
  if (cand.meta) {
    const m = cand.meta;
    badges.append(el("span", { class: "badge" }, `${m.model} · ${m.space}`));
    if (m.model === "tonalarc") {
      badges.append(el("span", { class: "badge" }, `${m.arcs} arcs × ${m.N} stops`));
    } else if (m.model === "tonalgrid") {
      badges.append(el("span", { class: "badge" }, `N=${m.N}`));
      if (m.scheme) badges.append(el("span", { class: "badge" }, `scheme=${m.scheme}`));
    }
    badges.append(el("span", { class: "badge" }, `${Object.keys(cand.stops).length} stops`));
  }
  if (badges.children.length) header.append(badges);

  const actions = el("div", { class: "actions" });
  if (cand.id !== "baseline") {
    const delBtn = el("button", { class: "ghost", type: "button" }, "delete");
    delBtn.addEventListener("click", () => deleteCandidate(cand.id));
    actions.append(delBtn);
  }
  header.append(actions);
  section.append(header);

  const { roleColors } = resolveCandidate(cand);
  const mocks = el("div", { class: "mocks" });
  for (const theme of ["light", "dark"]) {
    const palette = el("div", { class: "role-col", "data-theme": theme });
    palette.append(el("div", { class: "col-label" }, "roles"));
    for (const name of ROLE_ORDER) {
      const role = ROLE_MAP[name];
      if (!role) continue;
      const info = roleColors[name];
      const chip = el("div", {
        class: "role-chip",
        "data-role": name,
        "data-theme": theme,
        "data-label": `${roleShortLabel(name)} · ${role.scale} ${info?.label ?? ""}`,
      });
      if (role.alpha != null) chip.setAttribute("data-alpha", role.alpha);
      palette.append(chip);
    }
    mocks.append(palette);

    const wrap = el("div", { class: "preview" });
    const label = el("div", { class: "preview-label" },
      el("span", { class: "theme" }, theme),
      el("span", { class: "spacer" }),
    );
    const interactBtn = el("button", {
      class: "interact-toggle",
      type: "button",
      title: "Toggle whether this iframe receives mouse/keyboard input",
    }, "interact");
    interactBtn.addEventListener("click", () => {
      const on = wrap.classList.toggle("interactive");
      interactBtn.textContent = on ? "locked" : "interact";
    });
    label.append(interactBtn);
    wrap.append(label);
    const iframe = el("iframe", {
      src: "/index.html",
      title: `${cand.name} / ${theme}`,
      loading: "lazy",
      "data-theme": theme,
      "data-candidate": cand.id,
    });
    iframe.addEventListener("load", () => applyToIframe(cand, iframe, theme, section));
    wrap.append(iframe);
    mocks.append(wrap);
  }
  section.append(mocks);

  return section;
}

function applyToIframe(cand, iframe, theme, section) {
  const doc = iframe.contentDocument;
  if (!doc) return;
  doc.documentElement.dataset.theme = theme;

  const css = candidateOverridesCss(cand);
  upsertStyle(doc, "palette-studio-candidate", css);

  requestAnimationFrame(() => paintRoleChips(cand, theme, section));
}

function paintRoleChips(cand, theme, section) {
  const { roleColors } = resolveCandidate(cand);
  const palette = section.querySelector(`.role-col[data-theme="${theme}"]`);
  if (!palette) return;
  for (const chip of palette.querySelectorAll(".role-chip")) {
    const name = chip.dataset.role;
    const colors = roleColors[name];
    if (!colors) continue;
    chip.style.background = theme === "light" ? colors.light : colors.dark;
  }
}

function upsertStyle(doc, id, css) {
  let el = doc.getElementById(id);
  if (!el) {
    el = doc.createElement("style");
    el.id = id;
    doc.head.appendChild(el);
  }
  el.textContent = css;
}

function refreshIframe(iframe, section, candId) {
  const cand = candidates.find(c => c.id === candId);
  if (!cand) return;
  const theme = iframe.dataset.theme;
  applyToIframe(cand, iframe, theme, section);
}

function refreshAllIframes() {
  for (const section of gallery.querySelectorAll(".candidate")) {
    for (const iframe of section.querySelectorAll("iframe")) {
      refreshIframe(iframe, section, iframe.dataset.candidate);
    }
  }
}

function addCandidate(cand) {
  candidates.push(cand);
  saveCandidates();
  gallery.append(renderCandidate(cand));
  sectionEl(cand.id).scrollIntoView({ behavior: "smooth", block: "start" });
}

function sectionEl(id) { return document.getElementById(`c-${id}`); }

function deleteCandidate(id) {
  if (!confirm("Delete this candidate?")) return;
  const i = candidates.findIndex(c => c.id === id);
  if (i < 0) return;
  candidates.splice(i, 1);
  saveCandidates();
  sectionEl(id)?.remove();
}

// ─── Hue toolbar (studio-wide, applies to every candidate) ──────
const surfaceInput = document.getElementById("global-surface-hue");
const accentInput = document.getElementById("global-accent-hue");
const surfaceOut = surfaceInput.nextElementSibling;
const accentOut = accentInput.nextElementSibling;
const surfaceSwatch = document.getElementById("global-surface-swatch");
const accentSwatch = document.getElementById("global-accent-swatch");

function renderHueUi() {
  surfaceInput.value = hues.surface;
  accentInput.value = hues.accent;
  surfaceOut.textContent = hues.surface;
  accentOut.textContent = hues.accent;
  surfaceSwatch.style.background = `oklch(60% 0.12 ${hues.surface})`;
  accentSwatch.style.background = `oklch(60% 0.18 ${hues.accent})`;
}

for (const [input, key] of [[surfaceInput, "surface"], [accentInput, "accent"]]) {
  input.addEventListener("input", () => {
    hues[key] = snapHue(+input.value);
    renderHueUi();
    saveHues();
    refreshAllIframes();
  });
}
renderHueUi();

// ─── Designer overlay ───────────────────────────────────────────
const overlay = document.getElementById("designer-overlay");
const designerIframe = document.getElementById("designer-iframe");
const openDesignerBtn = document.getElementById("open-designer");
const closeBtn = document.getElementById("overlay-close");

let editingId = null;

function openDesigner(forCand = null) {
  editingId = forCand ? forCand.id : null;
  overlay.classList.add("open");
  overlay.setAttribute("aria-hidden", "false");
  designerIframe.src = "/design/color-triangle.html";

  if (forCand) {
    designerIframe.addEventListener("load", () => {
      designerIframe.contentWindow.postMessage({
        type: "designer:load",
        state: {
          space: forCand.system?.space,
          hue: hues.surface,
        },
      }, "*");
    }, { once: true });
  }
}

function closeDesigner() {
  overlay.classList.remove("open");
  overlay.setAttribute("aria-hidden", "true");
  designerIframe.src = "about:blank";
  editingId = null;
}

openDesignerBtn.addEventListener("click", () => openDesigner());
closeBtn.addEventListener("click", closeDesigner);
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeDesigner(); });
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && overlay.classList.contains("open")) closeDesigner();
});

// Incoming save from the designer. The designer is the source of truth
// for color math (all 8 spaces). It sends a fully-baked { meta, stops }
// — the studio just stores and renders it.
window.addEventListener("message", (ev) => {
  const msg = ev.data;
  if (!msg || msg.type !== "designer:save") return;
  if (!msg.meta || !msg.stops) {
    console.warn("[palette-studio] save message missing meta or stops");
    return;
  }
  const id = editingId || ("c-" + Date.now().toString(36));
  const cand = { id, name: msg.name, notes: "", meta: msg.meta, stops: msg.stops };

  if (editingId) {
    const idx = candidates.findIndex(c => c.id === editingId);
    if (idx >= 0) {
      candidates[idx] = cand;
      saveCandidates();
      sectionEl(editingId)?.replaceWith(renderCandidate(cand));
      refreshAllIframes();
      closeDesigner();
      return;
    }
  }
  addCandidate(cand);
  refreshAllIframes();
  closeDesigner();
});

// ─── Initial render ─────────────────────────────────────────────
for (const cand of candidates) gallery.append(renderCandidate(cand));
</script>
</body>
</html>
