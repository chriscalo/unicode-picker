<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <title>Color System Designer</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
    <style>
      html {
        height: 100dvh;
      }
      body {
        height: 100dvh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: oklch(24% 0 0);
      }

      header.workbench {
        background: oklch(24% 0 0) !important;
      }

      header.workbench {
        flex: 0 0 auto;
        background: var(--color-bg-base);
        border-bottom: 1px solid var(--color-border-subtle);
        padding: 14px 18px 12px;
        position: relative;
      }
      header.workbench h1 {
        font-size: var(--text-lg);
        font-weight: var(--weight-medium);
        margin-bottom: 2px;
      }

      /* Shown only when this doc is embedded in an iframe (studio). */
      .save-candidate-group {
        display: none;
        position: absolute;
        top: 14px;
        right: 18px;
        gap: 6px;
      }
      :root[data-embedded] .save-candidate-group { display: inline-flex; }
      .save-candidate-group button {
        appearance: none;
        font: inherit;
        font-size: 12px;
        font-weight: var(--weight-medium);
        padding: 7px 12px;
        border-radius: 5px;
        border: 0;
        background: var(--color-accent);
        color: var(--color-accent-text);
        cursor: pointer;
      }
      .save-candidate-group button:hover { filter: brightness(1.08); }
      header.workbench .lede {
        color: var(--color-text-secondary);
        font-size: var(--text-xs);
        margin-bottom: 14px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, auto));
        column-gap: 24px;
        row-gap: 10px;
        align-items: end;
      }
      .control {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .control__label {
        font-size: 9.5px;
        font-weight: var(--weight-medium);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--color-text-secondary);
      }
      .seg {
        display: inline-flex;
        align-self: flex-start;
        border: 1px solid var(--color-border-subtle);
        border-radius: 4px;
        overflow: hidden;
        background: var(--color-bg-panel);
      }
      .seg button {
        appearance: none;
        font: inherit;
        font-size: 11px;
        padding: 5px 10px;
        background: transparent;
        border: 0;
        border-right: 1px solid var(--color-border-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      .seg button:last-child { border-right: 0; }
      .seg button:hover {
        color: var(--color-text-primary);
        background: var(--color-bg-hover);
      }
      .seg button[aria-pressed="true"] {
        background: var(--color-text-primary);
        color: var(--color-bg-base);
      }
      /* Preferred marker — filled dot next to the option label.
         Matches design/index.html's convention so the harness and
         designer share visual vocabulary. */
      .seg button.is-preferred::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--color-text-primary);
        margin-right: 6px;
        vertical-align: baseline;
      }
      .seg button.is-preferred[aria-pressed="true"]::before {
        background: var(--color-bg-base);
      }
      .curve-editor {
        width: 140px;
        min-height: 40px;
        flex: 1 1 0;
        border-radius: 3px;
        border: 1px solid var(--color-border-subtle);
        display: block;
        cursor: crosshair;
        touch-action: none;
      }
      .edge-strip {
        width: 140px;
        height: 14px;
        border-radius: 3px;
        border: 1px solid var(--color-border-subtle);
        display: block;
        margin-top: 4px;
      }
      .curve-reset {
        background: transparent;
        border: 0;
        color: var(--color-text-secondary);
        cursor: pointer;
        font-size: 10px;
        padding: 0 4px;
        margin-left: 4px;
      }
      .curve-reset:hover { color: var(--color-text-primary); }
      .toggle-control {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--color-text-secondary);
        cursor: pointer;
      }
      .toggle-control input { margin: 0; }
      .ease-read {
        color: var(--color-text-secondary);
        font-family: var(--font-ui);
        font-variant-numeric: tabular-nums;
        font-size: 9.5px;
        margin-left: 4px;
      }

      .tile-status {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 6px 14px;
        padding: 6px 2px 2px;
        margin-top: 4px;
        font-family: var(--font-ui);
        color: var(--color-text-secondary);
        border-top: 1px solid var(--color-border-subtle);
        font-variant-numeric: tabular-nums;
        min-height: 40px;
      }
      .tile-status__item {
        display: inline-flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        min-width: 6ch;
      }
      .tile-status__item--wide { min-width: 26ch; }
      .tile-status__key {
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--color-text-secondary);
        white-space: nowrap;
      }
      .tile-status__value {
        color: var(--color-text-primary);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .tile-status__swatch {
        width: 28px;
        height: 28px;
        border-radius: 3px;
        border: 1px solid var(--color-border-subtle);
        display: inline-block;
        flex-shrink: 0;
        align-self: flex-start;
        margin-top: 2px;
      }
      .inline-controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .inline-control {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .inline-control__label {
        font-size: 9.5px;
        font-weight: var(--weight-medium);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--color-text-secondary);
      }
      main {
        flex: 1 1 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
        gap: 0;
        padding: 0;
        min-height: 0;
        min-width: 0;
      }

      section {
        margin: 0;
        padding: 10px 14px 14px;
        border: 0;
        border-radius: 0;
        background: oklch(24% 0 0);
        min-width: 0;
        min-height: 0;
        overflow: visible;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      /* Internal borders only — plus-sign cross between tiles. */
      section:nth-child(1) {
        border-right: 1px solid var(--color-border-subtle);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      section:nth-child(2) {
        border-bottom: 1px solid var(--color-border-subtle);
      }
      section:nth-child(3) {
        border-right: 1px solid var(--color-border-subtle);
      }
      .section-head {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        min-height: 30px;
      }
      h2 {
        font-size: var(--text-sm);
        font-weight: var(--weight-medium);
        margin: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
      }
      h2 .info {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 0;
        background: oklch(95% 0 0);
        color: oklch(12% 0 0);
        font-family: ui-monospace, "IBM Plex Mono", monospace;
        font-size: 11px;
        line-height: 16px;
        font-weight: 700;
        font-style: normal;
        cursor: help;
      }
      h2 .info:hover {
        background: oklch(100% 0 0);
      }
      h2 .info::after {
        content: attr(data-tooltip);
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        background: var(--color-bg-panel);
        color: var(--color-text-primary);
        padding: 8px 10px;
        border: 1px solid var(--color-border-subtle);
        border-radius: 4px;
        width: max-content;
        max-width: 320px;
        font-family: var(--font-ui);
        font-size: 11px;
        font-weight: var(--weight-regular);
        font-style: normal;
        line-height: 1.45;
        letter-spacing: 0;
        text-transform: none;
        white-space: normal;
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease;
        z-index: 100;
      }
      h2 .info:hover::after,
      h2 .info:focus::after {
        opacity: 1;
      }

      /* ── picker stage ─────────────────────────────────────── */

      .tri-row {
        display: flex;
        flex-direction: row;
        gap: 12px;
        align-items: stretch;
        min-height: 0;
        flex: 1 1 0;
      }
      .curves-panel {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 0;
        min-height: 0;
        align-self: stretch;
        padding: 0 0 14px 14px;
        overflow: hidden;
      }
      .curves-panel .control {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1 1 0;
        min-height: 0;
      }
      .hue-list {
        display: grid;
        grid-auto-flow: column;
        grid-template-rows: repeat(12, auto);
        column-gap: 14px;
        row-gap: 1px;
        min-width: 0;
        align-self: stretch;
        padding: 0 0 0 14px;
        font-family: var(--font-ui);
        font-size: 10.5px;
        font-variant-numeric: tabular-nums;
        overflow: auto;
      }
      .hue-list__item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 2px 4px;
        border-radius: 3px;
        white-space: nowrap;
      }
      .hue-list__item[data-current="true"] {
        background: var(--color-bg-hover);
      }
      .hue-list__item[data-current="true"] .hue-list__name {
        color: var(--color-text-primary);
      }
      .hue-list__swatch {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        border: 1px solid var(--color-border-subtle);
        flex-shrink: 0;
      }
      .hue-list__angle {
        color: var(--color-text-secondary);
        min-width: 4ch;
        text-align: right;
      }
      .hue-list__name {
        color: var(--color-text-secondary);
      }
      .tri-stage {
        position: relative;
        aspect-ratio: 1;
        height: 100%;
        width: auto;
        max-width: 100%;
        max-height: 100%;
        flex-shrink: 0;
        min-width: 0;
        min-height: 0;
      }
      canvas.tri-body,
      canvas.tri-ring {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        inset: 0;
      }
      .tri-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .tri-overlay-rotating {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .tri-cursor,
      .hue-cursor {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid oklch(95% 0 0);
        box-shadow: 0 0 0 1px oklch(10% 0 0);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .quant-dot,
      .hue-step-dot {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1.5px solid oklch(95% 0 0);
        box-shadow: 0 0 0 1px oklch(10% 0 0);
        transform: translate(-50%, -50%);
        pointer-events: auto;
        cursor: pointer;
      }
      .quant-dot[data-peer-hover],
      .quant-dot[data-arc-peer-hover] {
        outline: 2px solid oklch(100% 0 0);
        outline-offset: 2px;
        z-index: 10;
      }
      .token-grid .cell[data-peer-hover],
      .arc-swatch[data-arc-peer-hover] {
        outline: 2px solid oklch(100% 0 0);
        outline-offset: -1px;
        z-index: 10;
      }
      polygon.hex-cell[data-peer-hover] {
        stroke: oklch(100% 0 0);
        stroke-width: 2.5;
      }
      text.hex-label {
        font-family: var(--font-ui);
        font-size: 11px;
        fill: oklch(75% 0 0);
        font-variant-numeric: tabular-nums;
      }
      .hue-step-dot[data-tooltip]::after {
        content: attr(data-tooltip);
        position: absolute;
        left: calc(50% + var(--label-offset-x, 0px));
        top: calc(50% + var(--label-offset-y, 0px));
        transform: translate(-50%, -50%);
        font-family: var(--font-ui);
        font-size: 9.5px;
        font-variant-numeric: tabular-nums;
        color: var(--color-text-primary);
        background: var(--color-bg-panel);
        padding: 1px 5px;
        border-radius: 2px;
        border: 1px solid var(--color-border-subtle);
        pointer-events: none;
        opacity: 0;
        transition: opacity 120ms ease;
        white-space: nowrap;
        z-index: 5;
      }
      .hue-step-dot:hover::after,
      .hue-step-dot:focus::after {
        opacity: 1;
      }
      .quant-dot[aria-selected="true"],
      .hue-step-dot[aria-selected="true"] {
        width: 18px;
        height: 18px;
        border-width: 3px;
      }

      /* ── 2D grid ──────────────────────────────────────────── */

      .token-grid {
        display: grid;
        gap: 3px;
        font-family: var(--font-ui);
        font-variant-numeric: tabular-nums;
      }
      .token-grid .cell {
        border-radius: 4px;
        border: 1px solid var(--color-border-subtle);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        cursor: default;
        min-width: 0;
        aspect-ratio: 1 / 1;
        min-height: 0;
      }
      .token-grid .cell[data-empty] {
        border: 0;
        background: transparent;
      }
      .token-grid .cell[data-dark]  { color: oklch(95% 0 0); }
      .token-grid .cell[data-light] { color: oklch(15% 0 0); }
      .token-grid .axis-label {
        font-size: 9.5px;
        color: var(--color-text-secondary);
        letter-spacing: 0.04em;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .token-grid .axis-label--row { justify-content: flex-end; padding-right: 4px; }

      /* ── arcs ─────────────────────────────────────────────── */

      .arcs-layout {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr);
        gap: 12px;
        align-items: stretch;
        min-height: 0;
        min-width: 0;
        flex: 1 1 0;
      }
      #arc-stage {
        align-self: center;
      }
      .arc-scales {
        display: grid;
        gap: 3px;
        height: 100%;
        min-height: 0;
        min-width: 0;
      }
      .arc-scale-label {
        font-size: 10px;
        color: var(--color-text-secondary);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.04em;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 4px;
        min-width: 0;
      }
      .arc-scale-header {
        font-size: 9px;
        color: var(--color-text-secondary);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.1em;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 0;
      }
      .arc-swatch {
        border-radius: 3px;
        border: 1px solid var(--color-border-subtle);
        min-width: 0;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-ui);
        font-size: 9px;
        font-variant-numeric: tabular-nums;
      }
      .arc-swatch[data-dark]  { color: oklch(95% 0 0); }
      .arc-swatch[data-light] { color: oklch(15% 0 0); }

      pre {
        font-family: var(--font-ui);
        font-size: 11px;
        line-height: 1.55;
        background: var(--color-bg-panel);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        max-width: 70ch;
        overflow: auto;
      }
      code { font-family: var(--font-ui); font-size: 0.9em; }
    </style>
  </head>
  <body>

    <header class="workbench">
      <h1>Color System Designer</h1>
      <div class="save-candidate-group">
        <button type="button" id="save-tonalarc">Save as tonalarc</button>
        <button type="button" id="save-tonalgrid">Save as tonalgrid</button>
      </div>

    </header>

    <main>

      <!-- 1. Continuous picker -->
      <section>
        <div class="section-head">
          <h2>
            Continuous Color Picker
            <span class="info" tabindex="0" data-tooltip="Continuous tint / shade / tone picker. Triangle corners: pure hue (C), tint = hue + white (W), shade = hue + black (B). Interior points are tones (hue + grey). Drag the ring to change the hue.">i</span>
          </h2>
          <div class="inline-controls">
            <div class="inline-control">
              <span class="inline-control__label">Color space</span>
              <div class="seg" data-decision="space">
                <button data-value="hwb" class="is-preferred" title="Preferred finalist">HWB</button>
                <button data-value="oklch" class="is-preferred" aria-pressed="true" title="Preferred finalist">OKLCH</button>
                <button data-value="okhsl">OKHSL</button>
                <button data-value="okhsv" class="is-preferred" title="Preferred finalist">OKHSV</button>
                <button data-value="lchab">LCh(ab)</button>
                <button data-value="jzazbz">Jzazbz</button>
              </div>
            </div>
          </div>
        </div>

        <div class="tri-row">
          <div class="tri-stage" id="picker-stage">
            <canvas class="tri-ring" id="picker-ring" width="600" height="600"></canvas>
            <canvas class="tri-body" id="picker-body" width="300" height="300"></canvas>
            <div class="tri-overlay-rotating" id="picker-body-overlay">
              <div class="tri-cursor" id="picker-cursor"></div>
            </div>
            <div class="tri-overlay" id="picker-overlay">
              <div class="hue-cursor" id="picker-hue-cursor"></div>
            </div>
          </div>
          <div class="curves-panel">
            <div class="control">
              <div class="control__label">Tint curve (W↔B) <button type="button" class="curve-reset" data-edge="wb">reset</button></div>
              <canvas id="curve-wb" class="curve-editor" width="140" height="70"></canvas>
              <canvas id="edge-wb" class="edge-strip" width="140" height="14"></canvas>
            </div>
            <div class="control">
              <div class="control__label">Shade curve (B↔C) <button type="button" class="curve-reset" data-edge="bc">reset</button></div>
              <canvas id="curve-bc" class="curve-editor" width="140" height="70"></canvas>
              <canvas id="edge-bc" class="edge-strip" width="140" height="14"></canvas>
            </div>
            <div class="control">
              <div class="control__label">Pure curve (W↔C) <button type="button" class="curve-reset" data-edge="wc">reset</button></div>
              <canvas id="curve-wc" class="curve-editor" width="140" height="70"></canvas>
              <canvas id="edge-wc" class="edge-strip" width="140" height="14"></canvas>
            </div>
          </div>
        </div>
        <div class="tile-status" id="picker-status"></div>
      </section>

      <!-- 2. Quantized picker -->
      <section>
        <div class="section-head">
          <h2>
            Quantized Color Picker
            <span class="info" tabindex="0" data-tooltip="Same tint / shade / tone space as tile 1, snapped to a finite grid. The only hues available are the evenly-spaced ring steps; the only tints, shades, and tones are the ternary-grid cells at resolution N.">i</span>
          </h2>
          <div class="inline-controls">
            <div class="inline-control">
              <span class="inline-control__label">Hue steps</span>
              <div class="seg" data-decision="nHues">
                <button data-value="12">12</button>
                <button data-value="16">16</button>
                <button data-value="24" aria-pressed="true">24</button>
              </div>
            </div>
          </div>
        </div>

        <div class="tri-row">
          <div class="tri-stage" id="quant-stage">
            <canvas class="tri-ring" id="quant-ring" width="600" height="600"></canvas>
            <canvas class="tri-body" id="quant-body" width="300" height="300"></canvas>
            <div class="tri-overlay-rotating" id="quant-body-overlay"></div>
            <div class="tri-overlay" id="quant-overlay">
              <div class="hue-cursor" id="quant-hue-cursor"></div>
            </div>
          </div>
          <div class="hue-list" id="hue-list"></div>
        </div>
        <div class="tile-status" id="quant-status"></div>
      </section>

      <!-- 3. Tonal arcs -->
      <section>
        <div class="section-head">
          <h2>
            Tonal Arc Scales
            <span class="info" tabindex="0" data-tooltip="A family of 1D scales, one per arc. Each arc runs black (shade extreme) → midpoint → white (tint extreme); the arcs differ by how much pure hue sits at the midpoint — c00 is fully greyscale, c100 has the pure hue at its peak. Every arc carries N evenly-spaced color stops.">i</span>
          </h2>
          <div class="inline-controls">
            <div class="inline-control">
              <span class="inline-control__label">N</span>
              <div class="seg" data-decision="arcN">
                <button data-value="5">5</button>
                <button data-value="11" aria-pressed="true">11</button>
                <button data-value="21">21</button>
              </div>
            </div>
            <div class="inline-control">
              <span class="inline-control__label">Arcs</span>
              <div class="seg" data-decision="arcCount">
                <button data-value="3">3</button>
                <button data-value="4">4</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>
                <button data-value="11" aria-pressed="true">11</button>
              </div>
            </div>
          </div>
        </div>

        <div class="arcs-layout">
          <div class="tri-stage" id="arc-stage">
            <canvas class="tri-body" id="arc-body" width="300" height="300" style="position: absolute; inset: 0;"></canvas>
            <svg class="tri-overlay" id="arc-svg" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%"></svg>
            <div class="tri-overlay-rotating" id="arc-dots-overlay"></div>
          </div>
          <div class="arc-scales" id="arc-scales"></div>
        </div>
        <div class="tile-status" id="arc-score" title="Scale quality, 0–100 (higher = better). Combines Distinct (no near-identical pairs), Smooth (even ΔE pacing), and Reach (pure-corner chroma). See §13 of design/color-system.md."></div>
      </section>

      <!-- 4. Tonal grid scale -->
      <section>
        <div class="section-head">
          <h2>
            Tonal Grid Scale
            <span class="info" tabindex="0" data-tooltip="A single 2D scale that names every tint, shade, and tone at the selected hue — same cells as the Quantized Color Picker above, laid out on a flat rectangular grid instead of on the triangle. Rows = tone level k; columns = white-vs-black bias i. Top-left = black, top-right = white, bottom-left = pure hue.">i</span>
          </h2>
          <div class="inline-controls">
            <div class="inline-control">
              <span class="inline-control__label">N</span>
              <div class="seg" data-decision="N">
                <button data-value="3">3</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>
                <button data-value="11" aria-pressed="true">11</button>
                <button data-value="21">21</button>
              </div>
            </div>
          </div>
        </div>

        <div class="grid-hex-row" style="display: flex; flex: 1 1 0; min-height: 0; min-width: 0; gap: 12px; overflow: hidden;">
          <div id="grid-target" style="flex: 1 1 0; min-height: 0; min-width: 0; overflow: hidden; display: flex; flex-direction: column;"></div>
          <div id="hex-target" style="flex: 1 1 0; min-height: 0; min-width: 0; overflow: hidden; display: flex; align-items: center; justify-content: center;"></div>
        </div>
        <div class="tile-status" id="grid-score" title="Scale quality, 0–100 (higher = better). Combines Distinct (no near-identical pairs), Smooth (even ΔE pacing), and Reach (pure-corner chroma). See §13 of design/color-system.md."></div>
      </section>

    </main>

    <script type="module">
      // ═══════════════════════════════════════════════════════════
      // Shared state
      // ═══════════════════════════════════════════════════════════

      const state = {
        space:  "oklch",
        hue:    180,
        nHues:  24,   // quantized hue step count (tile 2 only)
        N:      10,   // ternary-grid resolution (tiles 2 and 3 share this)
        arcN:   11,   // arc color-stop count per arc (tile 4)
        arcCount: 11, // number of arcs in tile 4
        scheme: "nbw",
        picker: { w: 0.333, b: 0.333, geo: null },
        quant:  { i: 5, k: 5, geo: null },
        // Per-axis remap curves on the barycentric weights, stored
        // per color-space. Each axis holds 3 output values at fixed
        // inputs [0.25, 0.5, 0.75]. Endpoints (0 and 1) are locked
        // at 0 and 1. Defaults to identity [0.25, 0.5, 0.75].
        curves: {},
      };

      // Per-axis remap curve. Stored as a list of knots including
      // endpoints. Evaluated as cubic Hermite between knots with
      // finite-difference slopes, output clamped to [0, 1]. Below
      // the first knot's x, output clamps to its y (Levels-style
      // black-point); same for above the last knot's x.
      //   - Click empty area → add a knot there.
      //   - Drag a knot     → move it (2D, can't cross neighbors).
      //   - Double-click a  → remove (endpoints can't be removed).
      //   - The two endpoints are draggable too: drag (0,0) right
      //     to clip inputs below X to 0 (input black-point), drag
      //     it up to lift the output floor (output black-point).
      const CURVE_MIN_GAP = 0.01;
      // The editor renders a slightly wider logical range than
      // [0,1] so endpoints can be pulled past the corners (Levels-
      // style "pull the black-point off the edge" moves).
      const CURVE_PAD = 0.25;
      function lxToPx(lx, W) {
        return ((lx + CURVE_PAD) / (1 + 2 * CURVE_PAD)) * (W - 1);
      }
      function pxToLx(px, W) {
        return (px / (W - 1)) * (1 + 2 * CURVE_PAD) - CURVE_PAD;
      }
      function lyToPy(ly, H) {
        return (1 - (ly + CURVE_PAD) / (1 + 2 * CURVE_PAD)) * (H - 1);
      }
      function pyToLy(py, H) {
        return (1 - py / (H - 1)) * (1 + 2 * CURVE_PAD) - CURVE_PAD;
      }
      const CURVE_LO = -CURVE_PAD;
      const CURVE_HI = 1 + CURVE_PAD;
      function identityCurve() {
        return { xs: [0, 1], ys: [0, 1] };
      }

      function getCurves() {
        if (!state.curves[state.space]) {
          state.curves[state.space] = {
            wb: identityCurve(),
            bc: identityCurve(),
            wc: identityCurve(),
          };
        }
        return state.curves[state.space];
      }
      const CURVE_EDGES = ["wb", "bc", "wc"];

      // Persist curves to localStorage, keyed per color space. The
      // studio iframe shares the same origin so saves are shared.
      const CURVE_STORAGE_KEY = "colorTriangle:curves:v2";
      function loadCurvesFromStorage() {
        let raw;
        try { raw = localStorage.getItem(CURVE_STORAGE_KEY); } catch (_) { return; }
        if (!raw) return;
        let parsed;
        try { parsed = JSON.parse(raw); } catch (_) { return; }
        if (!parsed || typeof parsed !== "object") return;
        for (const [space, edges] of Object.entries(parsed)) {
          if (!edges || typeof edges !== "object") continue;
          const rec = {
            wb: identityCurve(), bc: identityCurve(), wc: identityCurve(),
          };
          for (const eg of CURVE_EDGES) {
            const v = edges[eg];
            if (v && Array.isArray(v.xs) && Array.isArray(v.ys)
                && v.xs.length === v.ys.length && v.xs.length >= 2) {
              rec[eg] = { xs: v.xs.slice(), ys: v.ys.slice() };
            }
          }
          state.curves[space] = rec;
        }
      }
      function saveCurvesToStorage() {
        try {
          localStorage.setItem(CURVE_STORAGE_KEY, JSON.stringify(state.curves));
        } catch (_) {}
      }

      function curveIsIdentity(cv) {
        if (cv.xs.length !== 2) return false;
        return cv.xs[0] === 0 && cv.ys[0] === 0
          && cv.xs[1] === 1 && cv.ys[1] === 1;
      }

      function precomputeCurve(cv) {
        const xs = cv.xs, ys = cv.ys;
        const n = xs.length;
        const m = new Array(n);
        for (let k = 0; k < n; k++) {
          if (k === 0) {
            m[k] = (ys[1] - ys[0]) / (xs[1] - xs[0]);
          } else if (k === n - 1) {
            m[k] = (ys[k] - ys[k - 1]) / (xs[k] - xs[k - 1]);
          } else {
            const d1 = (ys[k] - ys[k - 1]) / (xs[k] - xs[k - 1]);
            const d2 = (ys[k + 1] - ys[k]) / (xs[k + 1] - xs[k]);
            m[k] = 0.5 * (d1 + d2);
          }
        }
        return { xs, ys, m, n };
      }

      function evalPrecomputed(p, x) {
        const { xs, ys, m, n } = p;
        if (x <= xs[0]) return ys[0];
        if (x >= xs[n - 1]) return ys[n - 1];
        let i = 0;
        while (i < n - 2 && x > xs[i + 1]) i++;
        const h = xs[i + 1] - xs[i];
        const t = (x - xs[i]) / h;
        const t2 = t * t, t3 = t2 * t;
        const h00 = 2 * t3 - 3 * t2 + 1;
        const h10 = t3 - 2 * t2 + t;
        const h01 = -2 * t3 + 3 * t2;
        const h11 = t3 - t2;
        const y = h00 * ys[i] + h10 * h * m[i] + h01 * ys[i + 1] + h11 * h * m[i + 1];
        return y < 0 ? 0 : y > 1 ? 1 : y;
      }

      function applyCurve(cv, x) {
        return evalPrecomputed(precomputeCurve(cv), x);
      }

      // Apply the three per-edge curves to a barycentric triple by
      // summing the three pairwise shuffles each curve induces. Each
      // edge curve is a 1-D remap t → t' of position along that edge.
      // For an interior point we evaluate each curve at that point's
      // pairwise ratio and apply the curve's delta (t' − t) scaled by
      // the joint mass of the two incident corners. Sum of deltas is
      // zero by construction, so barycentric normalisation is
      // preserved. On each edge the off-edge curves contribute zero
      // because their parameters land on the locked endpoints; the
      // on-edge curve contributes its full remap. Corners are
      // preserved for the same reason.
      function edgeRemap(w, b, c, curves) {
        let dw = 0, db = 0, dc = 0;
        const sWB = w + b;
        if (sWB > 1e-12) {
          const t = b / sWB;
          const dt = evalPrecomputed(curves.wb, t) - t;
          db += dt * sWB;
          dw -= dt * sWB;
        }
        const sBC = b + c;
        if (sBC > 1e-12) {
          const t = c / sBC;
          const dt = evalPrecomputed(curves.bc, t) - t;
          dc += dt * sBC;
          db -= dt * sBC;
        }
        const sWC = w + c;
        if (sWC > 1e-12) {
          const t = c / sWC;
          const dt = evalPrecomputed(curves.wc, t) - t;
          dc += dt * sWC;
          dw -= dt * sWC;
        }
        let wO = w + dw, bO = b + db, cO = c + dc;
        // Clamp against rare negative overshoot from overlapping
        // strong remaps, then renormalise so the result stays on the
        // simplex.
        if (wO < 0) wO = 0;
        if (bO < 0) bO = 0;
        if (cO < 0) cO = 0;
        const s = wO + bO + cO;
        if (s > 1e-12) { wO /= s; bO /= s; cO /= s; }
        return [wO, bO, cO];
      }

      function easeBary(w, b, c) {
        const cv = getCurves();
        const pWB = precomputeCurve(cv.wb);
        const pBC = precomputeCurve(cv.bc);
        const pWC = precomputeCurve(cv.wc);
        return edgeRemap(w, b, c, { wb: pWB, bc: pBC, wc: pWC });
      }

      function atBaryEased(hue, w, b, c) {
        const [wE, bE, cE] = easeBary(w, b, c);
        return strat().atBary(hue, wE, bE, cE);
      }

      function quantizeHue(h) {
        if (!state.nHues) return ((h % 360) + 360) % 360;
        const step = 360 / state.nHues;
        return ((Math.round(h / step) * step) % 360 + 360) % 360;
      }

      // Colour-name lookup for a given angle, per color space.
      // Each space has its own 0° so the anchors differ — HWB (sRGB
      // HSV) aligns with CSS named colours; OKLCH and HSLuv each
      // Canonical hue-name ranges along the HSL hue wheel, derived
      // from the cross-design-system survey at design/hue-name-survey
      // .html. Ranges are [start, end) in HSL degrees; wrap via the
      // final "red" entry that starts at 354° and the first that ends
      // at 9°. 20 names, chosen for ≥2-source agreement in the
      // survey. See design/color-system.md §14.
      //
      // Intentionally uses HSL (sRGB-based) hue as the keying axis,
      // not OKLCH hue — OKLCH stretches red→yellow to ~81° and
      // compresses green→cyan to ~53°, which warps cluster placement.
      // The concrete sRGB we look up is whatever the active color
      // space renders at its C corner for the given angle, so two
      // spaces at "180°" that produce different pure colors get
      // different names (by design).
      const HUE_NAME_RANGES = [
        [  0,   9, "red"],
        [  9,  16, "tomato"],
        [ 16,  22, "coral"],
        [ 22,  30, "orange"],
        [ 30,  38, "tangerine"],  // Crayola; bridges orange↔amber
        [ 38,  46, "amber"],
        [ 46,  55, "gold"],       // CSS (#ffd700); bridges amber↔yellow
        [ 55,  68, "yellow"],
        [ 68,  80, "olive"],
        [ 80,  95, "chartreuse"],
        [ 95, 120, "lime"],
        [120, 128, "green"],
        [128, 145, "grass"],      // Radix; splits HWB's two greens
        [145, 160, "emerald"],    // Tailwind; bridges green↔teal
        [160, 167, "jade"],       // Radix
        [167, 174, "teal"],
        [174, 182, "turquoise"],  // CSS
        [182, 187, "cyan"],
        [187, 193, "aqua"],       // CSS alias
        [193, 198, "cerulean"],   // established English hue name
        [198, 203, "sky"],        // Tailwind
        [203, 210, "dodger"],     // CSS dodgerblue
        [210, 218, "azure"],      // traditional English hue name
        [218, 238, "blue"],
        [238, 252, "iris"],       // Radix
        [252, 268, "indigo"],
        [268, 280, "violet"],
        [280, 295, "purple"],
        [295, 303, "fuchsia"],
        [303, 312, "orchid"],     // CSS (#da70d6); bridges fuchsia↔magenta
        [312, 321, "magenta"],
        [321, 328, "hotpink"],    // CSS hotpink
        [328, 338, "pink"],
        [338, 348, "rose"],       // Tailwind
        [348, 357, "crimson"],
        [357, 360, "red"],        // wrap
      ];

      function linearRgbToHslHue(r, g, b) {
        const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
        const d = mx - mn;
        if (d < 1e-9) return 0;
        let h = 0;
        if (mx === r)      h = ((g - b) / d) % 6;
        else if (mx === g) h = (b - r) / d + 2;
        else               h = (r - g) / d + 4;
        h *= 60;
        return ((h % 360) + 360) % 360;
      }

      // Look up the canonical hue name for a rendered sRGB triple.
      // The HSL hue is derived directly from sRGB (not linear sRGB —
      // HSL is gamma-encoded by definition).
      function hueNameForRgb(rgb) {
        const h = linearRgbToHslHue(rgb[0], rgb[1], rgb[2]);
        for (const [a, b, name] of HUE_NAME_RANGES) {
          if (h >= a && h < b) return name;
        }
        return HUE_NAME_RANGES[0][2];
      }

      // Convenience wrapper: given a hue angle in the active space,
      // render the C corner (pure hue), then look up its canonical
      // name. Cached per (space, angle) since it's called from
      // repaint hot paths and lookups are deterministic. Cache is
      // cleared on page load automatically.
      const hueNameCache = new Map();
      function hueNameAt(angle) {
        const key = state.space + ":" + Math.round(angle);
        let name = hueNameCache.get(key);
        if (name !== undefined) return name;
        const rgb = strat().ringAt(angle);
        name = hueNameForRgb(rgb);
        hueNameCache.set(key, name);
        return name;
      }

      // ═══════════════════════════════════════════════════════════
      // Color math
      // ═══════════════════════════════════════════════════════════

      function linearToSrgb(c) {
        const cc = Math.max(0, Math.min(1, c));
        if (cc <= 0.0031308) return 12.92 * cc;
        return 1.055 * Math.pow(cc, 1 / 2.4) - 0.055;
      }

      function srgbToLinear(c) {
        const cc = Math.max(0, Math.min(1, c));
        if (cc <= 0.04045) return cc / 12.92;
        return Math.pow((cc + 0.055) / 1.055, 2.4);
      }

      // Linear sRGB → OKLab (Björn Ottosson, 2020).
      function linearRgbToOklab(r, g, b) {
        const l = 0.4122214708 * r + 0.5363325363 * g + 0.0514459929 * b;
        const m = 0.2119034982 * r + 0.6806995451 * g + 0.1073969566 * b;
        const s = 0.0883024619 * r + 0.2817188376 * g + 0.6299787005 * b;
        const l_ = Math.cbrt(l);
        const m_ = Math.cbrt(m);
        const s_ = Math.cbrt(s);
        return [
          0.2104542553 * l_ + 0.7936177850 * m_ - 0.0040720468 * s_,
          1.9779984951 * l_ - 2.4285922050 * m_ + 0.4505937099 * s_,
          0.0259040371 * l_ + 0.7827717662 * m_ - 0.8086757660 * s_,
        ];
      }

      function srgbToOklab(rgb) {
        return linearRgbToOklab(
          srgbToLinear(rgb[0]), srgbToLinear(rgb[1]), srgbToLinear(rgb[2]),
        );
      }

      // OKLrab (Ottosson 2023): replace OKLab's L with a perceptual-
      // lightness estimator Lr so Euclidean distance tracks perceived
      // lightness more faithfully, especially in the dark region.
      // toe(0)=0, toe(1)=1; a and b channels are unchanged, so chroma
      // = √(a²+b²) is identical to OKLab's.
      const OKLR_K1 = 0.206;
      const OKLR_K2 = 0.03;
      const OKLR_K3 = (1 + OKLR_K1) / (1 + OKLR_K2);
      function oklabToOklrab(lab) {
        const L = lab[0];
        const kL = OKLR_K3 * L - OKLR_K1;
        const Lr = 0.5 * (kL + Math.sqrt(kL * kL + 4 * OKLR_K2 * OKLR_K3 * L));
        return [Lr, lab[1], lab[2]];
      }

      function srgbToOklrab(rgb) {
        return oklabToOklrab(srgbToOklab(rgb));
      }

      function deltaE_OKLrab(a, b) {
        const dL = a[0] - b[0], da = a[1] - b[1], db = a[2] - b[2];
        return Math.sqrt(dL * dL + da * da + db * db);
      }

      // — HSV / HWB — ------------------------------------------------
      function hsvToRgb(h, s, v) {
        const c = v * s;
        const hh = ((h % 360) + 360) % 360 / 60;
        const x = c * (1 - Math.abs(hh % 2 - 1));
        let r = 0, g = 0, b = 0;
        if      (hh < 1) { r = c; g = x; }
        else if (hh < 2) { r = x; g = c; }
        else if (hh < 3) { g = c; b = x; }
        else if (hh < 4) { g = x; b = c; }
        else if (hh < 5) { r = x; b = c; }
        else             { r = c; b = x; }
        const m = v - c;
        return [r + m, g + m, b + m];
      }
      function hwbToRgb(h, w, b) {
        if (w + b >= 1) {
          const g = w / (w + b);
          return [g, g, g];
        }
        const v = 1 - b;
        const s = v > 0 ? 1 - w / v : 0;
        return hsvToRgb(h, s, v);
      }

      // — OKLCH — ----------------------------------------------------
      function oklchToLinearRgb(L, C, H) {
        const hRad = H * Math.PI / 180;
        const a = C * Math.cos(hRad);
        const b = C * Math.sin(hRad);
        const lp = L + 0.3963377774 * a + 0.2158037573 * b;
        const mp = L - 0.1055613458 * a - 0.0638541728 * b;
        const sp = L - 0.0894841775 * a - 1.2914855480 * b;
        const l = lp * lp * lp;
        const m = mp * mp * mp;
        const s = sp * sp * sp;
        return [
          +4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s,
          -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s,
          -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s,
        ];
      }
      function oklabUnitToLinearRgb(S, a, b) {
        const sa = S * a, sb = S * b;
        const l_ = 1 + 0.3963377774 * sa + 0.2158037573 * sb;
        const m_ = 1 - 0.1055613458 * sa - 0.0638541728 * sb;
        const s_ = 1 - 0.0894841775 * sa - 1.2914855480 * sb;
        const l = l_ * l_ * l_;
        const m = m_ * m_ * m_;
        const s = s_ * s_ * s_;
        return [
          +4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s,
          -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s,
          -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s,
        ];
      }
      function findMaxSaturation(a, b) {
        let lo = 0, hi = 2.0;
        for (let i = 0; i < 48; i++) {
          const mid = (lo + hi) / 2;
          const [r, g, bc] = oklabUnitToLinearRgb(mid, a, b);
          if (Math.min(r, g, bc) >= 0) lo = mid;
          else hi = mid;
        }
        return lo;
      }
      function oklchCusp(hue) {
        const hRad = hue * Math.PI / 180;
        const a = Math.cos(hRad);
        const b = Math.sin(hRad);
        const S = findMaxSaturation(a, b);
        const k_l =  0.3963377774 * a + 0.2158037573 * b;
        const k_m = -0.1055613458 * a - 0.0638541728 * b;
        const k_s = -0.0894841775 * a - 1.2914855480 * b;
        const l_ = 1 + S * k_l;
        const m_ = 1 + S * k_m;
        const s_ = 1 + S * k_s;
        const l = l_ ** 3, m = m_ ** 3, s = s_ ** 3;
        const rgbMax = Math.max(
          +4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s,
          -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s,
          -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s,
        );
        const L_cusp = Math.cbrt(1 / rgbMax);
        const C_cusp = L_cusp * S * 0.985;
        return [L_cusp, C_cusp];
      }
      const OKLCH_CUSP_RAW = (() => {
        const lut = new Array(361);
        for (let h = 0; h <= 360; h++) lut[h] = oklchCusp(h);
        return lut;
      })();
      const OKLCH_CUSP = smooth(OKLCH_CUSP_RAW, 5);

      function smooth(lut, sigma) {
        const n = lut.length;
        const half = Math.ceil(3 * sigma);
        const out = new Array(n);
        for (let i = 0; i < n; i++) {
          let a = 0, b = 0, wSum = 0;
          for (let j = -half; j <= half; j++) {
            const w = Math.exp(-(j * j) / (2 * sigma * sigma));
            const k = ((i + j) % (n - 1) + (n - 1)) % (n - 1);
            a += lut[k][0] * w;
            b += lut[k][1] * w;
            wSum += w;
          }
          out[i] = [a / wSum, b / wSum];
        }
        return out;
      }

      // — HSLuv — ----------------------------------------------------
      const M_XYZ = [
        [ 3.240969941904521, -1.537383177570093, -0.498610760293],
        [-0.969243636280879,  1.875967501507720,  0.041555057407176],
        [ 0.055630079696993, -0.203976958888970,  1.056971514242879],
      ];
      const REF_U = 0.19783000664283;
      const REF_V = 0.46831999493879;
      const KAPPA = 903.2962962;
      const EPSILON = 0.0088564516;

      function lToY(L) {
        if (L <= 8) return L / KAPPA;
        const x = (L + 16) / 116;
        return x * x * x;
      }
      function getBounds(L) {
        const sub1 = ((L + 16) ** 3) / 1560896;
        const sub2 = sub1 > EPSILON ? sub1 : L / KAPPA;
        const bounds = [];
        for (let c = 0; c < 3; c++) {
