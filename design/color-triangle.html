<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <title>Color System Designer</title>
    <link rel="stylesheet" href="/style.css">
    <style>
      html {
        height: 100dvh;
      }
      body {
        height: 100dvh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: oklch(24% 0 0);
      }

      header.workbench {
        background: oklch(24% 0 0) !important;
      }

      header.workbench {
        flex: 0 0 auto;
        background: var(--color-bg-base);
        border-bottom: 1px solid var(--color-border-subtle);
        padding: 14px 18px 12px;
      }
      header.workbench h1 {
        font-size: var(--text-lg);
        font-weight: var(--weight-medium);
        margin-bottom: 2px;
      }
      header.workbench .lede {
        color: var(--color-text-secondary);
        font-size: var(--text-xs);
        margin-bottom: 14px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, auto));
        column-gap: 24px;
        row-gap: 10px;
        align-items: end;
      }
      .control {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .control__label {
        font-size: 9.5px;
        font-weight: var(--weight-medium);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--color-text-secondary);
      }
      .seg {
        display: inline-flex;
        align-self: flex-start;
        border: 1px solid var(--color-border-subtle);
        border-radius: 4px;
        overflow: hidden;
        background: var(--color-bg-panel);
      }
      .seg button {
        appearance: none;
        font: inherit;
        font-size: 11px;
        padding: 5px 10px;
        background: transparent;
        border: 0;
        border-right: 1px solid var(--color-border-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      .seg button:last-child { border-right: 0; }
      .seg button:hover {
        color: var(--color-text-primary);
        background: var(--color-bg-hover);
      }
      .seg button[aria-pressed="true"] {
        background: var(--color-text-primary);
        color: var(--color-bg-base);
      }
      .inline-controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .inline-control {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .inline-control__label {
        font-size: 9.5px;
        font-weight: var(--weight-medium);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--color-text-secondary);
      }
      main {
        flex: 1 1 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
        gap: 0;
        padding: 0;
        min-height: 0;
        min-width: 0;
      }

      section {
        margin: 0;
        padding: 10px 14px 14px;
        border: 0;
        border-radius: 0;
        background: oklch(24% 0 0);
        min-width: 0;
        min-height: 0;
        overflow: visible;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      /* Internal borders only — plus-sign cross between tiles. */
      section:nth-child(1) {
        border-right: 1px solid var(--color-border-subtle);
        border-bottom: 1px solid var(--color-border-subtle);
      }
      section:nth-child(2) {
        border-bottom: 1px solid var(--color-border-subtle);
      }
      section:nth-child(3) {
        border-right: 1px solid var(--color-border-subtle);
      }
      .section-head {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      h2 {
        font-size: var(--text-sm);
        font-weight: var(--weight-medium);
        margin: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
      }
      h2 .info {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 0;
        background: oklch(95% 0 0);
        color: oklch(12% 0 0);
        font-family: ui-monospace, "IBM Plex Mono", monospace;
        font-size: 11px;
        line-height: 16px;
        font-weight: 700;
        font-style: normal;
        cursor: help;
      }
      h2 .info:hover {
        background: oklch(100% 0 0);
      }
      h2 .info::after {
        content: attr(data-tooltip);
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        background: var(--color-bg-panel);
        color: var(--color-text-primary);
        padding: 8px 10px;
        border: 1px solid var(--color-border-subtle);
        border-radius: 4px;
        width: max-content;
        max-width: 320px;
        font-family: var(--font-ui);
        font-size: 11px;
        font-weight: var(--weight-regular);
        font-style: normal;
        line-height: 1.45;
        letter-spacing: 0;
        text-transform: none;
        white-space: normal;
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease;
        z-index: 100;
      }
      h2 .info:hover::after,
      h2 .info:focus::after {
        opacity: 1;
      }

      /* ── picker stage ─────────────────────────────────────── */

      .tri-row {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        align-items: start;
        min-height: 0;
        flex: 1 1 0;
      }
      .tri-stage {
        position: relative;
        aspect-ratio: 1;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        flex-shrink: 0;
      }
      canvas.tri-body,
      canvas.tri-ring {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        inset: 0;
      }
      .tri-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .tri-overlay-rotating {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .tri-cursor,
      .hue-cursor {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid oklch(95% 0 0);
        box-shadow: 0 0 0 1px oklch(10% 0 0);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .readouts {
        display: grid;
        grid-template-columns: auto 1fr;
        column-gap: 10px;
        row-gap: 2px;
        font-size: 10.5px;
        font-family: var(--font-ui);
        font-variant-numeric: tabular-nums;
      }
      .readouts dt { color: var(--color-text-secondary); }
      .swatch-sample {
        height: 36px;
        margin-top: 8px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--color-border-subtle);
      }

      .quant-dot,
      .hue-step-dot {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1.5px solid oklch(95% 0 0);
        box-shadow: 0 0 0 1px oklch(10% 0 0);
        transform: translate(-50%, -50%);
        pointer-events: auto;
        cursor: pointer;
      }
      .quant-dot[data-peer-hover] {
        outline: 2px solid oklch(100% 0 0);
        outline-offset: 2px;
        z-index: 10;
      }
      .token-grid .cell[data-peer-hover] {
        outline: 2px solid oklch(100% 0 0);
        outline-offset: -1px;
        z-index: 10;
      }
      .hue-step-dot[data-tooltip]::after {
        content: attr(data-tooltip);
        position: absolute;
        left: calc(50% + var(--label-offset-x, 0px));
        top: calc(50% + var(--label-offset-y, 0px));
        transform: translate(-50%, -50%);
        font-family: var(--font-ui);
        font-size: 9px;
        font-variant-numeric: tabular-nums;
        color: var(--color-text-primary);
        background: var(--color-bg-panel);
        padding: 1px 4px;
        border-radius: 2px;
        border: 1px solid var(--color-border-subtle);
        pointer-events: none;
        opacity: 0;
        transition: opacity 120ms ease;
        white-space: nowrap;
        z-index: 5;
      }
      .hue-step-dot:hover::after,
      .hue-step-dot:focus::after {
        opacity: 1;
      }
      .quant-dot[aria-selected="true"],
      .hue-step-dot[aria-selected="true"] {
        width: 18px;
        height: 18px;
        border-width: 3px;
      }

      /* ── 2D grid ──────────────────────────────────────────── */

      .token-grid {
        display: grid;
        gap: 3px;
        font-family: var(--font-ui);
        font-variant-numeric: tabular-nums;
      }
      .token-grid .cell {
        border-radius: 4px;
        border: 1px solid var(--color-border-subtle);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        cursor: default;
        min-width: 0;
        min-height: 0;
      }
      .token-grid .cell[data-empty] {
        border: 0;
        background: transparent;
      }
      .token-grid .cell[data-dark]  { color: oklch(95% 0 0); }
      .token-grid .cell[data-light] { color: oklch(15% 0 0); }
      .token-grid .axis-label {
        font-size: 9.5px;
        color: var(--color-text-secondary);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .token-grid .axis-label--row { justify-content: flex-end; padding-right: 4px; }

      /* ── arcs ─────────────────────────────────────────────── */

      .arcs-layout {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr);
        gap: 12px;
        align-items: stretch;
        min-height: 0;
        min-width: 0;
        flex: 1 1 0;
      }
      #arc-stage {
        align-self: center;
      }
      .arc-scales {
        display: grid;
        gap: 3px;
        height: 100%;
        min-height: 0;
        min-width: 0;
      }
      .arc-scale-label {
        font-size: 10px;
        color: var(--color-text-secondary);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.04em;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 4px;
        min-width: 0;
      }
      .arc-swatch {
        border-radius: 3px;
        border: 1px solid var(--color-border-subtle);
        min-width: 0;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-ui);
        font-size: 9px;
        font-variant-numeric: tabular-nums;
      }
      .arc-swatch[data-dark]  { color: oklch(95% 0 0); }
      .arc-swatch[data-light] { color: oklch(15% 0 0); }

      pre {
        font-family: var(--font-ui);
        font-size: 11px;
        line-height: 1.55;
        background: var(--color-bg-panel);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        max-width: 70ch;
        overflow: auto;
      }
      code { font-family: var(--font-ui); font-size: 0.9em; }
    </style>
  </head>
  <body>

    <header class="workbench">
      <h1>Color System Designer</h1>

      <div class="controls">
        <div class="control">
          <div class="control__label">Color space</div>
          <div class="seg" data-decision="space">
            <button data-value="hwb">HWB</button>
            <button data-value="oklch" aria-pressed="true">OKLCH</button>
            <button data-value="okhsl">OKHSL</button>
            <button data-value="okhsv">OKHSV</button>
            <button data-value="lchab">LCh(ab)</button>
            <button data-value="jzazbz">Jzazbz</button>
            <button data-value="hsluv">HSLuv</button>
            <button data-value="hpluv">HPLuv</button>
          </div>
        </div>

      </div>
    </header>

    <main>

      <!-- 1. Continuous picker -->
      <section>
        <div class="section-head">
          <h2>
            Continuous Color Picker
            <span class="info" tabindex="0" data-tooltip="Continuous tint / shade / tone picker. Triangle corners: pure hue (C), tint = hue + white (W), shade = hue + black (B). Interior points are tones (hue + grey). Drag the ring to change the hue.">i</span>
          </h2>
        </div>

        <div class="tri-row">
          <div class="tri-stage" id="picker-stage">
            <canvas class="tri-ring" id="picker-ring" width="600" height="600"></canvas>
            <canvas class="tri-body" id="picker-body" width="300" height="300"></canvas>
            <div class="tri-overlay-rotating" id="picker-body-overlay">
              <div class="tri-cursor" id="picker-cursor"></div>
            </div>
            <div class="tri-overlay" id="picker-overlay">
              <div class="hue-cursor" id="picker-hue-cursor"></div>
            </div>
          </div>
          <div>
            <dl class="readouts" id="picker-readouts"></dl>
            <div class="swatch-sample" id="picker-sample"></div>
          </div>
        </div>
      </section>

      <!-- 2. Tonal arcs (was 4) -->
      <section>
        <div class="section-head">
          <h2>
            Tonal Arc Scales
            <span class="info" tabindex="0" data-tooltip="A family of 1D scales, one per arc. Each arc runs black (shade extreme) → midpoint → white (tint extreme); the arcs differ by how much pure hue sits at the midpoint — c00 is fully greyscale, c100 has the pure hue at its peak. Every arc carries N evenly-spaced color stops.">i</span>
          </h2>
          <div class="inline-controls">
            <div class="inline-control">
              <span class="inline-control__label">N</span>
              <div class="seg" data-decision="arcN">
                <button data-value="5">5</button>
                <button data-value="7">7</button>
                <button data-value="9">9</button>
                <button data-value="11" aria-pressed="true">11</button>
                <button data-value="13">13</button>
                <button data-value="21">21</button>
              </div>
            </div>
            <div class="inline-control">
              <span class="inline-control__label">Arcs</span>
              <div class="seg" data-decision="arcCount">
                <button data-value="3">3</button>
                <button data-value="4">4</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>
                <button data-value="11" aria-pressed="true">11</button>
              </div>
            </div>
          </div>
        </div>

        <div class="arcs-layout">
          <div class="tri-stage" id="arc-stage">
            <canvas class="tri-body" id="arc-body" width="300" height="300" style="position: absolute; inset: 0;"></canvas>
            <svg class="tri-overlay" id="arc-svg" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%"></svg>
            <div class="tri-overlay-rotating" id="arc-dots-overlay"></div>
          </div>
          <div class="arc-scales" id="arc-scales"></div>
        </div>
      </section>

      <!-- 3. Quantized picker (was 2) -->
      <section>
        <div class="section-head">
          <h2>
            Quantized Color Picker
            <span class="info" tabindex="0" data-tooltip="Same tint / shade / tone space as tile 1, snapped to a finite grid. The only hues available are the evenly-spaced ring steps; the only tints, shades, and tones are the ternary-grid cells at resolution N.">i</span>
          </h2>
          <div class="inline-controls">
            <div class="inline-control">
              <span class="inline-control__label">Hue steps</span>
              <div class="seg" data-decision="nHues">
                <button data-value="12">12</button>
                <button data-value="16">16</button>
                <button data-value="24" aria-pressed="true">24</button>
              </div>
            </div>
          </div>
        </div>

        <div class="tri-row">
          <div class="tri-stage" id="quant-stage">
            <canvas class="tri-ring" id="quant-ring" width="600" height="600"></canvas>
            <canvas class="tri-body" id="quant-body" width="300" height="300"></canvas>
            <div class="tri-overlay-rotating" id="quant-body-overlay"></div>
            <div class="tri-overlay" id="quant-overlay">
              <div class="hue-cursor" id="quant-hue-cursor"></div>
            </div>
          </div>
          <div>
            <dl class="readouts" id="quant-readouts"></dl>
            <div class="swatch-sample" id="quant-sample"></div>
          </div>
        </div>
      </section>

      <!-- 4. 2D grid (was 3) -->
      <section>
        <div class="section-head">
          <h2>
            Tonal Grid Scale
            <span class="info" tabindex="0" data-tooltip="A single 2D scale that names every tint, shade, and tone at the selected hue — same cells as the Quantized Color Picker above, laid out on a flat rectangular grid instead of on the triangle. Rows = tone level k; columns = white-vs-black bias i. Top-left = black, top-right = white, bottom-left = pure hue.">i</span>
          </h2>
          <div class="inline-controls">
            <div class="inline-control">
              <span class="inline-control__label">N</span>
              <div class="seg" data-decision="N">
                <button data-value="2">2</button>
                <button data-value="4">4</button>
                <button data-value="5">5</button>
                <button data-value="10" aria-pressed="true">10</button>
                <button data-value="20">20</button>
              </div>
            </div>
            <div class="inline-control">
              <span class="inline-control__label">Naming</span>
              <div class="seg" data-decision="scheme">
                <button data-value="cl" aria-pressed="true">c-l</button>
                <button data-value="wb">w-b</button>
                <button data-value="num">XY</button>
              </div>
            </div>
          </div>
        </div>

        <div id="grid-target" style="flex: 1 1 0; min-height: 0; min-width: 0; overflow: hidden; display: flex; flex-direction: column;"></div>
      </section>

    </main>

    <script type="module">
      // ═══════════════════════════════════════════════════════════
      // Shared state
      // ═══════════════════════════════════════════════════════════

      const state = {
        space:  "oklch",
        hue:    180,
        nHues:  24,   // quantized hue step count (tile 2 only)
        N:      10,   // ternary-grid resolution (tiles 2 and 3 share this)
        arcN:   11,   // arc color-stop count per arc (tile 4)
        arcCount: 11, // number of arcs in tile 4
        scheme: "cl",
        picker: { w: 0.333, b: 0.333, geo: null },
        quant:  { i: 5, k: 5, geo: null },
      };

      function quantizeHue(h) {
        if (!state.nHues) return ((h % 360) + 360) % 360;
        const step = 360 / state.nHues;
        return ((Math.round(h / step) * step) % 360 + 360) % 360;
      }

      // Colour-name lookup for a given angle, per color space.
      // Each space has its own 0° so the anchors differ — HWB (sRGB
      // HSV) aligns with CSS named colours; OKLCH and HSLuv each
      // have slightly different hue positions. Hand-anchored from
      // the swatches produced at those angles.
      const HWB_ANCHORS = [
        [  0, "red"],      [ 30, "orange"], [ 60, "yellow"],
        [ 90, "chartreuse"], [120, "green"], [150, "spring"],
        [180, "cyan"],     [210, "azure"],  [240, "blue"],
        [270, "violet"],   [300, "magenta"],[330, "rose"],
      ];
      const OKLAB_ANCHORS = [
        [ 29, "red"],      [ 54, "orange"], [ 85, "yellow"],
        [120, "chartreuse"], [142, "green"], [170, "teal"],
        [196, "cyan"],     [232, "blue"],   [264, "indigo"],
        [303, "magenta"],  [355, "rose"],
      ];
      const HSLUV_ANCHORS = [
        [ 12, "red"],      [ 40, "orange"], [ 80, "yellow"],
        [115, "chartreuse"],[130, "green"], [160, "teal"],
        [192, "cyan"],     [225, "blue"],   [265, "violet"],
        [300, "magenta"],  [345, "rose"],
      ];
      const HUE_ANCHORS = {
        hwb:    HWB_ANCHORS,
        oklch:  OKLAB_ANCHORS,
        okhsl:  OKLAB_ANCHORS,
        okhsv:  OKLAB_ANCHORS,
        lchab:  HSLUV_ANCHORS,   // CIELab hue layout is close to CIELUV
        jzazbz: OKLAB_ANCHORS,   // rough approximation
        hsluv:  HSLUV_ANCHORS,
        hpluv:  HSLUV_ANCHORS,
      };
      function hueNameAt(angle) {
        const anchors = HUE_ANCHORS[state.space] || HUE_ANCHORS.hwb;
        let best = anchors[0], bestD = 361;
        for (const [a, name] of anchors) {
          const d = Math.min(Math.abs(angle - a), 360 - Math.abs(angle - a));
          if (d < bestD) { bestD = d; best = [a, name]; }
        }
        return best[1];
      }

      // ═══════════════════════════════════════════════════════════
      // Color math
      // ═══════════════════════════════════════════════════════════

      function linearToSrgb(c) {
        const cc = Math.max(0, Math.min(1, c));
        if (cc <= 0.0031308) return 12.92 * cc;
        return 1.055 * Math.pow(cc, 1 / 2.4) - 0.055;
      }

      // — HSV / HWB — ------------------------------------------------
      function hsvToRgb(h, s, v) {
        const c = v * s;
        const hh = ((h % 360) + 360) % 360 / 60;
        const x = c * (1 - Math.abs(hh % 2 - 1));
        let r = 0, g = 0, b = 0;
        if      (hh < 1) { r = c; g = x; }
        else if (hh < 2) { r = x; g = c; }
        else if (hh < 3) { g = c; b = x; }
        else if (hh < 4) { g = x; b = c; }
        else if (hh < 5) { r = x; b = c; }
        else             { r = c; b = x; }
        const m = v - c;
        return [r + m, g + m, b + m];
      }
      function hwbToRgb(h, w, b) {
        if (w + b >= 1) {
          const g = w / (w + b);
          return [g, g, g];
        }
        const v = 1 - b;
        const s = v > 0 ? 1 - w / v : 0;
        return hsvToRgb(h, s, v);
      }

      // — OKLCH — ----------------------------------------------------
      function oklchToLinearRgb(L, C, H) {
        const hRad = H * Math.PI / 180;
        const a = C * Math.cos(hRad);
        const b = C * Math.sin(hRad);
        const lp = L + 0.3963377774 * a + 0.2158037573 * b;
        const mp = L - 0.1055613458 * a - 0.0638541728 * b;
        const sp = L - 0.0894841775 * a - 1.2914855480 * b;
        const l = lp * lp * lp;
        const m = mp * mp * mp;
        const s = sp * sp * sp;
        return [
          +4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s,
          -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s,
          -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s,
        ];

      }

      // ═══════════════════════════════════════════════════════════
      // Color-space strategy
      // ═══════════════════════════════════════════════════════════
      //
      // Each strategy exposes:
      //   pureAtHue(hue) — RGB for the C vertex (fully saturated)
      //   atBary(hue, w, b, c) — RGB for an arbitrary barycentric point
      //   atStep(hue, t)  — RGB along the pure-color edge from
      //                     black (t=0) to pure (t=0.5) to white (t=1)
      //   arcPoint(hue, t, level) — RGB along arc `level` (0..1)
      //   readout(hue, w, b, c) — labelled tuple for display

      const STRATEGIES = {
        hwb: {
          label: "HWB",
          ringAt(hue) { return hsvToRgb(hue, 1, 1); },
          atBary(hue, w, b, c) { return hwbToRgb(hue, w, b); },
          readout(hue, w, b) {
            const c = 1 - w - b;
            return [
              ["hue",   `${hue.toFixed(0)}°`],
              ["tint",  w.toFixed(2)],
              ["shade", b.toFixed(2)],
              ["pure",  c.toFixed(2)],
              ["css",   `hwb(${hue.toFixed(0)} ${(w*100).toFixed(1)}% ${(b*100).toFixed(1)}%)`],
            ];
          },
        },
        oklch: {
          label: "OKLCH",
          ringAt(hue) {
            const [Lp, Cp] = OKLCH_CUSP[Math.round(((hue%360)+360)%360)];
            const [r, g, b] = oklchToLinearRgb(Lp, Cp, hue);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(b)];
          },
          atBary(hue, w, b, c) {
            const [Lp, Cp] = OKLCH_CUSP[Math.round(((hue%360)+360)%360)];
            const L = w + c * Lp;
            const C = c * Cp;
            const [r, gc, bl] = oklchToLinearRgb(L, C, hue);
            return [linearToSrgb(r), linearToSrgb(gc), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const [Lp, Cp] = OKLCH_CUSP[Math.round(((hue%360)+360)%360)];
            const L = w + c * Lp;
            const C = c * Cp;
            return [
              ["hue",    `${hue.toFixed(0)}°`],
              ["tint",   w.toFixed(2)],
              ["shade",  b.toFixed(2)],
              ["pure",   c.toFixed(2)],
              ["L*",     `${(L*100).toFixed(1)}%`],
              ["chroma", C.toFixed(3)],
              ["css",    `oklch(${(L*100).toFixed(1)}% ${C.toFixed(3)} ${hue.toFixed(0)})`],
            ];
          },
        },
        okhsl: {
          label: "OKHSL",
          ringAt(hue) {
            // OKHSL ring: s=1 at each hue's toe-adjusted cusp L.
            const cusp = okhslCuspAtHue(hue);
            // toe(L_cusp)
            const toeL = 0.5 * (OKHSL_K3 * cusp.L - OKHSL_K1
              + Math.sqrt((OKHSL_K3 * cusp.L - OKHSL_K1) ** 2
                + 4 * OKHSL_K2 * OKHSL_K3 * cusp.L));
            const [r, g, bl] = okhslToLinearRgb(hue, 1, toeL);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          atBary(hue, w, b, c) {
            // s = pure weight, l = perceptual blend of white and
            // cusp-lightness: w·1 + b·0 + c·toe(L_cusp).
            const cusp = okhslCuspAtHue(hue);
            const toeL = 0.5 * (OKHSL_K3 * cusp.L - OKHSL_K1
              + Math.sqrt((OKHSL_K3 * cusp.L - OKHSL_K1) ** 2
                + 4 * OKHSL_K2 * OKHSL_K3 * cusp.L));
            const l = w + c * toeL;
            const s = c;
            const [r, g, bl] = okhslToLinearRgb(hue, s, l);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const cusp = okhslCuspAtHue(hue);
            const toeL = 0.5 * (OKHSL_K3 * cusp.L - OKHSL_K1
              + Math.sqrt((OKHSL_K3 * cusp.L - OKHSL_K1) ** 2
                + 4 * OKHSL_K2 * OKHSL_K3 * cusp.L));
            const l = w + c * toeL;
            const s = c;
            return [
              ["hue",    `${hue.toFixed(0)}°`],
              ["tint",   w.toFixed(2)],
              ["shade",  b.toFixed(2)],
              ["pure",   c.toFixed(2)],
              ["L",      `${(l*100).toFixed(1)}%`],
              ["sat.",   `${(s*100).toFixed(1)}%`],
              ["css",    `okhsl(${hue.toFixed(0)} ${(s*100).toFixed(0)}% ${(l*100).toFixed(0)}%)`],
            ];
          },
        },
        okhsv: {
          label: "OKHSV",
          ringAt(hue) {
            const [r, g, b] = okhsvToLinearRgb(hue, 1, 1);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(b)];
          },
          atBary(hue, w, b, c) {
            // v = w + c (how bright); s = c / (w + c) (how saturated)
            const v = Math.min(1, Math.max(0, w + c));
            const denom = w + c;
            const s = denom > 1e-6 ? c / denom : 0;
            const [r, g, bl] = okhsvToLinearRgb(hue, s, v);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const v = Math.min(1, Math.max(0, w + c));
            const denom = w + c;
            const s = denom > 1e-6 ? c / denom : 0;
            return [
              ["hue",   `${hue.toFixed(0)}°`],
              ["tint",  w.toFixed(2)],
              ["shade", b.toFixed(2)],
              ["pure",  c.toFixed(2)],
              ["V",     `${(v*100).toFixed(1)}%`],
              ["sat.",  `${(s*100).toFixed(1)}%`],
              ["css",   `okhsv(${hue.toFixed(0)} ${(s*100).toFixed(0)}% ${(v*100).toFixed(0)}%)`],
            ];
          },
        },
        lchab: {
          label: "LCh(ab)",
          ringAt(hue) {
            const [Lp, Cp] = LCHAB_CUSP[Math.round(((hue%360)+360)%360)];
            const [r, g, b] = lchabToLinearRgb(Lp, Cp, hue);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(b)];
          },
          atBary(hue, w, b, c) {
            const [Lp, Cp] = LCHAB_CUSP[Math.round(((hue%360)+360)%360)];
            const L = w * 100 + c * Lp;
            const C = c * Cp;
            const [r, g, bl] = lchabToLinearRgb(L, C, hue);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const [Lp, Cp] = LCHAB_CUSP[Math.round(((hue%360)+360)%360)];
            const L = w * 100 + c * Lp;
            const C = c * Cp;
            return [
              ["hue",    `${hue.toFixed(0)}°`],
              ["tint",   w.toFixed(2)],
              ["shade",  b.toFixed(2)],
              ["pure",   c.toFixed(2)],
              ["L*",     `${L.toFixed(1)}`],
              ["C*",     C.toFixed(1)],
              ["css",    `lch(${L.toFixed(1)} ${C.toFixed(1)} ${hue.toFixed(0)})`],
            ];
          },
        },
        jzazbz: {
          label: "Jzazbz",
          ringAt(hue) {
            const [Jp, Cp] = JZ_CUSP[Math.round(((hue%360)+360)%360)];
            const [r, g, b] = jzczhzToLinearRgb(Jp, Cp, hue);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(b)];
          },
          atBary(hue, w, b, c) {
            const [Jp, Cp] = JZ_CUSP[Math.round(((hue%360)+360)%360)];
            const Jz = w * JZ_WHITE + c * Jp;
            const Cz = c * Cp;
            const [r, g, bl] = jzczhzToLinearRgb(Jz, Cz, hue);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const [Jp, Cp] = JZ_CUSP[Math.round(((hue%360)+360)%360)];
            const Jz = w * JZ_WHITE + c * Jp;
            const Cz = c * Cp;
            return [
              ["hue",    `${hue.toFixed(0)}°`],
              ["tint",   w.toFixed(2)],
              ["shade",  b.toFixed(2)],
              ["pure",   c.toFixed(2)],
              ["Jz",     Jz.toFixed(4)],
              ["Cz",     Cz.toFixed(4)],
            ];
          },
        },
        hpluv: {
          label: "HPLuv",
          ringAt(hue) {
            const L = HPLUV_CUSP_L_RAW[Math.round(((hue%360)+360)%360)];
            const [r, g, b] = hpluvToLinearRgb(hue, 100, L);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(b)];
          },
          atBary(hue, w, b, c) {
            const Lp = HPLUV_CUSP_L_RAW[Math.round(((hue%360)+360)%360)];
            const L = 100 * w + Lp * c;
            const S = 100 * c;
            const [r, g, bl] = hpluvToLinearRgb(hue, S, L);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const Lp = HPLUV_CUSP_L_RAW[Math.round(((hue%360)+360)%360)];
            const L = 100 * w + Lp * c;
            const S = 100 * c;
            return [
              ["hue",    `${hue.toFixed(0)}°`],
              ["tint",   w.toFixed(2)],
              ["shade",  b.toFixed(2)],
              ["pure",   c.toFixed(2)],
              ["L",      `${L.toFixed(1)}%`],
              ["sat.",   `${S.toFixed(1)}%`],
              ["css",    `hpluv(${hue.toFixed(0)} ${S.toFixed(0)}% ${L.toFixed(0)}%)`],
            ];
          },
        },
        hsluv: {
          label: "HSLuv",
          ringAt(hue) {
            const L = HSLUV_CUSP_L[Math.round(((hue%360)+360)%360)];
            const [r, g, b] = hsluvToLinearRgb(hue, 100, L);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(b)];
          },
          atBary(hue, w, b, c) {
            const Lp = HSLUV_CUSP_L[Math.round(((hue%360)+360)%360)];
            const L = 100 * w + Lp * c;
            const S = 100 * c;
            const [r, g, bl] = hsluvToLinearRgb(hue, S, L);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const Lp = HSLUV_CUSP_L[Math.round(((hue%360)+360)%360)];
            const L = 100 * w + Lp * c;
            const S = 100 * c;
            return [
              ["hue",    `${hue.toFixed(0)}°`],
              ["tint",   w.toFixed(2)],
              ["shade",  b.toFixed(2)],
              ["pure",   c.toFixed(2)],
              ["L",      `${L.toFixed(1)}%`],
              ["sat.",   `${S.toFixed(1)}%`],
              ["css",    `hsluv(${hue.toFixed(0)} ${S.toFixed(0)}% ${L.toFixed(0)}%)`],
            ];
          },
        },
      };

      function strat() { return STRATEGIES[state.space]; }

      // ═══════════════════════════════════════════════════════════
      // Geometry
      // ═══════════════════════════════════════════════════════════

      const DISPLAY_SIZE = 300;

      function geometry(size, { hasRing = false, hue = 0, flipped = false, ringWidth = 26, ringGap = 14, ringPad = 4, triPad = 20, cyShift = 0 } = {}) {
        const scale = size / DISPLAY_SIZE;
        const px = v => v * scale;
        const cx = size / 2, cy = size / 2 + cyShift;
        const ringOuter = hasRing ? size / 2 - px(ringPad) : 0;
        const ringInner = hasRing ? ringOuter - px(ringWidth) : 0;
        const gap = hasRing ? px(ringGap) : 0;
        const triR = hasRing ? ringInner - gap : size / 2 - px(triPad);
        // `flipped` swaps W and B angles so the triangle reads
        // "black bottom-left, white bottom-right" at hue=90 (C-top).
        const angles = flipped
          ? { C: hue, B: hue + 120, W: hue + 240 }
          : { C: hue, W: hue + 120, B: hue + 240 };
        const verts = {};
        for (const [k, deg] of Object.entries(angles)) {
          const r = deg * Math.PI / 180;
          verts[k] = [cx + triR * Math.cos(r), cy - triR * Math.sin(r)];
        }
        return { cx, cy, ringInner, ringOuter, triR, verts };
      }

      function barycentric(x, y, verts) {
        const [x1, y1] = verts.W, [x2, y2] = verts.B, [x3, y3] = verts.C;
        const det = (y2 - y3) * (x1 - x3) + (x3 - x2) * (y1 - y3);
        const w = ((y2 - y3) * (x - x3) + (x3 - x2) * (y - y3)) / det;
        const b = ((y3 - y1) * (x - x3) + (x1 - x3) * (y - y3)) / det;
        return [w, b, 1 - w - b];
      }
      function fromBarycentric(w, b, c, verts) {
        const [x1, y1] = verts.W, [x2, y2] = verts.B, [x3, y3] = verts.C;
        return [w * x1 + b * x2 + c * x3, w * y1 + b * y2 + c * y3];
      }
      function unrotate(dx, dy, hueDeg) {
        const rad = hueDeg * Math.PI / 180;
        const cos = Math.cos(rad), sin = Math.sin(rad);
        return [dx * cos - dy * sin, dx * sin + dy * cos];
      }

      // ═══════════════════════════════════════════════════════════
      // Painting
      // ═══════════════════════════════════════════════════════════

      function paintRing(canvas) {
        const ctx = canvas.getContext("2d");
        const { width, height } = canvas;
        const geo = geometry(width, { hasRing: true });
        const { cx, cy, ringInner, ringOuter } = geo;
        const img = ctx.createImageData(width, height);
        const data = img.data;

        const rInnerSq = ringInner * ringInner;
        const rOuterSq = ringOuter * ringOuter;
        const yMin = Math.max(0, Math.floor(cy - ringOuter - 1));
        const yMax = Math.min(height, Math.ceil(cy + ringOuter + 1));
        const xMin = Math.max(0, Math.floor(cx - ringOuter - 1));
        const xMax = Math.min(width, Math.ceil(cx + ringOuter + 1));

        const s = strat();
        for (let y = yMin; y < yMax; y++) {
          const dy = y - cy, dy2 = dy * dy;
          for (let x = xMin; x < xMax; x++) {
            const dx = x - cx;
            const distSq = dx * dx + dy2;
            if (distSq < rInnerSq || distSq > rOuterSq) continue;
            const angle = Math.atan2(-dy, dx) * 180 / Math.PI;
            const pixelHue = (angle + 360) % 360;
            const rgb = s.ringAt(pixelHue);
            const i = (y * width + x) * 4;
            data[i]     = Math.round(rgb[0] * 255);
            data[i + 1] = Math.round(rgb[1] * 255);
            data[i + 2] = Math.round(rgb[2] * 255);
            data[i + 3] = 255;
          }
        }
        ctx.putImageData(img, 0, 0);
      }

      function paintBody(canvas, hue, geoOverride) {
        const ctx = canvas.getContext("2d");
        const { width, height } = canvas;
        const geo = geoOverride || geometry(width, { hasRing: true, hue: 0 });
        const { cx, cy, triR, verts } = geo;
        ctx.clearRect(0, 0, width, height);

        const yMin = Math.max(0, Math.floor(cy - triR - 1));
        const yMax = Math.min(height, Math.ceil(cy + triR + 1));
        const xMin = Math.max(0, Math.floor(cx - triR - 1));
        const xMax = Math.min(width, Math.ceil(cx + triR + 1));
        const boxW = xMax - xMin;
        const boxH = yMax - yMin;

        const img = ctx.createImageData(boxW, boxH);
        const data = img.data;
        const [x1, y1] = verts.W, [x2, y2] = verts.B, [x3, y3] = verts.C;
        const det = (y2 - y3) * (x1 - x3) + (x3 - x2) * (y1 - y3);
        const invDet = 1 / det;
        const a1 = (y2 - y3) * invDet;
        const b1 = (x3 - x2) * invDet;
        const a2 = (y3 - y1) * invDet;
        const b2 = (x1 - x3) * invDet;

        const s = strat();
        for (let y = yMin; y < yMax; y++) {
          const dy = y - y3;
          for (let x = xMin; x < xMax; x++) {
            const dx = x - x3;
            const w = a1 * dx + b1 * dy;
            const b = a2 * dx + b2 * dy;
            const c = 1 - w - b;
            if (w < -0.002 || b < -0.002 || c < -0.002) continue;
            const wc = Math.max(0, w);
            const bc = Math.max(0, b);
            const cc = Math.max(0, c);
            const rgb = s.atBary(hue, wc, bc, cc);
            const i = ((y - yMin) * boxW + (x - xMin)) * 4;
            data[i]     = Math.round(rgb[0] * 255);
            data[i + 1] = Math.round(rgb[1] * 255);
            data[i + 2] = Math.round(rgb[2] * 255);
            data[i + 3] = 255;
          }
        }
        ctx.putImageData(img, xMin, yMin);
        return geo;
      }

      function cssFromRgb(rgb) {
        return `rgb(${Math.round(rgb[0] * 255)}, ${Math.round(rgb[1] * 255)}, ${Math.round(rgb[2] * 255)})`;
      }

      // ═══════════════════════════════════════════════════════════
      // Section 1 — Picker
      // ═══════════════════════════════════════════════════════════

      const pickerStage       = document.getElementById("picker-stage");
      const pickerBody        = document.getElementById("picker-body");
      const pickerRing        = document.getElementById("picker-ring");
      const pickerBodyOverlay = document.getElementById("picker-body-overlay");
      const pickerCursor      = document.getElementById("picker-cursor");
      const pickerHueCursor   = document.getElementById("picker-hue-cursor");
      const pickerReadouts    = document.getElementById("picker-readouts");
      const pickerSample      = document.getElementById("picker-sample");

      function repaintPicker() {
        paintRing(pickerRing);
        state.picker.geo = paintBody(pickerBody, state.hue);
        pickerBody.style.transform = `rotate(${-state.hue}deg)`;
        pickerBodyOverlay.style.transform = `rotate(${-state.hue}deg)`;
        updatePickerCursors();
        updatePickerReadout();
      }
      function updatePickerCursors() {
        const geo = state.picker.geo;
        const { w, b } = state.picker;
        const c = 1 - w - b;
        const [px, py] = fromBarycentric(w, b, c, geo.verts);
        const size = pickerBody.width;
        const s = strat();
        pickerCursor.style.left = (px / size * 100) + "%";
        pickerCursor.style.top  = (py / size * 100) + "%";
        pickerCursor.style.background = cssFromRgb(s.atBary(state.hue, w, b, c));
        const ringMid = (geo.ringInner + geo.ringOuter) / 2;
        const rad = state.hue * Math.PI / 180;
        pickerHueCursor.style.left = ((geo.cx + ringMid * Math.cos(rad)) / size * 100) + "%";
        pickerHueCursor.style.top  = ((geo.cy - ringMid * Math.sin(rad)) / size * 100) + "%";
        pickerHueCursor.style.background = cssFromRgb(s.ringAt(state.hue));
      }
      function updatePickerReadout() {
        const { w, b } = state.picker;
        const c = 1 - w - b;
        const rows = strat().readout(state.hue, w, b);
        pickerReadouts.innerHTML = rows.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join("");
        const rgb = strat().atBary(state.hue, w, b, c);
        pickerSample.style.background = cssFromRgb(rgb);
      }

      attachDrag(pickerStage, pickerBody, state.picker, {
        // Tile 1 is the continuous picker — never snap.
        onHue: h => { state.hue = ((h % 360) + 360) % 360; onHueChanged(); },
        onTri: (w, b) => { state.picker.w = w; state.picker.b = b; updatePickerCursors(); updatePickerReadout(); },
      }, "picker");

      // ═══════════════════════════════════════════════════════════
      // Section 2 — Quantized picker
      // ═══════════════════════════════════════════════════════════

      const quantStage       = document.getElementById("quant-stage");
      const quantBody        = document.getElementById("quant-body");
      const quantRing        = document.getElementById("quant-ring");
      const quantBodyOverlay = document.getElementById("quant-body-overlay");
      const quantOverlay     = document.getElementById("quant-overlay");
      const quantHueCursor   = document.getElementById("quant-hue-cursor");
      const quantReadouts    = document.getElementById("quant-readouts");
      const quantSample      = document.getElementById("quant-sample");

      function repaintQuant() {
        paintRing(quantRing);
        state.quant.geo = paintBody(quantBody, state.hue);
        quantBody.style.transform = `rotate(${-state.hue}deg)`;
        quantBodyOverlay.style.transform = `rotate(${-state.hue}deg)`;
        renderQuantDots();
        updateQuantReadout();
      }
      function renderQuantDots() {
        const { N, quant } = state;
        const geo = quant.geo;
        quantBodyOverlay.innerHTML = "";
        const size = quantBody.width;
        for (let k = 0; k <= N; k++) {
          for (let i = 0; i <= N - k; i++) {
            const j = N - i - k;
            const w = i / N, b = j / N, c = k / N;
            const [px, py] = fromBarycentric(w, b, c, geo.verts);
            const rgb = strat().atBary(state.hue, w, b, c);
            const dot = document.createElement("span");
            dot.className = "quant-dot";
            dot.style.left = (px / size * 100) + "%";
            dot.style.top  = (py / size * 100) + "%";
            dot.style.background = cssFromRgb(rgb);
            dot.title = tokenName(i, j, k, N);
            dot.dataset.cellI = i;
            dot.dataset.cellK = k;
            if (i === quant.i && k === quant.k) dot.setAttribute("aria-selected", "true");
            dot.addEventListener("click", () => {
              state.quant.i = i;
              state.quant.k = k;
              renderQuantDots();
              updateQuantReadout();
            });
            dot.addEventListener("mouseenter", () => setPeerHover(i, k));
            dot.addEventListener("mouseleave", () => setPeerHover(null));
            quantBodyOverlay.appendChild(dot);
          }
        }

        // Hue-step dots sit on the ring at the quantized hue
        // angles when state.nHues > 0; cleared otherwise.
        quantOverlay.querySelectorAll(".hue-step-dot").forEach(d => d.remove());
        const ringMid = (geo.ringInner + geo.ringOuter) / 2;
        if (state.nHues) {
          for (let h = 0; h < state.nHues; h++) {
            const angle = (h * 360) / state.nHues;
            const rad = angle * Math.PI / 180;
            const hx = geo.cx + ringMid * Math.cos(rad);
            const hy = geo.cy - ringMid * Math.sin(rad);
            const rgb = strat().ringAt(angle);
            const dot = document.createElement("span");
            dot.className = "hue-step-dot";
            dot.style.left = (hx / size * 100) + "%";
            dot.style.top  = (hy / size * 100) + "%";
            dot.style.background = cssFromRgb(rgb);
            // Small outward label with the hue name (common CSS
            // name) + degrees. The label nudges outward from the
            // ring centre along the radial so it doesn't overlap
            // the triangle.
            const outward = 22;
            const lx = Math.cos(rad) * outward;
            const ly = -Math.sin(rad) * outward;
            dot.style.setProperty("--label-offset-x", `${lx}px`);
            dot.style.setProperty("--label-offset-y", `${ly}px`);
            dot.dataset.tooltip = `${hueNameAt(angle)} ${angle.toFixed(0)}°`;
            if (Math.abs(((state.hue - angle) % 360 + 540) % 360 - 180) < 0.5) {
              dot.setAttribute("aria-selected", "true");
            }
            dot.addEventListener("click", e => {
              e.stopPropagation();
              state.hue = quantizeHue(angle);
              onHueChanged();
            });
            quantOverlay.appendChild(dot);
          }
        }

        // Continuous hue cursor (hidden when quantized, since the
        // selected step dot is marked instead).
        if (state.nHues) {
          quantHueCursor.style.display = "none";
        } else {
          quantHueCursor.style.display = "";
          const rad = state.hue * Math.PI / 180;
          quantHueCursor.style.left = ((geo.cx + ringMid * Math.cos(rad)) / size * 100) + "%";
          quantHueCursor.style.top  = ((geo.cy - ringMid * Math.sin(rad)) / size * 100) + "%";
        }
      }
      function updateQuantReadout() {
        const { N, quant } = state;
        const i = quant.i, k = quant.k, j = N - i - k;
        const w = i / N, b = j / N, c = k / N;
        const rows = [
          ["token", tokenName(i, j, k, N)],
          ["address", `i=${Math.round((i/N)*100)}, j=${Math.round((j/N)*100)}, k=${Math.round((k/N)*100)}`],
          ...strat().readout(state.hue, w, b),
        ];
        quantReadouts.innerHTML = rows.map(([key, v]) => `<dt>${key}</dt><dd>${v}</dd>`).join("");
        const rgb = strat().atBary(state.hue, w, b, c);
        quantSample.style.background = cssFromRgb(rgb);
      }

      // Snap a (mx, my) in quant-stage coords to the nearest
      // ternary-grid cell (i, k) and apply it to state.quant.
      function snapToNearestQuantDot(mx, my) {
        const geo = state.quant.geo;
        const dx = mx - geo.cx, dy = my - geo.cy;
        const [cdx, cdy] = unrotate(dx, dy, state.hue);
        const canonX = cdx + geo.cx, canonY = cdy + geo.cy;
        const { N } = state;
        let bestI = state.quant.i, bestK = state.quant.k, bestD = Infinity;
        for (let k = 0; k <= N; k++) {
          for (let i = 0; i <= N - k; i++) {
            const j = N - i - k;
            const w = i / N, b = j / N, c = k / N;
            const [px, py] = fromBarycentric(w, b, c, geo.verts);
            const d = Math.hypot(px - canonX, py - canonY);
            if (d < bestD) { bestD = d; bestI = i; bestK = k; }
          }
        }
        if (state.quant.i !== bestI || state.quant.k !== bestK) {
          state.quant.i = bestI;
          state.quant.k = bestK;
          renderQuantDots();
          updateQuantReadout();
        }
        // Mirror the peer-hover link during drag — the tile-4 grid
        // cell that matches the currently-snapped dot stays lit.
        setPeerHover(bestI, bestK);
      }

      quantStage.addEventListener("pointerdown", e => {
        const rect = quantStage.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * quantBody.width;
        const y = (e.clientY - rect.top) / rect.height * quantBody.height;
        const geo = state.quant.geo;
        const dx = x - geo.cx, dy = y - geo.cy;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // Decide target: ring if on the band, triangle if anywhere
        // inside the triangle bounds (with a generous margin so
        // you can drag a bit outside and still snap).
        let target = null;
        if (dist >= geo.ringInner - 2 && dist <= geo.ringOuter + 8) {
          target = "ring";
        } else if (dist < geo.ringInner - 2) {
          const [cdx, cdy] = unrotate(dx, dy, state.hue);
          const [w, b, c] = barycentric(cdx + geo.cx, cdy + geo.cy, geo.verts);
          if (w >= -0.1 && b >= -0.1 && c >= -0.1) target = "tri";
        }
        if (!target) return;

        quantStage.setPointerCapture(e.pointerId);
        if (target === "ring") activeDrag = "quant";

        let rafId = null, pendingEvt = null;
        const flush = () => {
          rafId = null;
          if (!pendingEvt) return;
          const ev = pendingEvt; pendingEvt = null;
          const r = quantStage.getBoundingClientRect();
          const mx = (ev.clientX - r.left) / r.width * quantBody.width;
          const my = (ev.clientY - r.top) / r.height * quantBody.height;
          if (target === "ring") {
            const g = state.quant.geo;
            const angle = Math.atan2(-(my - g.cy), mx - g.cx) * 180 / Math.PI;
            state.hue = quantizeHue(angle);
            onHueChanged();
          } else {
            snapToNearestQuantDot(mx, my);
          }
        };
        const dispatch = ev => {
          pendingEvt = ev;
          if (rafId === null) rafId = requestAnimationFrame(flush);
        };
        const up = () => {
          if (rafId) cancelAnimationFrame(rafId);
          quantStage.removeEventListener("pointermove", dispatch);
          quantStage.removeEventListener("pointerup", up);
          quantStage.removeEventListener("pointercancel", up);
          if (target === "ring") onDragEnd();
          if (target === "tri") setPeerHover(null);
        };

        // Initial snap.
        if (target === "ring") {
          const angle0 = Math.atan2(-dy, dx) * 180 / Math.PI;
          state.hue = quantizeHue(angle0);
          onHueChanged();
        } else {
          snapToNearestQuantDot(x, y);
        }

        quantStage.addEventListener("pointermove", dispatch);
        quantStage.addEventListener("pointerup", up);
        quantStage.addEventListener("pointercancel", up);
      });

      // ═══════════════════════════════════════════════════════════
      // Section 3 — 2D grid
      // ═══════════════════════════════════════════════════════════

      const gridTarget = document.getElementById("grid-target");

      // Percentage-based labels: 0 → "00", 50 → "50", 100 → "100".
      function pctLabel(v) {
        return v.toString().padStart(2, "0");
      }

      // Cross-tile highlight: hovering a cell in either the
      // quantized picker (tile 3) or the tonal grid (tile 4)
      // marks the matching (i, k) cell in the other tile with
      // `data-peer-hover`, so the correspondence is visible.
      function setPeerHover(i, k) {
        document.querySelectorAll("[data-peer-hover]").forEach(e =>
          e.removeAttribute("data-peer-hover"),
        );
        if (i == null) return;
        const sel = `[data-cell-i="${i}"][data-cell-k="${k}"]`;
        document.querySelectorAll(sel).forEach(e =>
          e.setAttribute("data-peer-hover", ""),
        );
      }

      function tokenName(i, j, k, N) {
        const iPct = pctLabel(Math.round((i / N) * 100));
        const jPct = pctLabel(Math.round((j / N) * 100));
        const kPct = pctLabel(Math.round((k / N) * 100));
        if (state.scheme === "cl")  return `c${kPct}-l${iPct}`;
        if (state.scheme === "wb")  return `w${iPct}b${jPct}`;
        if (state.scheme === "num") return `${kPct}-${iPct}`;
        return `c${kPct}-l${iPct}`;
      }

      function renderGrid() {
        const { N, hue } = state;
        const s = strat();
        const cols = N + 1, rows = N + 1;
        const grid = document.createElement("div");
        grid.className = "token-grid";
        grid.style.gridTemplateColumns = `20px repeat(${cols}, minmax(0, 1fr))`;
        grid.style.gridTemplateRows    = `16px repeat(${rows}, minmax(0, 1fr))`;
        grid.style.flex = "1 1 auto";
        grid.style.minHeight = "0";
        grid.style.minWidth = "0";

        // header
        const corner = document.createElement("div");
        corner.className = "axis-label";
        corner.textContent = "k\\i";
        grid.appendChild(corner);
        for (let i = 0; i < cols; i++) {
          const hdr = document.createElement("div");
          hdr.className = "axis-label";
          hdr.textContent = Math.round((i / N) * 100);
          grid.appendChild(hdr);
        }

        for (let k = 0; k < rows; k++) {
          const rowLabel = document.createElement("div");
          rowLabel.className = "axis-label axis-label--row";
          rowLabel.textContent = Math.round((k / N) * 100);
          grid.appendChild(rowLabel);
          for (let i = 0; i < cols; i++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            if (i + k > N) {
              cell.setAttribute("data-empty", "");
              grid.appendChild(cell);
              continue;
            }
            const j = N - i - k;
            const w = i / N, b = j / N, c = k / N;
            const rgb = s.atBary(hue, w, b, c);
            cell.style.background = cssFromRgb(rgb);
            cell.textContent = tokenName(i, j, k, N);
            const luma = 0.2126 * rgb[0] + 0.7152 * rgb[1] + 0.0722 * rgb[2];
            cell.setAttribute(luma > 0.55 ? "data-light" : "data-dark", "");
            cell.title = tokenName(i, j, k, N);
            cell.dataset.cellI = i;
            cell.dataset.cellK = k;
            cell.addEventListener("mouseenter", () => setPeerHover(i, k));
            cell.addEventListener("mouseleave", () => setPeerHover(null));
            grid.appendChild(cell);
          }
        }

        gridTarget.innerHTML = "";
        gridTarget.appendChild(grid);
      }

      // ═══════════════════════════════════════════════════════════
      // Section 4 — Arc-based scales
      // ═══════════════════════════════════════════════════════════

      const arcBody = document.getElementById("arc-body");
      const arcSvg  = document.getElementById("arc-svg");
      const arcDotsOverlay = document.getElementById("arc-dots-overlay");
      const arcScalesTarget = document.getElementById("arc-scales");

      // Arc parameterised so peak=0 is a straight line B→W (no
      // chroma) and peak=1 is a true V: B → C → W along the
      // triangle edges with a cusp at the C vertex. In between the
      // arcs are smooth curves that asymptotically approach the V.
      //
      // c(t, p) = p · (1 − |2t−1|^α),   α = 2 − p
      //   α=2, p=0 → straight line (c≡0).
      //   α=1, p=1 → 1 − |2t−1|, a triangle wave (V in chroma).
      //
      // (w, b) split blends the parabolic interior (w:b = t:(1-t))
      // toward the V's edge-hugging split (w=0 on B→C leg, b=0 on
      // C→W leg) as p → 1, so the full (w,b,c) point walks the
      // triangle edges at peak=1 and interiors in between.
      function arcBary(t, peak) {
        const alpha = 2 - peak;
        const u = Math.abs(2 * t - 1);
        const c = peak * (1 - Math.pow(u, alpha));
        const w0 = (1 - peak) * t        + peak * Math.max(0, 2 * t - 1);
        const b0 = (1 - peak) * (1 - t)  + peak * Math.max(0, 1 - 2 * t);
        const denom = w0 + b0;
        const scale = denom > 1e-10 ? (1 - c) / denom : 0;
        return [w0 * scale, b0 * scale, c];
      }

      // Arc length integration (numeric) in barycentric space for
      // uniform-along-arc sampling. `stops` is the actual number
      // of color samples to return per arc (so the off-by-one is
      // gone — the UI button that says "11" really produces 11
      // samples). Odd stops give a natural midpoint at index
      // (stops-1)/2 → arc length len/2 → t=0.5 on the symmetric
      // arc. That's why the seg restricts stops to odd values.
      function arcSamples(peak, stops) {
        const segs = 400;
        const pts = [];
        let len = 0;
        let prev = arcBary(0, peak);
        pts.push({ t: 0, s: 0, bary: prev });
        for (let i = 1; i <= segs; i++) {
          const t = i / segs;
          const cur = arcBary(t, peak);
          len += Math.hypot(cur[0] - prev[0], cur[1] - prev[1], cur[2] - prev[2]);
          pts.push({ t, s: len, bary: cur });
          prev = cur;
        }
        const out = [];
        const divisor = Math.max(1, stops - 1);
        for (let i = 0; i < stops; i++) {
          const target = (i / divisor) * len;
          let j = 0;
          while (j < pts.length - 1 && pts[j + 1].s < target) j++;
          const a = pts[j], b = pts[Math.min(j + 1, pts.length - 1)];
          const frac = (b.s - a.s) > 0 ? (target - a.s) / (b.s - a.s) : 0;
          const t = a.t + (b.t - a.t) * frac;
          out.push({ t, bary: arcBary(t, peak) });
        }
        return out;
      }

      function renderArcs() {
        // Tile 4 uses a fixed "painter's triangle" orientation:
        //   full color → top        (C at 90° math)
        //   black      → bottom-left (B at 210°)
        //   white      → bottom-right (W at 330°)
        // No CSS rotation — the triangle doesn't follow the hue.
        // Only the color interpolation uses state.hue.
        const width = arcBody.width;
        // Tile 4 has no ring, so skip the ring allotment and give
        // the triangle the full stage radius. The triangle is
        // inscribed in a circle whose centre is the centroid, so
        // its bounding box sits asymmetrically top-heavy; shift
        // cy down by R/4 so the bbox is vertically centred.
        const probe = geometry(width, { triPad: 6 });
        const geoTile4 = geometry(width, {
          hasRing: false, hue: 90, flipped: true,
          triPad: 6, cyShift: probe.triR / 4,
        });
        paintBody(arcBody, state.hue, geoTile4);
        arcBody.style.transform        = "";
        arcSvg.style.transform         = "";
        arcDotsOverlay.style.transform = "";
        arcDotsOverlay.innerHTML = "";

        const verts = geoTile4.verts;

        // Draw arcs as SVG paths so they anti-alias nicely.
        const svg = arcSvg;
        svg.innerHTML = "";
        const svgSize = 300;
        const scaleFactor = svgSize / arcBody.width;

        const s = strat();
        const peaks = [];
        for (let a = 0; a < state.arcCount; a++) {
          peaks.push(a / (state.arcCount - 1));
        }

        const arcData = [];
        for (let a = 0; a < state.arcCount; a++) {
          const peak = peaks[a];
          // Draw the continuous curve.
          let d = "";
          const curveSegs = 100;
          for (let i = 0; i <= curveSegs; i++) {
            const t = i / curveSegs;
            const [w, b, c] = arcBary(t, peak);
            const [px, py] = fromBarycentric(w, b, c, verts);
            const sx = px * scaleFactor;
            const sy = py * scaleFactor;
            d += (i === 0 ? "M " : "L ") + sx.toFixed(1) + " " + sy.toFixed(1) + " ";
          }
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", d);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke", "oklch(95% 0 0 / 0.45)");
          path.setAttribute("stroke-width", "1.5");
          svg.appendChild(path);

          // Sample N+1 points along arc length.
          const pts = arcSamples(peak, state.arcN);
          arcData.push({ peak, points: pts });

          // Dots — filled with the exact sample color and wrapped
          // in the shared .quant-dot white-border/dark-shadow style.
          for (const { bary } of pts) {
            const [px, py] = fromBarycentric(bary[0], bary[1], bary[2], verts);
            const rgb = s.atBary(state.hue, bary[0], bary[1], bary[2]);
            const dot = document.createElement("span");
            dot.className = "quant-dot";
            dot.style.left = (px / width * 100) + "%";
            dot.style.top  = (py / width * 100) + "%";
            dot.style.background = cssFromRgb(rgb);
            dot.style.pointerEvents = "none";
            dot.style.cursor = "default";
            arcDotsOverlay.appendChild(dot);
          }
        }

        // Single CSS grid so the x-gap between swatches matches
        // the y-gap between ramps exactly (both driven by the
        // container's `gap`).
        arcScalesTarget.innerHTML = "";
        const stops = state.arcN;
        arcScalesTarget.style.gridTemplateColumns =
          `34px repeat(${stops}, minmax(0, 1fr))`;
        arcScalesTarget.style.gridTemplateRows =
          `repeat(${state.arcCount}, minmax(0, 1fr))`;

        for (let a = 0; a < state.arcCount; a++) {
          const { peak, points } = arcData[a];
          const label = document.createElement("div");
          label.className = "arc-scale-label";
          const pct = Math.round(peak * 100);
          label.textContent = `c${pct.toString().padStart(2, "0")}`;
          arcScalesTarget.appendChild(label);
          const divisor = Math.max(1, stops - 1);
          for (let j = 0; j < points.length; j++) {
            const { bary } = points[j];
            const [w, b, c] = bary;
            const rgb = s.atBary(state.hue, w, b, c);
            const sw = document.createElement("div");
            sw.className = "arc-swatch";
            sw.style.background = cssFromRgb(rgb);
            const posPct = Math.round((j / divisor) * 100);
            sw.textContent = posPct.toString().padStart(2, "0");
            const luma = 0.2126 * rgb[0] + 0.7152 * rgb[1] + 0.0722 * rgb[2];
            sw.setAttribute(luma > 0.55 ? "data-light" : "data-dark", "");
            arcScalesTarget.appendChild(sw);
          }
        }
      }

      // ═══════════════════════════════════════════════════════════
      // Picker drag helpers
      // ═══════════════════════════════════════════════════════════

      function stageXY(evt, stage, canvas) {
        const rect = stage.getBoundingClientRect();
        return [
          (evt.clientX - rect.left) / rect.width * canvas.width,
          (evt.clientY - rect.top) / rect.height * canvas.height,
        ];
      }

      function attachDrag(stage, canvas, picker, hooks, dragKey) {
        stage.addEventListener("pointerdown", e => {
          const [x, y] = stageXY(e, stage, canvas);
          const geo = picker.geo;
          const dx = x - geo.cx, dy = y - geo.cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          let target;
          if (dist >= geo.ringInner - 2 && dist <= geo.ringOuter + 8) target = "ring";
          else {
            const [cdx, cdy] = unrotate(dx, dy, state.hue);
            const [w, b, c] = barycentric(cdx + geo.cx, cdy + geo.cy, geo.verts);
            if (w >= -0.01 && b >= -0.01 && c >= -0.01) target = "tri";
          }
          if (!target) return;
          stage.setPointerCapture(e.pointerId);
          if (target === "ring" && dragKey) activeDrag = dragKey;

          let rafId = null, pendingEvt = null;
          const flush = () => {
            rafId = null;
            if (!pendingEvt) return;
            const ev = pendingEvt; pendingEvt = null;
            const [mx, my] = stageXY(ev, stage, canvas);
            const mdx = mx - picker.geo.cx, mdy = my - picker.geo.cy;
            if (target === "ring") {
              const angle = Math.atan2(-mdy, mdx) * 180 / Math.PI;
              hooks.onHue((angle + 360) % 360);
            } else {
              const [cdx, cdy] = unrotate(mdx, mdy, state.hue);
              let [w, b, c] = barycentric(cdx + picker.geo.cx, cdy + picker.geo.cy, picker.geo.verts);
              w = Math.max(0, Math.min(1, w));
              b = Math.max(0, Math.min(1, b));
              if (w + b > 1) { const s = w + b; w /= s; b /= s; }
              hooks.onTri(w, b);
            }
          };
          const dispatch = ev => {
            pendingEvt = ev;
            if (rafId === null) rafId = requestAnimationFrame(flush);
          };
          // initial
          if (target === "ring") {
            const angle = Math.atan2(-dy, dx) * 180 / Math.PI;
            hooks.onHue((angle + 360) % 360);
          } else {
            const [cdx, cdy] = unrotate(dx, dy, state.hue);
            let [w, b, c] = barycentric(cdx + geo.cx, cdy + geo.cy, geo.verts);
            w = Math.max(0, Math.min(1, w));
            b = Math.max(0, Math.min(1, b));
            if (w + b > 1) { const s = w + b; w /= s; b /= s; }
            hooks.onTri(w, b);
          }

          const up = () => {
            if (rafId) cancelAnimationFrame(rafId);
            stage.removeEventListener("pointermove", dispatch);
            stage.removeEventListener("pointerup", up);
            stage.removeEventListener("pointercancel", up);
            if (target === "ring" && dragKey) onDragEnd();
          };
          stage.addEventListener("pointermove", dispatch);
          stage.addEventListener("pointerup", up);
          stage.addEventListener("pointercancel", up);
        });
      }

      // ═══════════════════════════════════════════════════════════
      // Controls
      // ═══════════════════════════════════════════════════════════

      function setSegActive(seg, value) {
        seg.querySelectorAll("button").forEach(b => {
          b.setAttribute("aria-pressed", b.dataset.value === String(value) ? "true" : "false");
        });
      }

      // During a ring drag, `activeDrag` pins updates to the tile
      // whose ring is being dragged; other tiles defer to idle /
      // pointerup so the dragged tile hits 60fps even on the
      // slower spaces (Jzazbz, LCh(ab)).
      let activeDrag = null;     // "picker" | "quant" | null
      let deferredRefresh = null; // requestIdleCallback handle

      function refreshIdleTiles() {
        if (deferredRefresh != null) {
          (cancelIdleCallback || clearTimeout)(deferredRefresh);
          deferredRefresh = null;
        }
        const run = () => {
          deferredRefresh = null;
          if (activeDrag !== "picker") repaintPicker();
          if (activeDrag !== "quant")  repaintQuant();
          renderGrid();
          renderArcs();
        };
        deferredRefresh = (requestIdleCallback || (cb => setTimeout(cb, 16)))(run, { timeout: 120 });
      }

      function onSpaceChanged() {
        repaintPicker();
        repaintQuant();
        renderGrid();
        renderArcs();
      }
      function onHueChanged() {
        if (activeDrag === "picker") {
          repaintPicker();
          refreshIdleTiles();
        } else if (activeDrag === "quant") {
          repaintQuant();
          refreshIdleTiles();
        } else {
          repaintPicker();
          repaintQuant();
          renderGrid();
          renderArcs();
        }
      }
      function onDragEnd() {
        activeDrag = null;
        if (deferredRefresh != null) {
          (cancelIdleCallback || clearTimeout)(deferredRefresh);
          deferredRefresh = null;
        }
        // Final full repaint so every tile reflects the settled hue.
        repaintPicker();
        repaintQuant();
        renderGrid();
        renderArcs();
      }
      function onNChanged() {
        // Clamp quant selection to new N; re-render tiles 2 and 3.
        // Tile 4 has its own arcN and is untouched.
        state.quant.i = Math.min(state.quant.i, state.N - state.quant.k);
        state.quant.k = Math.min(state.quant.k, state.N);
        renderQuantDots();
        updateQuantReadout();
        renderGrid();
      }
      function onSchemeChanged() {
        updatePickerReadout();
        updateQuantReadout();
        renderGrid();
      }

document.querySelectorAll('[data-decision="space"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          state.space = btn.dataset.value;
          setSegActive(btn.parentElement, state.space);
          onSpaceChanged();
        });
      });
      document.querySelectorAll('[data-decision="N"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          state.N = +btn.dataset.value;
          setSegActive(btn.parentElement, state.N);
          onNChanged();
        });
      });
      document.querySelectorAll('[data-decision="scheme"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          state.scheme = btn.dataset.value;
          setSegActive(btn.parentElement, state.scheme);
          onSchemeChanged();
        });
      });
      document.querySelectorAll('[data-decision="arcN"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          state.arcN = +btn.dataset.value;
          setSegActive(btn.parentElement, state.arcN);
          renderArcs();
        });
      });
      document.querySelectorAll('[data-decision="arcCount"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          state.arcCount = +btn.dataset.value;
          setSegActive(btn.parentElement, state.arcCount);
          renderArcs();
        });
      });
      document.querySelectorAll('[data-decision="nHues"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          state.nHues = +btn.dataset.value;
          setSegActive(btn.parentElement, state.nHues);
          // Snap current hue to the new quantization.
          state.hue = quantizeHue(state.hue);
          onHueChanged();
        });
      });

      // ═══════════════════════════════════════════════════════════
      // Initial paint
      // ═══════════════════════════════════════════════════════════

      repaintPicker();
      repaintQuant();
      renderGrid();
      renderArcs();
    </script>
  </body>
</html>
