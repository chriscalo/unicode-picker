            const cusp = okhslCuspAtHue(hue);
            const toeL = 0.5 * (OKHSL_K3 * cusp.L - OKHSL_K1
              + Math.sqrt((OKHSL_K3 * cusp.L - OKHSL_K1) ** 2
                + 4 * OKHSL_K2 * OKHSL_K3 * cusp.L));
            const l = w + c * toeL;
            const s = c;
            return [
              ["hue",    `${hue.toFixed(0)}°`],
              ["tint",   w.toFixed(2)],
              ["shade",  b.toFixed(2)],
              ["pure",   c.toFixed(2)],
              ["L",      `${(l*100).toFixed(1)}%`],
              ["sat.",   `${(s*100).toFixed(1)}%`],
              ["css",    `okhsl(${hue.toFixed(0)} ${(s*100).toFixed(0)}% ${(l*100).toFixed(0)}%)`],
            ];
          },
        },
        okhsv: {
          label: "OKHSV",
          ringAt(hue) {
            const [r, g, b] = okhsvToLinearRgb(hue, 1, 1);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(b)];
          },
          atBary(hue, w, b, c) {
            // v = w + c (how bright); s = c / (w + c) (how saturated)
            const v = Math.min(1, Math.max(0, w + c));
            const denom = w + c;
            const s = denom > 1e-6 ? c / denom : 0;
            const [r, g, bl] = okhsvToLinearRgb(hue, s, v);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const v = Math.min(1, Math.max(0, w + c));
            const denom = w + c;
            const s = denom > 1e-6 ? c / denom : 0;
            return [
              ["hue",   `${hue.toFixed(0)}°`],
              ["tint",  w.toFixed(2)],
              ["shade", b.toFixed(2)],
              ["pure",  c.toFixed(2)],
              ["V",     `${(v*100).toFixed(1)}%`],
              ["sat.",  `${(s*100).toFixed(1)}%`],
              ["css",   `okhsv(${hue.toFixed(0)} ${(s*100).toFixed(0)}% ${(v*100).toFixed(0)}%)`],
            ];
          },
        },
        lchab: {
          label: "LCh(ab)",
          ringAt(hue) {
            const [Lp, Cp] = LCHAB_CUSP[Math.round(((hue%360)+360)%360)];
            const [r, g, b] = lchabToLinearRgb(Lp, Cp, hue);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(b)];
          },
          atBary(hue, w, b, c) {
            const [Lp, Cp] = LCHAB_CUSP[Math.round(((hue%360)+360)%360)];
            const L = w * 100 + c * Lp;
            const C = c * Cp;
            const [r, g, bl] = lchabToLinearRgb(L, C, hue);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const [Lp, Cp] = LCHAB_CUSP[Math.round(((hue%360)+360)%360)];
            const L = w * 100 + c * Lp;
            const C = c * Cp;
            return [
              ["hue",    `${hue.toFixed(0)}°`],
              ["tint",   w.toFixed(2)],
              ["shade",  b.toFixed(2)],
              ["pure",   c.toFixed(2)],
              ["L*",     `${L.toFixed(1)}`],
              ["C*",     C.toFixed(1)],
              ["css",    `lch(${L.toFixed(1)} ${C.toFixed(1)} ${hue.toFixed(0)})`],
            ];
          },
        },
        jzazbz: {
          label: "Jzazbz",
          ringAt(hue) {
            const [Jp, Cp] = JZ_CUSP[Math.round(((hue%360)+360)%360)];
            const [r, g, b] = jzczhzToLinearRgb(Jp, Cp, hue);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(b)];
          },
          atBary(hue, w, b, c) {
            const [Jp, Cp] = JZ_CUSP[Math.round(((hue%360)+360)%360)];
            const Jz = w * JZ_WHITE + c * Jp;
            const Cz = c * Cp;
            const [r, g, bl] = jzczhzToLinearRgb(Jz, Cz, hue);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const [Jp, Cp] = JZ_CUSP[Math.round(((hue%360)+360)%360)];
            const Jz = w * JZ_WHITE + c * Jp;
            const Cz = c * Cp;
            return [
              ["hue",    `${hue.toFixed(0)}°`],
              ["tint",   w.toFixed(2)],
              ["shade",  b.toFixed(2)],
              ["pure",   c.toFixed(2)],
              ["Jz",     Jz.toFixed(4)],
              ["Cz",     Cz.toFixed(4)],
            ];
          },
        },
        hpluv: {
          label: "HPLuv",
          ringAt(hue) {
            const L = HPLUV_CUSP_L_RAW[Math.round(((hue%360)+360)%360)];
            const [r, g, b] = hpluvToLinearRgb(hue, 100, L);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(b)];
          },
          atBary(hue, w, b, c) {
            const Lp = HPLUV_CUSP_L_RAW[Math.round(((hue%360)+360)%360)];
            const L = 100 * w + Lp * c;
            const S = 100 * c;
            const [r, g, bl] = hpluvToLinearRgb(hue, S, L);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const Lp = HPLUV_CUSP_L_RAW[Math.round(((hue%360)+360)%360)];
            const L = 100 * w + Lp * c;
            const S = 100 * c;
            return [
              ["hue",    `${hue.toFixed(0)}°`],
              ["tint",   w.toFixed(2)],
              ["shade",  b.toFixed(2)],
              ["pure",   c.toFixed(2)],
              ["L",      `${L.toFixed(1)}%`],
              ["sat.",   `${S.toFixed(1)}%`],
              ["css",    `hpluv(${hue.toFixed(0)} ${S.toFixed(0)}% ${L.toFixed(0)}%)`],
            ];
          },
        },
        hsluv: {
          label: "HSLuv",
          ringAt(hue) {
            const L = HSLUV_CUSP_L[Math.round(((hue%360)+360)%360)];
            const [r, g, b] = hsluvToLinearRgb(hue, 100, L);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(b)];
          },
          atBary(hue, w, b, c) {
            const Lp = HSLUV_CUSP_L[Math.round(((hue%360)+360)%360)];
            const L = 100 * w + Lp * c;
            const S = 100 * c;
            const [r, g, bl] = hsluvToLinearRgb(hue, S, L);
            return [linearToSrgb(r), linearToSrgb(g), linearToSrgb(bl)];
          },
          readout(hue, w, b) {
            const c = 1 - w - b;
            const Lp = HSLUV_CUSP_L[Math.round(((hue%360)+360)%360)];
            const L = 100 * w + Lp * c;
            const S = 100 * c;
            return [
              ["hue",    `${hue.toFixed(0)}°`],
              ["tint",   w.toFixed(2)],
              ["shade",  b.toFixed(2)],
              ["pure",   c.toFixed(2)],
              ["L",      `${L.toFixed(1)}%`],
              ["sat.",   `${S.toFixed(1)}%`],
              ["css",    `hsluv(${hue.toFixed(0)} ${S.toFixed(0)}% ${L.toFixed(0)}%)`],
            ];
          },
        },
      };

      function strat() { return STRATEGIES[state.space]; }

      // ═══════════════════════════════════════════════════════════
      // Geometry
      // ═══════════════════════════════════════════════════════════

      const DISPLAY_SIZE = 300;

      function geometry(size, { hasRing = false, hue = 0, flipped = false, ringWidth = 26, ringGap = 14, ringPad = 4, triPad = 20, cyShift = 0 } = {}) {
        const scale = size / DISPLAY_SIZE;
        const px = v => v * scale;
        const cx = size / 2, cy = size / 2 + cyShift;
        const ringOuter = hasRing ? size / 2 - px(ringPad) : 0;
        const ringInner = hasRing ? ringOuter - px(ringWidth) : 0;
        const gap = hasRing ? px(ringGap) : 0;
        const triR = hasRing ? ringInner - gap : size / 2 - px(triPad);

        // `flipped` swaps W and B angles so the triangle reads
        // "black bottom-left, white bottom-right" at hue=90 (C-top).
        const angles = flipped
          ? { C: hue, B: hue + 120, W: hue + 240 }
          : { C: hue, W: hue + 120, B: hue + 240 };
        const verts = {};
        for (const [k, deg] of Object.entries(angles)) {
          const r = deg * Math.PI / 180;
          verts[k] = [cx + triR * Math.cos(r), cy - triR * Math.sin(r)];
        }
        return { cx, cy, ringInner, ringOuter, triR, verts };
      }

      function barycentric(x, y, verts) {
        const [x1, y1] = verts.W, [x2, y2] = verts.B, [x3, y3] = verts.C;
        const det = (y2 - y3) * (x1 - x3) + (x3 - x2) * (y1 - y3);
        const w = ((y2 - y3) * (x - x3) + (x3 - x2) * (y - y3)) / det;
        const b = ((y3 - y1) * (x - x3) + (x1 - x3) * (y - y3)) / det;
        return [w, b, 1 - w - b];
      }
      function fromBarycentric(w, b, c, verts) {
        const [x1, y1] = verts.W, [x2, y2] = verts.B, [x3, y3] = verts.C;
        return [w * x1 + b * x2 + c * x3, w * y1 + b * y2 + c * y3];
      }
      function unrotate(dx, dy, hueDeg) {
        const rad = hueDeg * Math.PI / 180;
        const cos = Math.cos(rad), sin = Math.sin(rad);
        return [dx * cos - dy * sin, dx * sin + dy * cos];
      }

      // ═══════════════════════════════════════════════════════════
      // Painting
      // ═══════════════════════════════════════════════════════════

      function paintRing(canvas) {
        const ctx = canvas.getContext("2d");
        const { width, height } = canvas;
        const geo = geometry(width, { hasRing: true });
        const { cx, cy, ringInner, ringOuter } = geo;
        const img = ctx.createImageData(width, height);
        const data = img.data;

        const rInnerSq = ringInner * ringInner;
        const rOuterSq = ringOuter * ringOuter;
        const yMin = Math.max(0, Math.floor(cy - ringOuter - 1));
        const yMax = Math.min(height, Math.ceil(cy + ringOuter + 1));
        const xMin = Math.max(0, Math.floor(cx - ringOuter - 1));
        const xMax = Math.min(width, Math.ceil(cx + ringOuter + 1));

        const s = strat();
        for (let y = yMin; y < yMax; y++) {
          const dy = y - cy, dy2 = dy * dy;
          for (let x = xMin; x < xMax; x++) {
            const dx = x - cx;
            const distSq = dx * dx + dy2;
            if (distSq < rInnerSq || distSq > rOuterSq) continue;
            const angle = Math.atan2(-dy, dx) * 180 / Math.PI;
            const pixelHue = (angle + 360) % 360;
            const rgb = s.ringAt(pixelHue);
            const i = (y * width + x) * 4;
            data[i]     = Math.round(rgb[0] * 255);
            data[i + 1] = Math.round(rgb[1] * 255);
            data[i + 2] = Math.round(rgb[2] * 255);
            data[i + 3] = 255;
          }
        }
        ctx.putImageData(img, 0, 0);
      }

      function paintBody(canvas, hue, geoOverride) {
        const ctx = canvas.getContext("2d");
        const { width, height } = canvas;
        const geo = geoOverride || geometry(width, { hasRing: true, hue: 0 });
        const { cx, cy, triR, verts } = geo;
        // Precompute per-edge curves for this paint so the inner
        // loop stays tight.
        const cv = getCurves();
        const needsEase =
          !curveIsIdentity(cv.wb) || !curveIsIdentity(cv.bc) || !curveIsIdentity(cv.wc);
        const pWB = precomputeCurve(cv.wb);
        const pBC = precomputeCurve(cv.bc);
        const pWC = precomputeCurve(cv.wc);
        const remapCurves = { wb: pWB, bc: pBC, wc: pWC };
        ctx.clearRect(0, 0, width, height);

        const yMin = Math.max(0, Math.floor(cy - triR - 1));
        const yMax = Math.min(height, Math.ceil(cy + triR + 1));
        const xMin = Math.max(0, Math.floor(cx - triR - 1));
        const xMax = Math.min(width, Math.ceil(cx + triR + 1));
        const boxW = xMax - xMin;
        const boxH = yMax - yMin;

        const img = ctx.createImageData(boxW, boxH);
        const data = img.data;
        const [x1, y1] = verts.W, [x2, y2] = verts.B, [x3, y3] = verts.C;
        const det = (y2 - y3) * (x1 - x3) + (x3 - x2) * (y1 - y3);
        const invDet = 1 / det;
        const a1 = (y2 - y3) * invDet;
        const b1 = (x3 - x2) * invDet;
        const a2 = (y3 - y1) * invDet;
        const b2 = (x1 - x3) * invDet;

        const s = strat();
        for (let y = yMin; y < yMax; y++) {
          const dy = y - y3;
          for (let x = xMin; x < xMax; x++) {
            const dx = x - x3;
            const w = a1 * dx + b1 * dy;
            const b = a2 * dx + b2 * dy;
            const c = 1 - w - b;
            if (w < -0.002 || b < -0.002 || c < -0.002) continue;
            let wc = Math.max(0, w);
            let bc = Math.max(0, b);
            let cc = Math.max(0, c);
            if (needsEase) {
              const r = edgeRemap(wc, bc, cc, remapCurves);
              wc = r[0]; bc = r[1]; cc = r[2];
            }
            const rgb = s.atBary(hue, wc, bc, cc);
            const i = ((y - yMin) * boxW + (x - xMin)) * 4;
            data[i]     = Math.round(rgb[0] * 255);
            data[i + 1] = Math.round(rgb[1] * 255);
            data[i + 2] = Math.round(rgb[2] * 255);
            data[i + 3] = 255;
          }
        }
        ctx.putImageData(img, xMin, yMin);
        return geo;
      }

      function cssFromRgb(rgb) {
        return `rgb(${Math.round(rgb[0] * 255)}, ${Math.round(rgb[1] * 255)}, ${Math.round(rgb[2] * 255)})`;
      }

      // ═══════════════════════════════════════════════════════════
      // Section 1 — Picker
      // ═══════════════════════════════════════════════════════════

      const pickerStage       = document.getElementById("picker-stage");
      const pickerBody        = document.getElementById("picker-body");
      const pickerRing        = document.getElementById("picker-ring");
      const pickerBodyOverlay = document.getElementById("picker-body-overlay");
      const pickerCursor      = document.getElementById("picker-cursor");
      const pickerHueCursor   = document.getElementById("picker-hue-cursor");
      const pickerStatusEl    = document.getElementById("picker-status");

      function repaintPicker() {
        paintRing(pickerRing);
        state.picker.geo = paintBody(pickerBody, state.hue);
        pickerBody.style.transform = `rotate(${-state.hue}deg)`;
        pickerBodyOverlay.style.transform = `rotate(${-state.hue}deg)`;
        updatePickerCursors();
        updatePickerReadout();
      }
      function updatePickerCursors() {
        const geo = state.picker.geo;
        const { w, b } = state.picker;
        const c = 1 - w - b;
        const [px, py] = fromBarycentric(w, b, c, geo.verts);
        const size = pickerBody.width;
        const s = strat();
        pickerCursor.style.left = (px / size * 100) + "%";
        pickerCursor.style.top  = (py / size * 100) + "%";
        pickerCursor.style.background = cssFromRgb(atBaryEased(state.hue, w, b, c));
        const ringMid = (geo.ringInner + geo.ringOuter) / 2;
        const rad = state.hue * Math.PI / 180;
        pickerHueCursor.style.left = ((geo.cx + ringMid * Math.cos(rad)) / size * 100) + "%";
        pickerHueCursor.style.top  = ((geo.cy - ringMid * Math.sin(rad)) / size * 100) + "%";
        pickerHueCursor.style.background = cssFromRgb(s.ringAt(state.hue));
      }
      function updatePickerReadout() {
        const { w, b } = state.picker;
        const c = 1 - w - b;
        const rows = [
          ["name", hueNameAt(state.hue)],
          ...strat().readout(state.hue, w, b),
        ];
        const rgb = atBaryEased(state.hue, w, b, c);
        renderStatusBar(pickerStatusEl, rows, rgb);
      }

      attachDrag(pickerStage, pickerBody, state.picker, {
        // Tile 1 is the continuous picker — never snap.
        onHue: h => { state.hue = ((h % 360) + 360) % 360; onHueChanged(); },
        onTri: (w, b) => { state.picker.w = w; state.picker.b = b; updatePickerCursors(); updatePickerReadout(); },
      }, "picker");

      // ═══════════════════════════════════════════════════════════
      // Section 2 — Quantized picker
      // ═══════════════════════════════════════════════════════════

      const quantStage       = document.getElementById("quant-stage");
      const quantBody        = document.getElementById("quant-body");
      const quantRing        = document.getElementById("quant-ring");
      const quantBodyOverlay = document.getElementById("quant-body-overlay");
      const quantOverlay     = document.getElementById("quant-overlay");
      const quantHueCursor   = document.getElementById("quant-hue-cursor");
      const quantStatusEl    = document.getElementById("quant-status");
      const hueListEl        = document.getElementById("hue-list");

      // Tile 2 right-side list of every quantized hue angle with its
      // pure-color swatch and (coarse, for now) English name.
      function renderHueList() {
        if (!hueListEl) return;
        const n = state.nHues || 24;
        hueListEl.style.gridTemplateRows =
          `repeat(${Math.min(n, 12)}, auto)`;
        const s = strat();
        const current = Math.round(state.hue);
        const items = [];
        for (let i = 0; i < n; i++) {
          const angle = Math.round((i * 360) / n);
          const rgb = s.ringAt(angle);
          const name = hueNameAt(angle);
          const isCurrent = angle === current;
          items.push(
            `<span class="hue-list__item" data-hue="${angle}" data-current="${isCurrent}">` +
              `<span class="hue-list__swatch" style="background:${cssFromRgb(rgb)}"></span>` +
              `<span class="hue-list__angle">${angle.toString().padStart(3, " ")}°</span>` +
              `<span class="hue-list__name">${name}</span>` +
            `</span>`
          );
        }
        hueListEl.innerHTML = items.join("");
      }

      function repaintQuant() {
        paintRing(quantRing);
        state.quant.geo = paintBody(quantBody, state.hue);
        quantBody.style.transform = `rotate(${-state.hue}deg)`;
        quantBodyOverlay.style.transform = `rotate(${-state.hue}deg)`;
        renderQuantDots();
        renderHueList();
        updateQuantReadout();
      }
      function renderQuantDots() {
        const { N, quant } = state;
        const geo = quant.geo;
        quantBodyOverlay.innerHTML = "";
        const size = quantBody.width;
        for (let k = 0; k <= N; k++) {
          for (let i = 0; i <= N - k; i++) {
            const j = N - i - k;
            const w = i / N, b = j / N, c = k / N;
            const [px, py] = fromBarycentric(w, b, c, geo.verts);
            const rgb = atBaryEased(state.hue, w, b, c);
            const dot = document.createElement("span");
            dot.className = "quant-dot";
            dot.style.left = (px / size * 100) + "%";
            dot.style.top  = (py / size * 100) + "%";
            dot.style.background = cssFromRgb(rgb);
            dot.title = tokenName(i, j, k, N);
            dot.dataset.cellI = i;
            dot.dataset.cellK = k;
            if (i === quant.i && k === quant.k) dot.setAttribute("aria-selected", "true");
            dot.addEventListener("click", () => {
              state.quant.i = i;
              state.quant.k = k;
              renderQuantDots();
              updateQuantReadout();
            });
            dot.addEventListener("mouseenter", () => setPeerHover(i, k));
            dot.addEventListener("mouseleave", () => setPeerHover(null));
            quantBodyOverlay.appendChild(dot);
          }
        }

        // Hue-step dots sit on the ring at the quantized hue
        // angles when state.nHues > 0; cleared otherwise.
        quantOverlay.querySelectorAll(".hue-step-dot").forEach(d => d.remove());
        const ringMid = (geo.ringInner + geo.ringOuter) / 2;
        if (state.nHues) {
          for (let h = 0; h < state.nHues; h++) {
            const angle = (h * 360) / state.nHues;
            const rad = angle * Math.PI / 180;
            const hx = geo.cx + ringMid * Math.cos(rad);
            const hy = geo.cy - ringMid * Math.sin(rad);
            const rgb = strat().ringAt(angle);
            const dot = document.createElement("span");
            dot.className = "hue-step-dot";
            dot.style.left = (hx / size * 100) + "%";
            dot.style.top  = (hy / size * 100) + "%";
            dot.style.background = cssFromRgb(rgb);
            // Small outward label with the hue name (common CSS
            // name) + degrees. The label nudges outward from the
            // ring centre along the radial so it doesn't overlap
            // the triangle.
            const outward = 30;
            const lx = Math.cos(rad) * outward;
            const ly = -Math.sin(rad) * outward;
            dot.style.setProperty("--label-offset-x", `${lx}px`);
            dot.style.setProperty("--label-offset-y", `${ly}px`);
            dot.dataset.tooltip = hueNameAt(angle);
            if (Math.abs(((state.hue - angle) % 360 + 540) % 360 - 180) < 0.5) {
              dot.setAttribute("aria-selected", "true");
            }
            dot.addEventListener("click", e => {
              e.stopPropagation();
              state.hue = quantizeHue(angle);
              onHueChanged();
            });
            quantOverlay.appendChild(dot);
          }
        }

        // Continuous hue cursor (hidden when quantized, since the
        // selected step dot is marked instead).
        if (state.nHues) {
          quantHueCursor.style.display = "none";
        } else {
          quantHueCursor.style.display = "";
          const rad = state.hue * Math.PI / 180;
          quantHueCursor.style.left = ((geo.cx + ringMid * Math.cos(rad)) / size * 100) + "%";
          quantHueCursor.style.top  = ((geo.cy - ringMid * Math.sin(rad)) / size * 100) + "%";
        }
      }
      function updateQuantReadout() {
        const { N, quant } = state;
        const i = quant.i, k = quant.k, j = N - i - k;
        const w = i / N, b = j / N, c = k / N;
        const rows = [
          ["name",  hueNameAt(state.hue)],
          ["token", tokenName(i, j, k, N)],
          ...strat().readout(state.hue, w, b),
        ];
        const rgb = atBaryEased(state.hue, w, b, c);
        renderStatusBar(quantStatusEl, rows, rgb);
      }

      // Snap a (mx, my) in quant-stage coords to the nearest
      // ternary-grid cell (i, k) and apply it to state.quant.
      function snapToNearestQuantDot(mx, my) {
        const geo = state.quant.geo;
        const dx = mx - geo.cx, dy = my - geo.cy;
        const [cdx, cdy] = unrotate(dx, dy, state.hue);
        const canonX = cdx + geo.cx, canonY = cdy + geo.cy;
        const { N } = state;
        let bestI = state.quant.i, bestK = state.quant.k, bestD = Infinity;
        for (let k = 0; k <= N; k++) {
          for (let i = 0; i <= N - k; i++) {
            const j = N - i - k;
            const w = i / N, b = j / N, c = k / N;
            const [px, py] = fromBarycentric(w, b, c, geo.verts);
            const d = Math.hypot(px - canonX, py - canonY);
            if (d < bestD) { bestD = d; bestI = i; bestK = k; }
          }
        }
        if (state.quant.i !== bestI || state.quant.k !== bestK) {
          state.quant.i = bestI;
          state.quant.k = bestK;
          renderQuantDots();
          updateQuantReadout();
        }
        // Mirror the peer-hover link during drag — the tile-4 grid
        // cell that matches the currently-snapped dot stays lit.
        setPeerHover(bestI, bestK);
      }

      quantStage.addEventListener("pointerdown", e => {
        const rect = quantStage.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * quantBody.width;
        const y = (e.clientY - rect.top) / rect.height * quantBody.height;
        const geo = state.quant.geo;
        const dx = x - geo.cx, dy = y - geo.cy;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // Decide target: ring if on the band, triangle if anywhere
        // inside the triangle bounds (with a generous margin so
        // you can drag a bit outside and still snap).
        let target = null;
        if (dist >= geo.ringInner - 2 && dist <= geo.ringOuter + 8) {
          target = "ring";
        } else if (dist < geo.ringInner - 2) {
          const [cdx, cdy] = unrotate(dx, dy, state.hue);
          const [w, b, c] = barycentric(cdx + geo.cx, cdy + geo.cy, geo.verts);
          if (w >= -0.1 && b >= -0.1 && c >= -0.1) target = "tri";
        }
        if (!target) return;

        quantStage.setPointerCapture(e.pointerId);
        if (target === "ring") activeDrag = "quant";

        let rafId = null, pendingEvt = null;
        const flush = () => {
          rafId = null;
          if (!pendingEvt) return;
          const ev = pendingEvt; pendingEvt = null;
          const r = quantStage.getBoundingClientRect();
          const mx = (ev.clientX - r.left) / r.width * quantBody.width;
          const my = (ev.clientY - r.top) / r.height * quantBody.height;
          if (target === "ring") {
            const g = state.quant.geo;
            const angle = Math.atan2(-(my - g.cy), mx - g.cx) * 180 / Math.PI;
            state.hue = quantizeHue(angle);
            onHueChanged();
          } else {
            snapToNearestQuantDot(mx, my);
          }
        };
        const dispatch = ev => {
          pendingEvt = ev;
          if (rafId === null) rafId = requestAnimationFrame(flush);
        };
        const up = () => {
          if (rafId) cancelAnimationFrame(rafId);
          quantStage.removeEventListener("pointermove", dispatch);
          quantStage.removeEventListener("pointerup", up);
          quantStage.removeEventListener("pointercancel", up);
          if (target === "ring") onDragEnd();
          if (target === "tri") setPeerHover(null);
        };

        // Initial snap.
        if (target === "ring") {
          const angle0 = Math.atan2(-dy, dx) * 180 / Math.PI;
          state.hue = quantizeHue(angle0);
          onHueChanged();
        } else {
          snapToNearestQuantDot(x, y);
        }

        quantStage.addEventListener("pointermove", dispatch);
        quantStage.addEventListener("pointerup", up);
        quantStage.addEventListener("pointercancel", up);
      });

      // ═══════════════════════════════════════════════════════════
      // Section 3 — 2D grid
      // ═══════════════════════════════════════════════════════════

      const gridTarget = document.getElementById("grid-target");

      // Percentage-based labels: 0 → "00", 50 → "50", 100 → "100".
      function pctLabel(v) {
        return v.toString().padStart(2, "0");
      }

      // Cross-tile highlight: hovering a cell in either the
      // quantized picker (tile 3) or the tonal grid (tile 4)
      // marks the matching (i, k) cell in the other tile with
      // `data-peer-hover`, so the correspondence is visible.
      function setPeerHover(i, k) {
        document.querySelectorAll("[data-peer-hover]").forEach(e =>
          e.removeAttribute("data-peer-hover"),
        );
        if (i == null) return;
        const sel = `[data-cell-i="${i}"][data-cell-k="${k}"]`;
        document.querySelectorAll(sel).forEach(e => {
          e.setAttribute("data-peer-hover", "");
          // SVG has no z-index; reorder to the end of the parent so
          // the hover outline isn't covered by later siblings.
          if (e.tagName.toLowerCase() === "polygon") {
            e.parentNode.appendChild(e);
          }
        });
      }
      // Same idea for tile 2: hovering a dot on the triangle or a
      // swatch in the ramp grid highlights its (arc, stop) peer.
      function setArcPeerHover(a, j) {
        document.querySelectorAll("[data-arc-peer-hover]").forEach(e =>
          e.removeAttribute("data-arc-peer-hover"),
        );
        if (a == null) return;
        const sel = `[data-arc-a="${a}"][data-arc-j="${j}"]`;
        document.querySelectorAll(sel).forEach(e =>
          e.setAttribute("data-arc-peer-hover", ""),
        );
      }

      function tokenName(i, j, k, N) {
        const iPct = pctLabel(Math.round((i / N) * 100));
        const jPct = pctLabel(Math.round((j / N) * 100));
        return `${jPct}b-${iPct}w`;
      }

      // ═══════════════════════════════════════════════════════════
      // Scale-quality score (§13 of design/color-system.md).
      // Adjacent-pair ΔE in OKLab; CV for smoothness; near-identical
      // count for wasted slots; signed reversal count for arcs;
      // gamut-reach bonus for how colorful the pure corner is.
      // ═══════════════════════════════════════════════════════════

      // OKLrab Euclidean ΔE lives around 0.01–0.10 for "just
      // noticeable" through "obvious". τ=0.01 is roughly the JND;
      // pairs below it read as duplicates.
      const SCORE_NEAR_IDENT_TAU = 0.01;
      // Pure-corner chroma ≥ this counts as "fully saturated" for the
      // Reach sub-score. Empirical p95 of chroma reachable in sRGB.
      const SCORE_REFERENCE_CHROMA = 0.22;
      // meanCV ≥ this counts as "fully uneven" for the Smooth sub-
      // score. Stddev of adjacent ΔEs being half the mean is already
      // clearly broken. Tune against the calibration corpus later.
      const SCORE_CV_CEILING = 0.5;

      function scoreScale(rgbs, { truncateEnds = false, isArc = false } = {}) {
        const labs = rgbs.map(srgbToOklrab);
        const d = [];
        for (let i = 0; i < labs.length - 1; i++) {
          d.push(deltaE_OKLrab(labs[i], labs[i + 1]));
        }
        if (d.length === 0) {
          return { d: [], mean: 0, cv: 0, nearIdentical: 0,
                   reversals: 0, combined: 0, worst: null };
        }
        const useRange = truncateEnds && d.length > 2
          ? d.slice(1, -1) : d;
        const mean = useRange.reduce((a, b) => a + b, 0) / useRange.length;
        let variance = 0;
        for (const x of useRange) variance += (x - mean) * (x - mean);
        variance /= useRange.length;
        const cv = mean > 1e-9 ? Math.sqrt(variance) / mean : 0;
        const nearIdentical = d.filter(x => x < SCORE_NEAR_IDENT_TAU).length;
        let reversals = 0;
        if (isArc) {
          // On an arc, perceptual distance from the midpoint should grow
          // monotonically in each direction. A drop → reversal.
          for (let i = 1; i < d.length; i++) {
            // No reversal metric enforced for now; the CV term already
            // penalises non-smooth arcs and monotonicity is tricky to
            // define cleanly when the curve bends back.
          }
        }
        let worstIdx = 0, worstD = -1, worstReason = "max jump";
        for (let i = 0; i < d.length; i++) {
          if (d[i] > worstD) { worstD = d[i]; worstIdx = i; }
        }
        let worstMinIdx = 0, worstMin = Infinity;
        for (let i = 0; i < d.length; i++) {
          if (d[i] < worstMin) { worstMin = d[i]; worstMinIdx = i; }
        }
        if (worstMin < SCORE_NEAR_IDENT_TAU) {
          worstIdx = worstMinIdx; worstD = worstMin; worstReason = "near-identical";
        }
        return {
          d, mean, cv, nearIdentical, reversals,
          worst: { i: worstIdx, deltaE: worstD, reason: worstReason },
        };
      }

      function scoreGamutReach(hue) {
        // Distance of the reachable pure corner from the L axis in
        // OKLrab. Uses the active strategy's own atBary at the C
        // corner so every space is judged by what it actually renders.
        // chroma = √(a² + b²) is identical in OKLab and OKLrab (only L
        // changes); we use the Lr converter here purely for consistency.
        const s = strat();
        const rgb = s.atBary(hue, 0, 0, 1);
        const lab = srgbToOklrab(rgb);
        const chromaC = Math.sqrt(lab[1] * lab[1] + lab[2] * lab[2]);
        return { chromaC, area: 0.5 * chromaC };
      }

      // Three sub-scores each in [0, 100] with explicit floors and
      // ceilings, averaged into one Quality number in [0, 100].
      // Higher = better. See §13.2 of design/color-system.md.
      function combineScore({ cv, nearIdentical, pairCount, reach }) {
        const distinctQ = pairCount > 0
          ? 100 * (1 - nearIdentical / pairCount)
          : 100;
        const smoothQ = 100 * (1 - Math.min(1, cv / SCORE_CV_CEILING));
        const reachQ = 100 * Math.min(1,
          (reach.chromaC || 0) / SCORE_REFERENCE_CHROMA);
        const quality = (distinctQ + smoothQ + reachQ) / 3;
        return { quality, distinctQ, smoothQ, reachQ };
      }

      function scoreGrid(gridRgbs, N, { hue }) {
        // gridRgbs[j][i] = sRGB triple at (b_idx=j, w_idx=i); cells with
        // i + j > N are absent (null).
        const rows = [], cols = [];
        for (let j = 0; j <= N; j++) {
          const row = [];
          for (let i = 0; i <= N - j; i++) row.push(gridRgbs[j][i]);
          if (row.length >= 2) rows.push(scoreScale(row));
        }
        for (let i = 0; i <= N; i++) {
          const col = [];
          for (let j = 0; j <= N - i; j++) col.push(gridRgbs[j][i]);
          if (col.length >= 2) cols.push(scoreScale(col));
        }
        const diag = [];
        for (let k = 0; k <= N; k++) {
          const line = [];
          for (let j = 0; j <= k; j++) {
            const i = k - j;
            if (i <= N && j <= N && gridRgbs[j][i]) line.push(gridRgbs[j][i]);
          }
          if (line.length >= 2) diag.push(scoreScale(line));
        }
        const all = [...rows, ...cols, ...diag];
        const meanCV = all.length
          ? all.reduce((s, r) => s + r.cv, 0) / all.length : 0;
        const nearIdentical = all.reduce((s, r) => s + r.nearIdentical, 0);
        const pairCount = all.reduce((s, r) => s + r.d.length, 0);
        const reach = scoreGamutReach(hue);
        const q = combineScore({
          cv: meanCV, nearIdentical, pairCount, reach,
        });
        return { rows, cols, diag, meanCV, nearIdentical, pairCount,
                 reach, ...q };
      }

      function scoreArcSet(arcRgbs, { hue }) {
        // arcRgbs is an array of arcs, each an array of sRGB triples.
        const perArc = arcRgbs.map(rgbs => scoreScale(rgbs,
          { truncateEnds: true, isArc: true }));
        const meanCV = perArc.length
          ? perArc.reduce((s, r) => s + r.cv, 0) / perArc.length : 0;
        const nearIdentical = perArc.reduce((s, r) => s + r.nearIdentical, 0);
        const pairCount = perArc.reduce((s, r) => s + r.d.length, 0);
        const reach = scoreGamutReach(hue);
        const q = combineScore({
          cv: meanCV, nearIdentical, pairCount, reach,
        });
        return { perArc, meanCV, nearIdentical, pairCount, reach, ...q };
      }

      function statusItem(key, value, wide = false) {
        const cls = "tile-status__item" + (wide ? " tile-status__item--wide" : "");
        return `<span class="${cls}">` +
          `<span class="tile-status__key">${key}</span>` +
          `<span class="tile-status__value">${value}</span>` +
          `</span>`;
      }

      function updateScorePill(el, result) {
        if (!el) return;
        const fmt = n => Math.round(n).toString();
        el.innerHTML =
          statusItem("Quality",  fmt(result.quality)) +
          statusItem("Distinct", fmt(result.distinctQ)) +
          statusItem("Smooth",   fmt(result.smoothQ)) +
          statusItem("Reach",    fmt(result.reachQ));
      }

      function renderStatusBar(el, rows, rgb) {
        if (!el) return;
        const swatch = rgb
          ? `<span class="tile-status__swatch" style="background:${cssFromRgb(rgb)}"></span>`
          : "";
        const items = rows
          .map(([k, v]) => statusItem(k, v, k === "css"))
          .join("");
        el.innerHTML = swatch + items;
      }

      const arcScoreEl = document.getElementById("arc-score");
      const gridScoreEl = document.getElementById("grid-score");

      function renderGrid() {
        const { N, hue } = state;
        const s = strat();
        const cols = N + 1, rows = N + 1;
        const grid = document.createElement("div");
        grid.className = "token-grid";
        grid.style.gridTemplateColumns = `38px repeat(${cols}, minmax(0, 1fr))`;
        grid.style.gridTemplateRows    = `18px repeat(${rows}, auto)`;
        grid.style.alignSelf = "start";
        grid.style.minHeight = "0";
        grid.style.minWidth = "0";

        // empty corner spacer
        const corner = document.createElement("div");
        corner.className = "axis-label";
        grid.appendChild(corner);
        // Column headers carry the white-axis labels (00w, 10w, …).
        for (let i = 0; i < cols; i++) {
          const hdr = document.createElement("div");
          hdr.className = "axis-label";
          hdr.textContent = pctLabel(Math.round((i / N) * 100)) + "w";
          grid.appendChild(hdr);
        }

        // Row outer loop = black-axis index (j). Row headers carry
        // the black-axis labels (00b, 10b, …). Pure color is at
        // top-left (j=0, i=0); pure white at top-right; pure black
        // at bottom-left.
        const gridRgbs = [];
        for (let j = 0; j < rows; j++) {
          const rowLabel = document.createElement("div");
          rowLabel.className = "axis-label axis-label--row";
          rowLabel.textContent = pctLabel(Math.round((j / N) * 100)) + "b";
          grid.appendChild(rowLabel);
          const rowRgbs = [];
          for (let i = 0; i < cols; i++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            if (i + j > N) {
              cell.setAttribute("data-empty", "");
              grid.appendChild(cell);
              rowRgbs.push(null);
              continue;
            }
            const k = N - i - j;
            const w = i / N, b = j / N, c = k / N;
            const rgb = atBaryEased(hue, w, b, c);
            rowRgbs.push(rgb);
            cell.style.background = cssFromRgb(rgb);
            cell.title = tokenName(i, j, k, N);
            cell.dataset.cellI = i;
            cell.dataset.cellK = k;
            cell.addEventListener("mouseenter", () => setPeerHover(i, k));
            cell.addEventListener("mouseleave", () => setPeerHover(null));
            grid.appendChild(cell);
          }
          gridRgbs.push(rowRgbs);
        }

        updateScorePill(gridScoreEl, scoreGrid(gridRgbs, N, { hue }));

        gridTarget.innerHTML = "";
        gridTarget.appendChild(grid);

        // After layout, fit the grid into the available vertical space
        // by clamping the column track width to whatever keeps the
        // square rows shorter than the container. Square cells stay
        // square; we just stop them growing past the container height.
        requestAnimationFrame(() => {
          const containerH = gridTarget.clientHeight;
          if (!containerH) return;
          const maxCell = Math.floor((containerH - 18 - rows * 3) / rows);
          if (maxCell > 0) {
            grid.style.gridTemplateColumns =
              `38px repeat(${cols}, minmax(0, ${maxCell}px))`;
          }
        });

        renderHexGrid(gridRgbs, N);
      }

      // Hex-tiled triangular rendering of the same ternary cells, on
      // the right side of tile 4. Corners: pure hue at top apex,
      // black at bottom-left, white at bottom-right. Each row carries
      // a "XXb" label on the left (black axis) and an "XXw" label on
      // the right (white axis) matching the square grid's labels.
      function renderHexGrid(gridRgbs, N) {
        const hexTarget = document.getElementById("hex-target");
        if (!hexTarget) return;
        hexTarget.innerHTML = "";
        requestAnimationFrame(() => {
          const W = hexTarget.clientWidth;
          const H = hexTarget.clientHeight;
          if (!W || !H) return;

          // Reserve room on each side for the "XXb" / "XXw" labels.
          const LABEL_PAD = 34;
          const drawW = Math.max(10, W - 2 * LABEL_PAD);

          // Pointy-top hexagon. For N+1 rows stacked in a triangle:
          //   total width  = N · s·√3 + s·√3  (half a hex both sides)
          //   total height = 1.5 · N · s + 2s
          const sByWidth  = drawW / (Math.sqrt(3) * (N + 1));
          const sByHeight = H / (1.5 * N + 2);
          const s = Math.max(2, Math.min(sByWidth, sByHeight) * 0.95);

          const hexW = Math.sqrt(3) * s;
          const triW = hexW * N;
          const triH = 1.5 * N * s + 2 * s;

          const startX = (W - triW) / 2 + triW / 2; // apex x
          const startY = (H - triH) / 2 + s;        // apex y (centre)

          const SVG_NS = "http://www.w3.org/2000/svg";
          const svg = document.createElementNS(SVG_NS, "svg");
          svg.setAttribute("width", W);
          svg.setAttribute("height", H);
          svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

          // Row r (0..N): r+1 hexes. Each hex maps to bary
          //   b_idx = r - i, w_idx = i, c_idx = N - r.
          // gridRgbs is indexed [b_idx][w_idx] — we reuse it so the
          // hex swatches show exactly the same colors as the square
          // grid on the left.
          for (let r = 0; r <= N; r++) {
            const cy = startY + r * 1.5 * s;
            const leftCx  = startX - (r / 2) * hexW;
            const rightCx = startX + (r / 2) * hexW;

            // Row labels: leftmost hex is (b=r, w=0), rightmost is
            // (b=0, w=r). Black-axis label sits to the left of the
            // left hex; white-axis label to the right of the right.
            if (r > 0) {
              const pct = Math.round((r / N) * 100);
              const bLabel = document.createElementNS(SVG_NS, "text");
              bLabel.setAttribute("x", (leftCx - hexW / 2 - 4).toFixed(1));
              bLabel.setAttribute("y", cy.toFixed(1));
              bLabel.setAttribute("text-anchor", "end");
              bLabel.setAttribute("dominant-baseline", "middle");
              bLabel.setAttribute("class", "hex-label");
              bLabel.textContent =
                pct.toString().padStart(2, "0") + "b";
              svg.appendChild(bLabel);

              const wLabel = document.createElementNS(SVG_NS, "text");
              wLabel.setAttribute("x", (rightCx + hexW / 2 + 4).toFixed(1));
              wLabel.setAttribute("y", cy.toFixed(1));
              wLabel.setAttribute("text-anchor", "start");
              wLabel.setAttribute("dominant-baseline", "middle");
              wLabel.setAttribute("class", "hex-label");
              wLabel.textContent =
                pct.toString().padStart(2, "0") + "w";
              svg.appendChild(wLabel);
            }

            for (let i = 0; i <= r; i++) {
              const b_idx = r - i;
              const w_idx = i;
              const c_idx = N - r;
              const rgb = gridRgbs[b_idx] && gridRgbs[b_idx][w_idx];
              if (!rgb) continue;

              const cx = startX + (i - r / 2) * hexW;

              const pts = [];
              for (let k = 0; k < 6; k++) {
                const a = (k * 60 - 90) * Math.PI / 180;
                pts.push(
                  (cx + s * Math.cos(a)).toFixed(2) + "," +
                  (cy + s * Math.sin(a)).toFixed(2),
                );
              }
              const hex = document.createElementNS(SVG_NS, "polygon");
              hex.setAttribute("class", "hex-cell");
              hex.setAttribute("points", pts.join(" "));
              hex.setAttribute("fill", cssFromRgb(rgb));
              hex.setAttribute("stroke", "oklch(22% 0 0)");
              hex.setAttribute("stroke-width", "1");
              hex.dataset.cellI = w_idx;
              hex.dataset.cellK = c_idx;
              hex.addEventListener("mouseenter",
                () => setPeerHover(w_idx, c_idx));
              hex.addEventListener("mouseleave",
                () => setPeerHover(null));
              svg.appendChild(hex);
            }
          }

          hexTarget.appendChild(svg);
        });
      }

      // ═══════════════════════════════════════════════════════════
      // Section 4 — Arc-based scales
      // ═══════════════════════════════════════════════════════════

      const arcBody = document.getElementById("arc-body");
      const arcSvg  = document.getElementById("arc-svg");
      const arcDotsOverlay = document.getElementById("arc-dots-overlay");
      const arcScalesTarget = document.getElementById("arc-scales");

      // Arc parameterised so peak=0 is a straight line B→W (no
      // chroma) and peak=1 is a true V: B → C → W along the
      // triangle edges with a cusp at the C vertex. In between the
      // arcs are smooth curves that asymptotically approach the V.
      //
      // c(t, p) = p · (1 − |2t−1|^α),   α = 2 − p
      //   α=2, p=0 → straight line (c≡0).
      //   α=1, p=1 → 1 − |2t−1|, a triangle wave (V in chroma).
      //
      // (w, b) split blends the parabolic interior (w:b = t:(1-t))
      // toward the V's edge-hugging split (w=0 on B→C leg, b=0 on
      // C→W leg) as p → 1, so the full (w,b,c) point walks the
      // triangle edges at peak=1 and interiors in between.
      function arcBary(t, peak) {
        const alpha = 2 - peak;
        const u = Math.abs(2 * t - 1);
        const c = peak * (1 - Math.pow(u, alpha));
        const w0 = (1 - peak) * t        + peak * Math.max(0, 2 * t - 1);
        const b0 = (1 - peak) * (1 - t)  + peak * Math.max(0, 1 - 2 * t);
        const denom = w0 + b0;
        const scale = denom > 1e-10 ? (1 - c) / denom : 0;
        return [w0 * scale, b0 * scale, c];
      }

      // Arc length integration (numeric) in barycentric space for
      // uniform-along-arc sampling. `stops` is the actual number
      // of color samples to return per arc (so the off-by-one is
      // gone — the UI button that says "11" really produces 11
      // samples). Odd stops give a natural midpoint at index
      // (stops-1)/2 → arc length len/2 → t=0.5 on the symmetric
      // arc. That's why the seg restricts stops to odd values.
      function arcSamples(peak, stops) {
        const segs = 400;
        const pts = [];
        let len = 0;
        let prev = arcBary(0, peak);
        pts.push({ t: 0, s: 0, bary: prev });
        for (let i = 1; i <= segs; i++) {
          const t = i / segs;
          const cur = arcBary(t, peak);
          len += Math.hypot(cur[0] - prev[0], cur[1] - prev[1], cur[2] - prev[2]);
          pts.push({ t, s: len, bary: cur });
          prev = cur;
        }
        const out = [];
        const divisor = Math.max(1, stops - 1);
        for (let i = 0; i < stops; i++) {
          const target = (i / divisor) * len;
          let j = 0;
          while (j < pts.length - 1 && pts[j + 1].s < target) j++;
          const a = pts[j], b = pts[Math.min(j + 1, pts.length - 1)];
          const frac = (b.s - a.s) > 0 ? (target - a.s) / (b.s - a.s) : 0;
          const t = a.t + (b.t - a.t) * frac;
          out.push({ t, bary: arcBary(t, peak) });
        }
        return out;
      }

      function renderArcs() {
        // Tile 4 uses a fixed "painter's triangle" orientation:
        //   full color → top        (C at 90° math)
        //   black      → bottom-left (B at 210°)
        //   white      → bottom-right (W at 330°)
        // No CSS rotation — the triangle doesn't follow the hue.
        // Only the color interpolation uses state.hue.
        const width = arcBody.width;
        // Tile 4 has no ring, so skip the ring allotment and give
        // the triangle the full stage radius. The triangle is
        // inscribed in a circle whose centre is the centroid, so
        // its bounding box sits asymmetrically top-heavy; shift
        // cy down by R/4 so the bbox is vertically centred.
        const probe = geometry(width, { triPad: 6 });
        const geoTile4 = geometry(width, {
          hasRing: false, hue: 90, flipped: true,
          triPad: 6, cyShift: probe.triR / 4,
        });
        paintBody(arcBody, state.hue, geoTile4);
        arcBody.style.transform        = "";
        arcSvg.style.transform         = "";
        arcDotsOverlay.style.transform = "";
        arcDotsOverlay.innerHTML = "";

        const verts = geoTile4.verts;

        // Draw arcs as SVG paths so they anti-alias nicely.
        const svg = arcSvg;
        svg.innerHTML = "";
        const svgSize = 300;
        const scaleFactor = svgSize / arcBody.width;

        const s = strat();
        const peaks = [];
        for (let a = 0; a < state.arcCount; a++) {
          peaks.push(a / (state.arcCount - 1));
        }

        const arcData = [];
        for (let a = 0; a < state.arcCount; a++) {
          const peak = peaks[a];
          // Draw the continuous curve.
          let d = "";
          const curveSegs = 100;
          for (let i = 0; i <= curveSegs; i++) {
            const t = i / curveSegs;
            const [w, b, c] = arcBary(t, peak);
            const [px, py] = fromBarycentric(w, b, c, verts);
            const sx = px * scaleFactor;
            const sy = py * scaleFactor;
            d += (i === 0 ? "M " : "L ") + sx.toFixed(1) + " " + sy.toFixed(1) + " ";
          }
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", d);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke", "oklch(95% 0 0 / 0.45)");
          path.setAttribute("stroke-width", "1.5");
          svg.appendChild(path);

          // Sample N+1 points along arc length.
          const pts = arcSamples(peak, state.arcN);
          arcData.push({ peak, points: pts });

          // Dots — filled with the exact sample color and wrapped
          // in the shared .quant-dot white-border/dark-shadow style.
          // Hover correlates with the matching ramp swatch via
          // data-arc-a / data-arc-j.
          for (let j = 0; j < pts.length; j++) {
            const { bary } = pts[j];
            const [px, py] = fromBarycentric(bary[0], bary[1], bary[2], verts);
            const rgb = atBaryEased(state.hue, bary[0], bary[1], bary[2]);
            const dot = document.createElement("span");
            dot.className = "quant-dot";
            dot.style.left = (px / width * 100) + "%";
            dot.style.top  = (py / width * 100) + "%";
            dot.style.background = cssFromRgb(rgb);
            dot.style.cursor = "default";
            dot.dataset.arcA = a;
            dot.dataset.arcJ = j;
            dot.addEventListener("mouseenter", () => setArcPeerHover(a, j));
            dot.addEventListener("mouseleave", () => setArcPeerHover(null));
            arcDotsOverlay.appendChild(dot);
          }
        }

        // Single CSS grid so the x-gap between swatches matches
        // the y-gap between ramps exactly (both driven by the
        // container's `gap`). Swatches are square; cell size is
        // the largest square that fits inside the scales panel,
        // floored so the "100" label still fits legibly.
        arcScalesTarget.innerHTML = "";
        const stops = state.arcN;
        const MIN_ARC_CELL = 20;
        const ARC_LABEL_COL = 34;
        const ARC_GAP = 3;
        arcScalesTarget.style.gridTemplateColumns =
          `${ARC_LABEL_COL}px repeat(${stops}, ${MIN_ARC_CELL}px)`;
        arcScalesTarget.style.gridTemplateRows =
          `16px repeat(${state.arcCount}, ${MIN_ARC_CELL}px)`;
        arcScalesTarget.style.alignContent = "start";
        arcScalesTarget.style.justifyContent = "start";

        // Column-header row: empty corner, then position percentages.
        const corner = document.createElement("div");
        corner.className = "arc-scale-header";
        arcScalesTarget.appendChild(corner);
        const divisor = Math.max(1, stops - 1);
        for (let j = 0; j < stops; j++) {
          const posPct = Math.round((j / divisor) * 100);
          const hdr = document.createElement("div");
          hdr.className = "arc-scale-header";
          hdr.textContent = posPct.toString().padStart(2, "0");
          arcScalesTarget.appendChild(hdr);
        }

        const arcRgbs = [];
        for (let a = 0; a < state.arcCount; a++) {
          const { peak, points } = arcData[a];
          const label = document.createElement("div");
          label.className = "arc-scale-label";
          const pct = Math.round(peak * 100);
          label.textContent = `c${pct.toString().padStart(2, "0")}`;
          arcScalesTarget.appendChild(label);
          const rowRgbs = [];
          for (let j = 0; j < points.length; j++) {
            const { bary } = points[j];
            const [w, b, c] = bary;
            const rgb = atBaryEased(state.hue, w, b, c);
            rowRgbs.push(rgb);
            const sw = document.createElement("div");
            sw.className = "arc-swatch";
            sw.style.background = cssFromRgb(rgb);
            sw.dataset.arcA = a;
            sw.dataset.arcJ = j;
            sw.addEventListener("mouseenter", () => setArcPeerHover(a, j));
            sw.addEventListener("mouseleave", () => setArcPeerHover(null));
            arcScalesTarget.appendChild(sw);
          }
          arcRgbs.push(rowRgbs);
        }

        updateScorePill(arcScoreEl,
          scoreArcSet(arcRgbs, { hue: state.hue }));

        // Size the square swatch to fit inside both the available
        // height (one row per arc) and the available width (one
        // column per stop + the label column). The tighter dimension
        // wins so the grid never bleeds off the tile.
        requestAnimationFrame(() => {
          const boxW = arcScalesTarget.clientWidth;
          const boxH = arcScalesTarget.clientHeight;
          if (!boxW || !boxH) return;
          const HEADER_H = 16;
          const hGaps = ARC_GAP * state.arcCount;
          const wGaps = ARC_GAP * stops;
          const cellH = Math.floor(
            (boxH - HEADER_H - hGaps) / state.arcCount);
          const cellW = Math.floor(
            (boxW - ARC_LABEL_COL - wGaps) / stops);
          const cell = Math.max(8, Math.min(cellH, cellW));
          arcScalesTarget.style.gridTemplateColumns =
            `${ARC_LABEL_COL}px repeat(${stops}, ${cell}px)`;
          arcScalesTarget.style.gridTemplateRows =
            `${HEADER_H}px repeat(${state.arcCount}, ${cell}px)`;
        });
      }

      // ═══════════════════════════════════════════════════════════
      // Picker drag helpers
      // ═══════════════════════════════════════════════════════════

      function stageXY(evt, stage, canvas) {
        const rect = stage.getBoundingClientRect();
        return [
          (evt.clientX - rect.left) / rect.width * canvas.width,
          (evt.clientY - rect.top) / rect.height * canvas.height,
        ];
      }

      function attachDrag(stage, canvas, picker, hooks, dragKey) {
        stage.addEventListener("pointerdown", e => {
          const [x, y] = stageXY(e, stage, canvas);
          const geo = picker.geo;
          const dx = x - geo.cx, dy = y - geo.cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          let target;
          if (dist >= geo.ringInner - 2 && dist <= geo.ringOuter + 8) target = "ring";
          else {
            const [cdx, cdy] = unrotate(dx, dy, state.hue);
            const [w, b, c] = barycentric(cdx + geo.cx, cdy + geo.cy, geo.verts);
            if (w >= -0.01 && b >= -0.01 && c >= -0.01) target = "tri";
          }
          if (!target) return;
          stage.setPointerCapture(e.pointerId);
          if (target === "ring" && dragKey) activeDrag = dragKey;

          let rafId = null, pendingEvt = null;
          const flush = () => {
            rafId = null;
            if (!pendingEvt) return;
            const ev = pendingEvt; pendingEvt = null;
            const [mx, my] = stageXY(ev, stage, canvas);
            const mdx = mx - picker.geo.cx, mdy = my - picker.geo.cy;
            if (target === "ring") {
              const angle = Math.atan2(-mdy, mdx) * 180 / Math.PI;
              hooks.onHue((angle + 360) % 360);
            } else {
              const [cdx, cdy] = unrotate(mdx, mdy, state.hue);
              let [w, b, c] = barycentric(cdx + picker.geo.cx, cdy + picker.geo.cy, picker.geo.verts);
              w = Math.max(0, Math.min(1, w));
              b = Math.max(0, Math.min(1, b));
              if (w + b > 1) { const s = w + b; w /= s; b /= s; }
              hooks.onTri(w, b);
            }
          };
          const dispatch = ev => {
            pendingEvt = ev;
            if (rafId === null) rafId = requestAnimationFrame(flush);
          };
          // initial
          if (target === "ring") {
            const angle = Math.atan2(-dy, dx) * 180 / Math.PI;
            hooks.onHue((angle + 360) % 360);
          } else {
            const [cdx, cdy] = unrotate(dx, dy, state.hue);
            let [w, b, c] = barycentric(cdx + geo.cx, cdy + geo.cy, geo.verts);
            w = Math.max(0, Math.min(1, w));
            b = Math.max(0, Math.min(1, b));
            if (w + b > 1) { const s = w + b; w /= s; b /= s; }
            hooks.onTri(w, b);
          }

          const up = () => {
            if (rafId) cancelAnimationFrame(rafId);
            stage.removeEventListener("pointermove", dispatch);
            stage.removeEventListener("pointerup", up);
            stage.removeEventListener("pointercancel", up);
            if (target === "ring" && dragKey) onDragEnd();
          };
          stage.addEventListener("pointermove", dispatch);
          stage.addEventListener("pointerup", up);
          stage.addEventListener("pointercancel", up);
        });
      }

      // ═══════════════════════════════════════════════════════════
      // Controls
      // ═══════════════════════════════════════════════════════════

      function setSegActive(seg, value) {
        seg.querySelectorAll("button").forEach(b => {
          b.setAttribute("aria-pressed", b.dataset.value === String(value) ? "true" : "false");
        });
      }

      // During a ring drag, `activeDrag` pins updates to the tile
      // whose ring is being dragged; other tiles defer to idle /
      // pointerup so the dragged tile hits 60fps even on the
      // slower spaces (Jzazbz, LCh(ab)).
      let activeDrag = null;     // "picker" | "quant" | null
      let deferredRefresh = null; // requestIdleCallback handle

      function refreshIdleTiles() {
        if (deferredRefresh != null) {
          (cancelIdleCallback || clearTimeout)(deferredRefresh);
          deferredRefresh = null;
        }
        const run = () => {
          deferredRefresh = null;
          if (activeDrag !== "picker") repaintPicker();
          if (activeDrag !== "quant")  repaintQuant();
          renderGrid();
          renderArcs();
        };
        deferredRefresh = (requestIdleCallback || (cb => setTimeout(cb, 16)))(run, { timeout: 120 });
      }

      function onSpaceChanged() {
        syncEaseInputs();
        repaintPicker();
        repaintQuant();
        renderGrid();
        renderArcs();
        renderEdgeStrips();
      }
      // Three 1D edge scales drawn as canvas strips beneath each
      // curve slider. Each strip shows one edge of the triangle
      // at the current hue + easing so you can see how the slider
      // reshapes the blend along that edge.
      //   Tint slider  → W↔B edge
      //   Shade slider → B↔C edge
      //   Pure slider  → W↔C edge
      const EDGE_STRIPS = [
        { id: "edge-wb", coords: t => [1 - t, t, 0] },
        { id: "edge-bc", coords: t => [0, 1 - t, t] },
        { id: "edge-wc", coords: t => [1 - t, 0, t] },
      ];
      function renderEdgeStrips() {
        for (const { id, coords } of EDGE_STRIPS) {
          const canvas = document.getElementById(id);
          if (!canvas) continue;
          const ctx = canvas.getContext("2d");
          const W = canvas.width, H = canvas.height;
          const img = ctx.createImageData(W, H);
          for (let x = 0; x < W; x++) {
            const t = x / (W - 1);
            const [w, b, c] = coords(t);
            const rgb = atBaryEased(state.hue, w, b, c);
            const r8 = Math.round(rgb[0] * 255);
            const g8 = Math.round(rgb[1] * 255);
            const b8 = Math.round(rgb[2] * 255);
            for (let y = 0; y < H; y++) {
              const i = (y * W + x) * 4;
              img.data[i]     = r8;
              img.data[i + 1] = g8;
              img.data[i + 2] = b8;
              img.data[i + 3] = 255;
            }
          }
          ctx.putImageData(img, 0, 0);
        }
      }

      function onHueChanged() {
        if (activeDrag === "picker") {
          repaintPicker();
          refreshIdleTiles();
        } else if (activeDrag === "quant") {
          repaintQuant();
          refreshIdleTiles();
        } else {
          repaintPicker();
          repaintQuant();
          renderGrid();
          renderArcs();
        }
        renderEdgeStrips();
      }
      function onDragEnd() {
        activeDrag = null;
        if (deferredRefresh != null) {
          (cancelIdleCallback || clearTimeout)(deferredRefresh);
          deferredRefresh = null;
        }
        // Final full repaint so every tile reflects the settled hue.
        repaintPicker();
        repaintQuant();
        renderGrid();
        renderArcs();
      }
      function onNChanged() {
        // Clamp quant selection to new N; re-render tiles 2 and 3.
        // Tile 4 has its own arcN and is untouched.
        state.quant.i = Math.min(state.quant.i, state.N - state.quant.k);
        state.quant.k = Math.min(state.quant.k, state.N);
        renderQuantDots();
        updateQuantReadout();
        renderGrid();
      }
      function onSchemeChanged() {
        updatePickerReadout();
        updateQuantReadout();
        renderGrid();
      }

document.querySelectorAll('[data-decision="space"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          state.space = btn.dataset.value;
          setSegActive(btn.parentElement, state.space);
          onSpaceChanged();
        });
      });
      document.querySelectorAll('[data-decision="N"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          // Buttons show stop count (N+1); internal state.N is the
          // ternary-grid division count (one less than stop count).
          state.N = +btn.dataset.value - 1;
          setSegActive(btn.parentElement, +btn.dataset.value);
          onNChanged();
        });
      });
      document.querySelectorAll('[data-decision="scheme"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          state.scheme = btn.dataset.value;
          setSegActive(btn.parentElement, state.scheme);
          onSchemeChanged();
        });
      });
      document.querySelectorAll('[data-decision="arcN"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          state.arcN = +btn.dataset.value;
          setSegActive(btn.parentElement, state.arcN);
          renderArcs();
        });
      });
      document.querySelectorAll('[data-decision="arcCount"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          state.arcCount = +btn.dataset.value;
          setSegActive(btn.parentElement, state.arcCount);
          renderArcs();
        });
      });

      // Curve editors. Each canvas hosts a 5-point remap: endpoints
      // locked at (0,0) and (1,1); three draggable handles at inputs
      // 0.25 / 0.5 / 0.75. Drag up/down to change the output value.
      // Double-click a handle to reset it to the identity position.
      const CURVE_EDITORS = [
        { id: "curve-wb", edge: "wb" },
        { id: "curve-bc", edge: "bc" },
        { id: "curve-wc", edge: "wc" },
      ];

      function setupHiDPICanvas(canvas) {
        const dpr = window.devicePixelRatio || 1;
        // Use the actual laid-out pixel size, not the canvas's
        // intrinsic width/height attributes — curve editors flex to
        // fill the available height inside the curves-panel.
        const rect = canvas.getBoundingClientRect();
        const cssW = Math.max(1, Math.round(rect.width) || canvas.width);
        const cssH = Math.max(1, Math.round(rect.height) || canvas.height);
        const targetW = Math.round(cssW * dpr);
        const targetH = Math.round(cssH * dpr);
        if (canvas.width !== targetW) canvas.width = targetW;
        if (canvas.height !== targetH) canvas.height = targetH;
        canvas._dpr = dpr;
        canvas._cssW = cssW;
        canvas._cssH = cssH;
      }

      function drawCurveEditor(canvas, edge) {
        setupHiDPICanvas(canvas);
        const ctx = canvas.getContext("2d");
        const W = canvas._cssW, H = canvas._cssH;
        ctx.setTransform(canvas._dpr, 0, 0, canvas._dpr, 0, 0);
        ctx.clearRect(0, 0, W, H);
        // Padded area (canvas background).
        ctx.fillStyle = "oklch(14% 0 0)";
        ctx.fillRect(0, 0, W, H);
        // Inner [0,1] box in a slightly brighter shade.
        const x0 = lxToPx(0, W);
        const x1 = lxToPx(1, W);
        const y0 = lyToPy(0, H);
        const y1 = lyToPy(1, H);
        ctx.fillStyle = "oklch(18% 0 0)";
        ctx.fillRect(x0, y1, x1 - x0, y0 - y1);
        ctx.strokeStyle = "oklch(30% 0 0)";
        ctx.lineWidth = 1;
        for (let i = 1; i < 4; i++) {
          const gx = Math.round(lxToPx(i / 4, W)) + 0.5;
          ctx.beginPath();
          ctx.moveTo(gx, y1); ctx.lineTo(gx, y0); ctx.stroke();
          const gy = Math.round(lyToPy(i / 4, H)) + 0.5;
          ctx.beginPath();
          ctx.moveTo(x0, gy); ctx.lineTo(x1, gy); ctx.stroke();
        }
        ctx.strokeStyle = "oklch(38% 0 0)";
        ctx.strokeRect(Math.round(x0) + 0.5, Math.round(y1) + 0.5,
          Math.round(x1 - x0), Math.round(y0 - y1));
        ctx.strokeStyle = "oklch(45% 0 0)";
        ctx.setLineDash([2, 3]);
        ctx.beginPath();
        ctx.moveTo(x0, y0); ctx.lineTo(x1, y1);
        ctx.stroke();
        ctx.setLineDash([]);
        const cv = getCurves()[edge];
        const p = precomputeCurve(cv);
        ctx.strokeStyle = "oklch(90% 0 0)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let px = 0; px < W; px++) {
          const xv = pxToLx(px, W);
          const yv = evalPrecomputed(p, xv);
          const py = lyToPy(yv, H);
          if (px === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
        for (let i = 0; i < cv.xs.length; i++) {
          const x = lxToPx(cv.xs[i], W);
          const y = lyToPy(cv.ys[i], H);
          ctx.fillStyle = "oklch(96% 0 0)";
          ctx.strokeStyle = "oklch(20% 0 0)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, Math.PI * 2);
          ctx.fill(); ctx.stroke();
        }
      }

      function drawAllCurves() {
        for (const { id, edge } of CURVE_EDITORS) {
          const canvas = document.getElementById(id);
          if (canvas) drawCurveEditor(canvas, edge);
        }
      }

      function onCurveChanged() {
        drawAllCurves();
        repaintPicker();
        repaintQuant();
        renderGrid();
        renderArcs();
        renderEdgeStrips();
        saveCurvesToStorage();
      }

      function nearestHandle(canvas, mx, my) {
        const W = canvas._cssW || canvas.width;
        const H = canvas._cssH || canvas.height;
        const cv = getCurves()[canvas.dataset.edge];
        let best = -1, bestD = Infinity;
        for (let i = 0; i < cv.xs.length; i++) {
          const x = lxToPx(cv.xs[i], W);
          const y = lyToPy(cv.ys[i], H);
          const d = Math.hypot(mx - x, my - y);
          if (d < bestD) { bestD = d; best = i; }
        }
        return { index: best, dist: bestD };
      }

      function canvasPos(canvas, e) {
        const r = canvas.getBoundingClientRect();
        const mx = e.clientX - r.left;
        const my = e.clientY - r.top;
        return { mx, my };
      }

      // Curve editors flex to fill the tile-1 curves-panel, so their
      // pixel-size can change whenever the tile resizes. A single
      // ResizeObserver keeps each canvas's backing store in sync with
      // its CSS size and redraws whatever the curve currently shows.
      const curveResizeObs = typeof ResizeObserver !== "undefined"
        ? new ResizeObserver(entries => {
            for (const entry of entries) {
              const canvas = entry.target;
              const edge = canvas.dataset.edge;
              if (!edge) continue;
              drawCurveEditor(canvas, edge);
            }
          })
        : null;

      for (const { id, edge } of CURVE_EDITORS) {
        const canvas = document.getElementById(id);
        canvas.dataset.edge = edge;
        setupHiDPICanvas(canvas);
        if (curveResizeObs) curveResizeObs.observe(canvas);
        let dragging = -1;
        canvas.addEventListener("pointerdown", (e) => {
          const { mx, my } = canvasPos(canvas, e);
          const cv = getCurves()[edge];
          const { index, dist } = nearestHandle(canvas, mx, my);
          if (index >= 0 && dist < 12) {
            dragging = index;
          } else {
            let nx = pxToLx(mx, canvas._cssW);
            let ny = pyToLy(my, canvas._cssH);
            nx = Math.max(CURVE_LO, Math.min(CURVE_HI, nx));
            ny = Math.max(CURVE_LO, Math.min(CURVE_HI, ny));
            let insertAt = cv.xs.length;
            for (let i = 0; i < cv.xs.length; i++) {
              if (nx < cv.xs[i]) { insertAt = i; break; }
            }
            // Must sit strictly between existing knots.
            if (insertAt === 0 || insertAt === cv.xs.length) return;
            const leftX = cv.xs[insertAt - 1];
            const rightX = cv.xs[insertAt];
            if (nx - leftX < CURVE_MIN_GAP) nx = leftX + CURVE_MIN_GAP;
            if (rightX - nx < CURVE_MIN_GAP) nx = rightX - CURVE_MIN_GAP;
            cv.xs.splice(insertAt, 0, nx);
            cv.ys.splice(insertAt, 0, ny);
            dragging = insertAt;
          }
          canvas.setPointerCapture(e.pointerId);
          e.preventDefault();
          onCurveChanged();
        });
        canvas.addEventListener("pointermove", (e) => {
          if (dragging < 0) return;
          const { mx, my } = canvasPos(canvas, e);
          let nx = pxToLx(mx, canvas._cssW);
          let ny = pyToLy(my, canvas._cssH);
          nx = Math.max(CURVE_LO, Math.min(CURVE_HI, nx));
          ny = Math.max(CURVE_LO, Math.min(CURVE_HI, ny));
          const cv = getCurves()[edge];
          const n = cv.xs.length;
          const minX = dragging === 0 ? CURVE_LO : cv.xs[dragging - 1] + CURVE_MIN_GAP;
          const maxX = dragging === n - 1 ? CURVE_HI : cv.xs[dragging + 1] - CURVE_MIN_GAP;
          nx = Math.max(minX, Math.min(maxX, nx));
          cv.xs[dragging] = nx;
          cv.ys[dragging] = ny;
          onCurveChanged();
        });
        const endDrag = (e) => {
          if (dragging >= 0) {
            dragging = -1;
            try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
          }
        };
        canvas.addEventListener("pointerup", endDrag);
        canvas.addEventListener("pointercancel", endDrag);
        canvas.addEventListener("dblclick", (e) => {
          const { mx, my } = canvasPos(canvas, e);
          const { index, dist } = nearestHandle(canvas, mx, my);
          if (index >= 0 && dist < 12) {
            const cv = getCurves()[edge];
            // Endpoints can't be removed.
            if (index === 0 || index === cv.xs.length - 1) return;
            cv.xs.splice(index, 1);
            cv.ys.splice(index, 1);
            onCurveChanged();
          }
        });
      }

      document.querySelectorAll(".curve-reset").forEach(btn => {
        btn.addEventListener("click", () => {
          getCurves()[btn.dataset.edge] = identityCurve();
          onCurveChanged();
        });
      });

      function syncEaseInputs() {
        drawAllCurves();
      }
      document.querySelectorAll('[data-decision="nHues"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          state.nHues = +btn.dataset.value;
          setSegActive(btn.parentElement, state.nHues);
          // Snap current hue to the new quantization.
          state.hue = quantizeHue(state.hue);
          onHueChanged();
        });
      });

      // ═══════════════════════════════════════════════════════════
      // Initial paint
      // ═══════════════════════════════════════════════════════════

      loadCurvesFromStorage();
      syncEaseInputs();
      repaintPicker();
      repaintQuant();
      renderGrid();
      renderArcs();
      renderEdgeStrips();

      // ═══════════════════════════════════════════════════════════
      // Studio integration — only active when embedded in an iframe
      // ═══════════════════════════════════════════════════════════

      if (window.top !== window) {
        document.documentElement.toggleAttribute("data-embedded", true);

        // Let the studio preload a prior candidate by posting state.
        window.addEventListener("message", (ev) => {
          const msg = ev.data;
          if (!msg || msg.type !== "designer:load") return;
          const s = msg.state || {};
          if (s.space) {
            state.space = s.space;
            const spaceSeg = document.querySelector('.seg[data-decision="space"]');
            for (const btn of spaceSeg.querySelectorAll("button")) {
              btn.setAttribute("aria-pressed", btn.dataset.value === s.space ? "true" : "false");
            }
          }
          if (typeof s.hue === "number") state.hue = s.hue;
          if (s.curves && typeof s.curves === "object") {
            for (const [space, edges] of Object.entries(s.curves)) {
              if (!edges) continue;
              const rec = state.curves[space] || (state.curves[space] = {
                wb: identityCurve(),
                bc: identityCurve(),
                wc: identityCurve(),
              });
              for (const eg of CURVE_EDGES) {
                const v = edges[eg];
                if (v && Array.isArray(v.xs) && Array.isArray(v.ys)
                    && v.xs.length === v.ys.length && v.xs.length >= 2) {
                  rec[eg] = { xs: v.xs.slice(), ys: v.ys.slice() };
                }
              }
            }
          }
          syncEaseInputs();
          repaintPicker();
          repaintQuant();
          renderGrid();
          renderArcs();
        });

        // ─── Export helpers (designer is the source of truth) ────
        function pctLabel(n) {
          const v = Math.round(n);
          return v < 10 ? "0" + v : String(v);
        }
        function hueKey(angle) {
          return "h" + String(Math.round(angle)).padStart(3, "0");
        }
        function rgbToHex(rgb) {
          const c = v => Math.max(0, Math.min(255, Math.round(v * 255)))
            .toString(16).padStart(2, "0");
          return "#" + c(rgb[0]) + c(rgb[1]) + c(rgb[2]);
        }
        function currentCurves() {
          const cv = getCurves();
          const dup = c => ({ xs: c.xs.slice(), ys: c.ys.slice() });
          return { wb: dup(cv.wb), bc: dup(cv.bc), wc: dup(cv.wc) };
        }
        function exportTonalArc() {
          const hueCount = state.nHues || 24;
          const arcs = state.arcCount;
          const N = state.arcN;
          const stops = {};
          const peakPcts = [];
          const stepPcts = [];
          for (let a = 0; a < arcs; a++) {
            peakPcts.push(Math.round((arcs > 1 ? a / (arcs - 1) : 0) * 100));
          }
          for (let j = 0; j < N; j++) {
            stepPcts.push(Math.round((N > 1 ? j / (N - 1) : 0) * 100));
          }
          for (let h = 0; h < hueCount; h++) {
            const hue = (h * 360) / hueCount;
            const hk = hueKey(hue);
            for (let a = 0; a < arcs; a++) {
              const peak = peakPcts[a] / 100;
              const samples = arcSamples(peak, N);
              for (let j = 0; j < N; j++) {
                const [w, b, c] = samples[j].bary;
                const rgb = atBaryEased(hue, w, b, c);
                stops[`${hk} c${pctLabel(peakPcts[a])}-${pctLabel(stepPcts[j])}`] =
                  rgbToHex(rgb);
              }
            }
          }
          return {
            meta: {
              model: "tonalarc",
              space: state.space,
              hueCount, arcs, N,
              curves: currentCurves(),
              peakPcts, stepPcts,
            },
            stops,
          };
        }
        function exportTonalGrid() {
          const hueCount = state.nHues || 24;
          const N = state.N;
          const stops = {};
          const bPcts = [], wPcts = [];
          for (let v = 0; v <= N; v++) bPcts.push(Math.round((v / N) * 100));
          for (let v = 0; v <= N; v++) wPcts.push(Math.round((v / N) * 100));
          // Outer = black axis (rows); inner = white axis (cols).
          // Origin (b=0, w=0) is pure color.
          for (let h = 0; h < hueCount; h++) {
            const hue = (h * 360) / hueCount;
            const hk = hueKey(hue);
            for (let bIdx = 0; bIdx <= N; bIdx++) {
              for (let wIdx = 0; wIdx + bIdx <= N; wIdx++) {
                const cIdx = N - wIdx - bIdx;
                const w = wIdx / N, b = bIdx / N, c = cIdx / N;
                const rgb = atBaryEased(hue, w, b, c);
                stops[`${hk} ${pctLabel(bPcts[bIdx])}b-${pctLabel(wPcts[wIdx])}w`] =
                  rgbToHex(rgb);
              }
            }
          }
          return {
            meta: {
              model: "tonalgrid",
              space: state.space,
              hueCount, N,
              scheme: state.scheme,
              curves: currentCurves(),
              bPcts, wPcts,
            },
            stops,
          };
        }
        function postExport(model) {
          const exp = model === "tonalarc" ? exportTonalArc() : exportTonalGrid();
          const defaultName =
            `${model} · ${exp.meta.space} · ` +
            (model === "tonalarc"
              ? `${exp.meta.arcs} × ${exp.meta.N}`
              : `N=${exp.meta.N}`);
          const name = prompt("Candidate name:", defaultName);
          if (!name) return;
          window.parent.postMessage(
            { type: "designer:save", name: name.trim(), meta: exp.meta, stops: exp.stops },
            "*",
          );
        }
        document.getElementById("save-tonalarc")
          .addEventListener("click", () => postExport("tonalarc"));
        document.getElementById("save-tonalgrid")
          .addEventListener("click", () => postExport("tonalgrid"));
      }
    </script>
  </body>
</html>
