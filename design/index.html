<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1,
                   viewport-fit=cover" />
    <title>Unicode Picker — Design Prototype</title>

    <!-- Google Fonts for the Surface-phase typeface options -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Geist+Mono:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,700;1,6..72,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" />

    <!-- Real application stylesheets & theme bootstrap (unchanged) -->
    <link rel="stylesheet" href="../noto-fonts.css" />
    <link rel="stylesheet" href="../style.css" />
    <script>
      (function () {
        let saved;
        try {
          saved = localStorage.getItem("unicode-picker-theme");
        } catch (e) {}
        const theme = saved ||
          (matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
      })();
    </script>

    <style>
      /* ═══════════════════════════════════════════════════════════
         Design harness chrome
         ═══════════════════════════════════════════════════════════ */
      :root {
        --hc-bg:    #fff;
        --hc-bg-2:  #fafaf7;
        --hc-ink:   #1a1a1a;
        --hc-ink-60: rgba(26, 26, 26, 0.60);
        --hc-ink-40: rgba(26, 26, 26, 0.40);
        --hc-ink-12: rgba(26, 26, 26, 0.12);
        --hc-ink-06: rgba(26, 26, 26, 0.06);
        --hc-sans:
          "IBM Plex Sans", -apple-system, system-ui, sans-serif;
        --hc-mono:
          "IBM Plex Mono", ui-monospace, Menlo, monospace;
      }
      html[data-theme="dark"] .harness {
        --hc-bg:    #181818;
        --hc-bg-2:  #111;
        --hc-ink:   #eee;
        --hc-ink-60: rgba(238, 238, 238, 0.60);
        --hc-ink-40: rgba(238, 238, 238, 0.40);
        --hc-ink-12: rgba(238, 238, 238, 0.12);
        --hc-ink-06: rgba(238, 238, 238, 0.06);
      }

      /* Harness layout. The picker lives in a stage below. */
      body {
        height: 100dvh;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto auto auto 1fr;
      }
      .harness {
        font-family: var(--hc-sans);
        font-size: 13px;
        color: var(--hc-ink);
        background: var(--hc-bg);
        border-bottom: 1px solid var(--hc-ink-12);
      }
      .harness + .harness { border-top: 0; }

      /* Viewer bar */
      .viewer-bar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 18px;
        flex-wrap: wrap;
      }
      .viewer-bar__title {
        font-weight: 600;
        font-size: 13px;
      }
      .viewer-bar__sub {
        font-size: 11px;
        color: var(--hc-ink-60);
        flex: 1;
      }
      .viewer-bar__btn {
        appearance: none;
        font: inherit;
        font-size: 11px;
        padding: 5px 10px;
        border: 1px solid var(--hc-ink-12);
        border-radius: 4px;
        color: var(--hc-ink-60);
        background: var(--hc-bg);
        cursor: pointer;
      }
      .viewer-bar__btn:hover {
        color: var(--hc-ink);
        background: var(--hc-ink-06);
      }
      .viewer-bar__btn[aria-pressed="true"] {
        background: var(--hc-ink);
        color: var(--hc-bg);
        border-color: var(--hc-ink);
      }

      /* Step tabs */
      .step-tabs {
        display: flex;
        padding: 0 18px;
        background: var(--hc-bg);
        border-bottom: 1px solid var(--hc-ink-12);
      }
      .step-tab {
        appearance: none;
        font: inherit;
        display: flex;
        align-items: baseline;
        gap: 10px;
        padding: 12px 16px;
        background: none;
        border: 0;
        border-bottom: 2px solid transparent;
        color: var(--hc-ink-60);
        cursor: pointer;
      }
      .step-tab:hover { color: var(--hc-ink); }
      .step-tab[aria-current="true"] {
        color: var(--hc-ink);
        border-bottom-color: var(--hc-ink);
      }
      .step-tab__num {
        font-family: var(--hc-mono);
        font-size: 11px;
        color: var(--hc-ink-40);
        font-variant-numeric: tabular-nums;
      }
      .step-tab[aria-current="true"] .step-tab__num {
        color: var(--hc-ink);
      }
      .step-tab__label { font-weight: 500; font-size: 13px; }
      .step-tab__sub {
        font-size: 11px;
        color: var(--hc-ink-40);
        margin-left: 2px;
      }

      /* Control bar */
      .control-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 20px;
        padding: 14px 18px;
        background: var(--hc-bg-2);
      }
      html[data-theme="dark"] .control-bar { background: #0e0e0e; }

      .control {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .control__label {
        font-size: 9.5px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--hc-ink-60);
      }
      .seg {
        display: inline-flex;
        border: 1px solid var(--hc-ink-12);
        border-radius: 4px;
        overflow: hidden;
        background: var(--hc-bg);
      }
      .seg button {
        appearance: none;
        font: inherit;
        font-size: 11px;
        padding: 5px 10px;
        background: transparent;
        border: 0;
        border-right: 1px solid var(--hc-ink-12);
        color: var(--hc-ink-60);
        cursor: pointer;
        white-space: nowrap;
      }
      .seg button:last-child { border-right: 0; }
      .seg button:hover {
        color: var(--hc-ink);
        background: var(--hc-ink-06);
      }
      .seg button[aria-pressed="true"] {
        background: var(--hc-ink);
        color: var(--hc-bg);
      }
      /* Preferred marker — filled dot next to the option label */
      .seg button.is-preferred::before,
      .swatch.is-preferred::before {
        content: "";
        display: inline-block;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--hc-ink);
        margin-right: 6px;
        vertical-align: baseline;
      }
      .swatch.is-preferred::before {
        position: absolute;
        top: -4px; right: -4px;
        margin: 0;
        border: 2px solid var(--hc-bg);
      }
      .seg button.is-preferred[aria-pressed="true"]::before,
      .swatch.is-preferred[aria-pressed="true"]::before {
        background: var(--hc-bg);
      }

      /* Rejected marker — red X + strikethrough. Options flagged
         rejected are still clickable (so you can flip back to
         re-evaluate), but visibly deprioritized. */
      .seg button.is-rejected {
        color: rgba(26, 26, 26, 0.45);
        text-decoration: line-through;
        text-decoration-color: rgba(26, 26, 26, 0.35);
      }
      .seg button.is-rejected::before {
        content: "✕";
        color: #c0392b;
        font-weight: 700;
        margin-right: 5px;
        text-decoration: none;
        display: inline-block;
      }
      .seg button.is-rejected[aria-pressed="true"] {
        color: rgba(255, 255, 255, 0.85);
        text-decoration-color: rgba(255, 255, 255, 0.6);
      }
      .seg button.is-rejected[aria-pressed="true"]::before {
        color: #ff6b5e;
      }
      /* Swatch rejected state — diagonal strike + red X badge */
      .swatch.is-rejected::after {
        content: "";
        position: absolute;
        inset: 2px;
        background:
          linear-gradient(
            to top right,
            transparent calc(50% - 1px),
            #c0392b calc(50% - 1px),
            #c0392b calc(50% + 1px),
            transparent calc(50% + 1px)
          );
        border-radius: 3px;
        pointer-events: none;
      }
      .swatch.is-rejected::before {
        content: "✕";
        position: absolute;
        top: -6px; right: -6px;
        margin: 0;
        width: 14px; height: 14px;
        background: #c0392b;
        color: #fff;
        border: 2px solid var(--hc-bg);
        border-radius: 50%;
        font-size: 8px;
        font-weight: 700;
        line-height: 10px;
        text-align: center;
      }

      /* Swatch selector (for palette + accent) */
      .swatches {
        display: inline-flex;
        gap: 4px;
      }
      .swatch {
        appearance: none;
        width: 22px;
        height: 22px;
        border-radius: 4px;
        border: 1px solid var(--hc-ink-12);
        padding: 0;
        cursor: pointer;
        position: relative;
      }
      .swatch[aria-pressed="true"]::after {
        content: "";
        position: absolute;
        inset: -3px;
        border: 2px solid var(--hc-ink);
        border-radius: 6px;
      }

      /* The stage that contains the real picker */
      .stage {
        overflow: hidden;
        background: var(--color-bg-base);
        display: grid;
        place-items: stretch;
        min-height: 0;
      }
      .stage__frame {
        width: 100%;
        height: 100%;
        overflow: hidden;
        margin: 0 auto;
        background: var(--color-bg-base);
      }
      html[data-preview-width="375"] .stage__frame { max-width: 375px; }
      html[data-preview-width="768"] .stage__frame { max-width: 768px; }
      html[data-preview-width="1200"] .stage__frame { max-width: 1200px; }

      /* Ensure the real picker fills the stage frame (it expects 100dvh) */
      .stage__frame unicode-picker {
        height: 100% !important;
      }

      /* ═══════════════════════════════════════════════════════════
         Grayscale — desaturate color only. Doesn't touch fonts or
         any other decision: the whole stage renders through a CSS
         filter so picks stay intact and the toggle is reversible.
         ═══════════════════════════════════════════════════════════ */
      html[data-grayscale="on"] .stage {
        filter: grayscale(1);
      }

      /* ═══════════════════════════════════════════════════════════
         STRUCTURE phase — layout, density, content sizing.
         Targets: real .main, .blocks-nav, char-grid via attrs on html.
         ═══════════════════════════════════════════════════════════ */

      /* 1. Block nav — wide. Scoped to wide container widths so these
         overrides don't fight the picker's built-in narrow container
         query (which converts the nav to a horizontal strip). */
      @container (min-width: 900px) {
        html[data-nav-wide="sidebar-right"] unicode-picker .main {
          flex-direction: row-reverse;
        }
        html[data-nav-wide="sidebar-right"] unicode-picker .blocks-nav {
          border-right: 0;
          border-left: 1px solid var(--color-border-subtle);
        }
        html[data-nav-wide="top-tabs"] unicode-picker .main {
          flex-direction: column;
        }
        html[data-nav-wide="top-tabs"] unicode-picker .blocks-nav {
          display: flex;
          width: auto;
          max-height: 44px;
          overflow-x: auto;
          overflow-y: hidden;
          border-right: 0;
          border-bottom: 1px solid var(--color-border-subtle);
          scrollbar-width: thin;
        }
        html[data-nav-wide="top-tabs"] unicode-picker .blocks-nav button {
          flex-shrink: 0;
          width: auto;
          white-space: nowrap;
          padding: var(--space-2) var(--space-3);
        }
      }

      /* 1b. Block nav — narrow (picker container <900px). Only kicks
         in at narrow widths; wide-mode nav-wide decision applies above. */
      .block-jump {
        display: none;
        margin: 0 var(--space-4) var(--space-2);
        padding: var(--space-2) var(--space-3);
        border: 1px solid var(--color-border-strong);
        border-radius: var(--radius-md);
        background: var(--color-input-bg);
        color: var(--color-text-primary);
        font: inherit;
        font-family: var(--font-ui);
        font-size: var(--text-sm);
      }
      @container (max-width: 900px) {
        html[data-nav-narrow="hidden"] unicode-picker .blocks-nav {
          display: none;
        }
        html[data-nav-narrow="dropdown"] unicode-picker .blocks-nav {
          display: none;
        }
        html[data-nav-narrow="dropdown"] unicode-picker .block-jump {
          display: block;
        }
      }

      /* 2. Cell min width */
      html[data-cell-min="80"]  char-grid { --_col-min: 80px; }
      html[data-cell-min="92"]  char-grid { --_col-min: 92px; }
      html[data-cell-min="104"] char-grid { --_col-min: 104px; }
      html[data-cell-min="118"] char-grid { --_col-min: 118px; }
      html[data-cell-min="140"] char-grid { --_col-min: 140px; }

      /* 3. Name lines (clamp) */
      html[data-name-lines="1"] char-grid .char-name {
        -webkit-line-clamp: 1;
      }
      html[data-name-lines="2"] char-grid .char-name {
        -webkit-line-clamp: 2;
      }
      html[data-name-lines="3"] char-grid .char-name {
        -webkit-line-clamp: 3;
      }

      /* 4. Density — cell padding only. Glyph size is a separate decision. */
      html[data-density="compact"] char-grid .char-cell {
        padding: var(--space-2) var(--space-1);
        gap: 2px;
      }
      html[data-density="airy"] char-grid .char-cell {
        padding: var(--space-4) var(--space-3);
        gap: var(--space-2);
      }

      /* 4b. Glyph size — controls --text-glyph independently of density. */
      html[data-glyph-size="small"]  char-grid { --text-glyph: 2.25rem; }
      html[data-glyph-size="large"]  char-grid { --text-glyph: 3.25rem; }
      html[data-glyph-size="xlarge"] char-grid { --text-glyph: 3.75rem; }

      /* 5. Section label scale */
      html[data-section-scale="micro"] char-grid .sticky-header,
      html[data-section-scale="micro"] char-grid .section-label {
        font-size: 0.625rem;
        letter-spacing: 0.14em;
      }
      html[data-section-scale="large"] char-grid .sticky-header,
      html[data-section-scale="large"] char-grid .section-label {
        font-size: 1.05rem;
        letter-spacing: 0;
        text-transform: none;
        font-weight: 500;
        height: 40px;
        margin-bottom: -40px;
      }

      /* ═══════════════════════════════════════════════════════════
         FORM phase — surface treatment, grayscale, hierarchy.
         ═══════════════════════════════════════════════════════════ */

      /* 1. Cell border style */
      html[data-cell-border="none"]   char-grid .char-cell { border: 0; }
      html[data-cell-border="dashed"] char-grid .char-cell {
        border-style: dashed;
      }
      html[data-cell-border="double"] char-grid .char-cell {
        border-style: double;
        border-width: 3px;
      }
      html[data-cell-border="heavy"]  char-grid .char-cell {
        border-width: 2px;
        border-color: var(--color-border-strong);
      }

      /* 2. Cell fill at rest */
      html[data-cell-fill="soft-tint"] char-grid .char-cell {
        background: var(--color-bg-surface);
      }
      html[data-cell-fill="glyph-box-only"] char-grid .char-cell {
        background: transparent;
        border: 0;
      }

      /* 3. Glyph background treatment */
      html[data-glyph-bg="none"] char-grid .char-glyph {
        background: transparent;
      }
      html[data-glyph-bg="outlined"] char-grid .char-glyph {
        background: transparent;
        border: 1px solid var(--color-border-subtle);
      }

      /* 4. Selected cell treatment */
      html[data-cell-selected="outlined"]
        char-grid .char-cell[aria-selected="true"] {
        background: transparent;
        outline: 2px solid var(--color-accent);
        outline-offset: -2px;
      }
      html[data-cell-selected="outlined"]
        char-grid .char-cell[aria-selected="true"] .char-glyph {
        background: var(--color-glyph-bg);
      }
      html[data-cell-selected="tinted"]
        char-grid .char-cell[aria-selected="true"] {
        background: var(--color-accent-subtle);
      }
      html[data-cell-selected="underline"]
        char-grid .char-cell[aria-selected="true"] {
        background: transparent;
        box-shadow: inset 0 -3px 0 var(--color-accent);
      }
      html[data-cell-selected="inverted"]
        char-grid .char-cell[aria-selected="true"] {
        background: var(--color-accent);
      }
      html[data-cell-selected="inverted"]
        char-grid .char-cell[aria-selected="true"] .char-glyph {
        color: var(--color-accent-text);
        background: transparent;
      }
      html[data-cell-selected="inverted"]
        char-grid .char-cell[aria-selected="true"] .char-name {
        color: var(--color-accent-text);
      }

      /* 5. Hover cell treatment */
      html[data-cell-hover="none"] char-grid .char-cell:hover {
        background: transparent;
      }
      html[data-cell-hover="outline"] char-grid .char-cell:hover {
        background: transparent;
        outline: 1px solid var(--color-border-strong);
        outline-offset: -1px;
      }
      html[data-cell-hover="lift"] char-grid .char-cell:hover {
        background: var(--color-bg-hover);
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
      }

      /* 6. Sidebar active treatment */
      html[data-sidebar-active="filled"]
        unicode-picker .blocks-nav button[aria-current="true"] {
        background: var(--color-accent);
        color: var(--color-accent-text);
      }
      html[data-sidebar-active="underline"]
        unicode-picker .blocks-nav button[aria-current="true"] {
        color: var(--color-accent);
        box-shadow: inset 0 -2px 0 var(--color-accent);
      }
      html[data-sidebar-active="left-bar"]
        unicode-picker .blocks-nav button[aria-current="true"] {
        color: var(--color-accent);
        box-shadow: inset 3px 0 0 var(--color-accent);
      }
      html[data-sidebar-active="inverted"]
        unicode-picker .blocks-nav button[aria-current="true"] {
        background: var(--color-text-primary);
        color: var(--color-bg-base);
      }

      /* 7. Search divider */
      html[data-search-divider="none"] unicode-picker .search-bar {
        border-bottom: 0;
      }
      html[data-search-divider="double"] unicode-picker .search-bar {
        border-bottom: 3px double var(--color-border-subtle);
      }

      /* 8. Section label role */
      html[data-section-role="serif-title"] char-grid .sticky-header,
      html[data-section-role="serif-title"] char-grid .section-label {
        font-family: "Newsreader", "Fraunces", Georgia, serif;
        text-transform: none;
        letter-spacing: 0;
        font-weight: 500;
        font-size: 1rem;
      }
      html[data-section-role="bold-bar"] char-grid .sticky-header,
      html[data-section-role="bold-bar"] char-grid .section-label {
        background: var(--color-text-primary);
        color: var(--color-bg-base);
        font-weight: 700;
        padding: 0 var(--space-3);
      }
      html[data-section-role="small-caps"] char-grid .sticky-header,
      html[data-section-role="small-caps"] char-grid .section-label {
        text-transform: none;
        font-variant: small-caps;
        letter-spacing: 0.05em;
      }

      /* 9. Section underline */
      html[data-section-underline="none"] char-grid .sticky-header,
      html[data-section-underline="none"] char-grid .section-label {
        border-bottom: 0;
      }
      html[data-section-underline="accent-bar"] char-grid .sticky-header,
      html[data-section-underline="accent-bar"] char-grid .section-label {
        border-bottom: 2px solid var(--color-accent);
      }
      html[data-section-underline="double"] char-grid .sticky-header,
      html[data-section-underline="double"] char-grid .section-label {
        border-bottom: 3px double var(--color-border-subtle);
      }

      /* 10. Glyph weight */
      html[data-glyph-weight="medium"] char-grid .char-glyph {
        font-weight: 500;
      }
      html[data-glyph-weight="bold"] char-grid .char-glyph {
        font-weight: 700;
      }

      /* 11. Search shape */
      html[data-search-shape="pill"] unicode-picker .search-bar input {
        border-radius: 999px;
      }
      html[data-search-shape="square"] unicode-picker .search-bar input {
        border-radius: 0;
      }

      /* ═══════════════════════════════════════════════════════════
         SURFACE phase — fonts + palette presets.
         ═══════════════════════════════════════════════════════════ */

      /* 1. Chrome typeface */
      html[data-chrome-font="ibm-plex-sans"] unicode-picker {
        --font-ui: "IBM Plex Sans", sans-serif;
      }
      html[data-chrome-font="inter"] unicode-picker {
        --font-ui: "Inter", sans-serif;
      }
      html[data-chrome-font="geist-mono"] unicode-picker {
        --font-ui: "Geist Mono", ui-monospace, monospace;
      }
      html[data-chrome-font="system"] unicode-picker {
        --font-ui: -apple-system, system-ui, sans-serif;
      }

      /* 2. Glyph typeface */
      html[data-glyph-font="iowan"] char-grid {
        --font-glyph:
          "Iowan Old Style", "Palatino", Georgia, serif;
      }
      html[data-glyph-font="fraunces"] char-grid {
        --font-glyph: "Fraunces", Georgia, serif;
      }
      html[data-glyph-font="plex-mono"] char-grid {
        --font-glyph: "IBM Plex Mono", ui-monospace, monospace;
      }
      html[data-glyph-font="jetbrains"] char-grid {
        --font-glyph: "JetBrains Mono", ui-monospace, monospace;
      }
      html[data-glyph-font="space-mono"] char-grid {
        --font-glyph: "Space Mono", ui-monospace, monospace;
      }

      /* 3. Palette presets — override the real app's semantic tokens.
         Each preset defines both a light and dark variant.
         Presets are lifted from style-tiles.html. */

      /* Typewriter */
      html[data-palette="typewriter"][data-theme="light"] unicode-picker {
        --color-bg-base: #efe7d2;
        --color-bg-raised: #ece1c3;
        --color-bg-surface: #f6ecd0;
        --color-bg-hover: #e4d8b6;
        --color-bg-selected: #e4d8b6;
        --color-input-bg: #f6ecd0;
        --color-text-primary: #1a1710;
        --color-text-secondary: #7a6d4f;
        --color-text-tertiary: #9a8d6f;
        --color-border-subtle: rgba(26, 23, 16, 0.18);
        --color-border-strong: rgba(26, 23, 16, 0.3);
        --color-accent: #b8321d;
        --color-accent-subtle: rgba(184, 50, 29, 0.12);
        --color-accent-text: #efe7d2;
        --color-glyph-bg: rgba(26, 23, 16, 0.04);
      }
      html[data-palette="typewriter"][data-theme="dark"] unicode-picker {
        --color-bg-base: #15130d;

  <body>

    <!-- Real app templates (unchanged). char-grid, copy-toast,
         and unicode-picker all read these. -->
    <template id="char-cell-template">
      <div class="char-cell">
        <span class="char-glyph"></span>
        <span class="char-name"></span>
      </div>
    </template>

    <template id="char-grid-empty-template">
      <div class="empty"></div>
    </template>

    <template id="char-grid-template">
      <div class="scroll-container">
        <div class="sticky-header"></div>
        <div class="scroll-spacer">
          <div class="grid"></div>
        </div>
      </div>
    </template>

    <template id="unicode-picker-template">
      <div class="search-bar">
        <div class="search-row">
          <div class="input-wrapper">
            <svg class="search-icon" aria-hidden="true"
                 viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text"
                   placeholder="Search Unicode characters…"
                   autofocus />
            <button type="button" class="clear-button"
                    aria-label="Clear search" disabled>
              <svg aria-hidden="true" focusable="false"
                   viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </div>
          <label class="theme-toggle" title="Toggle light/dark mode">
            <input type="checkbox" role="switch" aria-label="Dark mode" />
            <span class="toggle-track">
              <span class="toggle-thumb">
                <svg class="icon-sun" aria-hidden="true"
                     viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="4" />
                  <line x1="12" y1="2" x2="12" y2="4" />
                  <line x1="12" y1="20" x2="12" y2="22" />
                  <line x1="4.93" y1="4.93" x2="6.34" y2="6.34" />
                  <line x1="17.66" y1="17.66" x2="19.07" y2="19.07" />
                  <line x1="2" y1="12" x2="4" y2="12" />
                  <line x1="20" y1="12" x2="22" y2="12" />
                  <line x1="4.93" y1="19.07" x2="6.34" y2="17.66" />
                  <line x1="17.66" y1="6.34" x2="19.07" y2="4.93" />
                </svg>
                <svg class="icon-moon" aria-hidden="true"
                     viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
              </span>
            </span>
          </label>
        </div>
        <div class="status">Loading…</div>
      </div>
      <div class="main">
        <nav class="blocks-nav" role="listbox"
             aria-label="Unicode blocks"></nav>
        <div class="results">
          <char-grid></char-grid>
        </div>
      </div>
      <copy-toast></copy-toast>
    </template>

    <!-- ════════════════════════════════════════════════════════════
         Harness chrome
         ════════════════════════════════════════════════════════════ -->
    <div class="harness viewer-bar">
      <span class="viewer-bar__title">Unicode Picker — Design</span>
      <span class="viewer-bar__sub" id="viewer-sub"></span>
      <button class="viewer-bar__btn" id="grayscale-btn"
              aria-pressed="false" title="Isolate structure + form">
        Grayscale
      </button>
      <div class="seg" role="group" aria-label="Preview width">
        <button data-width="auto" aria-pressed="true">Auto</button>
        <button data-width="1200">1200</button>
        <button data-width="768">768</button>
        <button data-width="375">375</button>
      </div>
      <div class="seg" role="group" aria-label="Theme">
        <button data-theme="light" aria-pressed="true">Light</button>
        <button data-theme="dark">Dark</button>
      </div>
      <button class="viewer-bar__btn" id="reset-btn"
              title="Reset every decision to defaults">
        Reset
      </button>
    </div>

    <div class="harness step-tabs" id="step-tabs"></div>
    <div class="harness control-bar" id="control-bar"></div>

    <!-- ════════════════════════════════════════════════════════════
         The real application — mounted live, real data, real events.
         ════════════════════════════════════════════════════════════ -->
    <div class="stage">
      <div class="stage__frame">
        <unicode-picker></unicode-picker>
      </div>
    </div>

    <script type="module" src="../components/unicode-picker.js"></script>

    <!-- ════════════════════════════════════════════════════════════
         Harness wiring — decisions, state, persistence, UI.
         ════════════════════════════════════════════════════════════ -->
    <script type="module">
      const html = document.documentElement;

      /* --- Decision model ---------------------------------------- */
      const STEPS = [
        { id: "structure", label: "Structure",
          sub: "Arrangement · sizing · density" },
        { id: "form",      label: "Form",
          sub: "Shape · hierarchy · interactive states" },
        { id: "surface",   label: "Surface",
          sub: "Fonts · palette · accent" },
      ];

      const DECISIONS = [
        /* ─ Structure ─ */
        { id: "nav-wide", step: "structure", label: "Block nav (wide)",
          options: [
            ["sidebar-left",  "Sidebar L"],
            ["sidebar-right", "Sidebar R", { preferred: true }],
            ["top-tabs",      "Top tabs"],
          ],
          default: "sidebar-left" },
        { id: "nav-narrow", step: "structure", label: "Block nav (narrow)",
          help: "At picker width <900px. Preview at 375 or 768 to see.",
          options: [
            ["top-strip", "Top strip", { preferred: true }],
            ["dropdown",  "Dropdown"],
            ["hidden",    "Hidden"],
          ],
          default: "top-strip" },
        { id: "cell-min", step: "structure", label: "Char tile width",
          options: [
            ["80", "80"], ["92", "92"],
            ["104", "104", { preferred: true }],
            ["118", "118"], ["140", "140"],
          ],
          default: "104" },
        { id: "name-lines", step: "structure", label: "Char name lines",
          options: [
            ["1", "1"], ["2", "2"],
            ["3", "3", { preferred: true }],
          ],
          default: "3" },
        { id: "density", step: "structure", label: "Density (spacing)",
          options: [
            ["compact", "Compact"],
            ["default", "Default", { preferred: true }],
            ["airy",    "Airy",    { preferred: true }],
          ],
          default: "default" },
        { id: "glyph-size", step: "structure", label: "Glyph size",
          options: [
            ["small",   "Small"],
            ["default", "Default", { preferred: true }],
            ["large",   "Large"],
            ["xlarge",  "X-Large"],
          ],
          default: "default" },
        { id: "section-scale", step: "structure",
          label: "Section label scale",
          options: [
            ["micro",    "Micro"],
            ["standard", "Standard", { preferred: true }],
            ["large",    "Large"],
          ],
          default: "standard" },

        /* ─ Form ─ */
        { id: "cell-border", step: "form", label: "Tile border",
          options: [
            ["solid",  "Solid"],
            ["none",   "None"],
            ["dashed", "Dashed"],
            ["double", "Double"],
            ["heavy",  "Heavy"],
          ],
          default: "solid" },
        { id: "cell-fill", step: "form", label: "Tile fill",
          options: [
            ["transparent",     "Transparent"],
            ["soft-tint",       "Soft tint"],
            ["glyph-box-only",  "Glyph only"],
          ],
          default: "transparent" },
        { id: "glyph-bg", step: "form", label: "Glyph background",
          options: [
            ["tint",     "Tint"],
            ["none",     "None"],
            ["outlined", "Outlined"],
          ],
          default: "tint" },
        { id: "cell-selected", step: "form", label: "Selected tile",
          options: [
            ["filled",    "Filled"],
            ["outlined",  "Outlined"],
            ["tinted",    "Tinted"],
            ["underline", "Underline"],
            ["inverted",  "Inverted"],
          ],
          default: "filled" },
        { id: "cell-hover", step: "form", label: "Hover tile",
          options: [
            ["tint",    "Tint"],
            ["none",    "None"],
            ["outline", "Outline"],
            ["lift",    "Lift"],
          ],
          default: "tint" },
        { id: "sidebar-active", step: "form", label: "Sidebar active",
          options: [
            ["left-bar",  "Left bar"],
            ["filled",    "Filled"],
            ["underline", "Underline"],
            ["inverted",  "Inverted"],
          ],
          default: "left-bar" },
        { id: "search-divider", step: "form", label: "Search divider",
          options: [
            ["hairline", "Hairline"],
            ["none",     "None"],
            ["double",   "Double"],
          ],
          default: "hairline" },
        { id: "section-role", step: "form", label: "Section label type",
          options: [
            ["tracked-sans", "Tracked sans"],
            ["small-caps",   "Small caps"],
            ["serif-title",  "Serif title"],
            ["bold-bar",     "Bold bar"],
          ],
          default: "tracked-sans" },
        { id: "section-underline", step: "form", label: "Section underline",
          options: [
            ["hairline",    "Hairline"],
            ["none",        "None"],
            ["accent-bar",  "Accent bar"],
            ["double",      "Double"],
          ],
          default: "hairline" },
        { id: "glyph-weight", step: "form", label: "Glyph weight",
          options: [
            ["regular", "Regular"],
            ["medium",  "Medium"],
            ["bold",    "Bold"],
          ],
          default: "regular" },
        { id: "search-shape", step: "form", label: "Search shape",
          options: [
            ["rounded", "Rounded"],
            ["pill",    "Pill"],
            ["square",  "Square"],
          ],
          default: "rounded" },

        /* ─ Surface ─ */
        { id: "chrome-font", step: "surface", label: "Chrome typeface",
          options: [
            ["plex-mono",     "Plex Mono"],
            ["ibm-plex-sans", "Plex Sans"],
            ["inter",         "Inter"],
            ["geist-mono",    "Geist Mono"],
            ["system",        "System"],
          ],
          default: "plex-mono" },
        { id: "glyph-font", step: "surface", label: "Glyph typeface",
          options: [
            ["noto",      "Noto"],
            ["iowan",     "Iowan"],
            ["fraunces",  "Fraunces"],
            ["plex-mono", "Plex Mono"],
            ["jetbrains", "JetBrains"],
            ["space-mono","Space Mono"],
          ],
          default: "noto" },
        { id: "palette", step: "surface", label: "Palette preset",
          kind: "swatch-palette",
          options: [
            ["default",    "Default",    "#16573e"],
            ["typewriter", "Typewriter", "#b8321d"],
            ["classical",  "Classical",  "#8a2b1a"],
            ["specimen",   "Specimen",   "#ff4d1a"],
            ["scientific", "Scientific", "#2d6d63"],
            ["museum",     "Museum",     "#bd4a34"],
            ["swiss",      "Swiss",      "#0033ff"],
            ["poster",     "Poster",     "#d83321"],
            ["art-object", "Art object", "#ff2f7a"],
            ["digital",    "Digital",    "#5c2ad9"],
            ["archive",    "Archive",    "#9c351b"],
            ["global",     "Global",     "#b03b25"],
          ],
          default: "default" },
        { id: "accent", step: "surface", label: "Accent override",
          kind: "swatch-accent",
          options: [
            ["inherit",    "Inherit",    null],
            ["cobalt",     "Cobalt",     "#0047ff"],
            ["forest",     "Forest",     "#1b6845"],
            ["oxblood",    "Oxblood",    "#7e1e2a"],
            ["ochre",      "Ochre",      "#b8721a"],
            ["plum",       "Plum",       "#6b2b5b"],
            ["teal",       "Teal",       "#0f6f75"],
            ["graphite",   "Graphite",   "#2a2a2a"],
            ["vermillion", "Vermillion", "#d83321"],
          ],
          default: "inherit" },
      ];

      /* --- State ------------------------------------------------- */
      const STATE_KEY = "unicode-picker:design-decisions";
      const STEP_KEY = "unicode-picker:design-step";
      const GRAYSCALE_KEY = "unicode-picker:design-grayscale";

      /* The "preferred" value is whichever option is flagged
         { preferred: true }. It's the default that loads on first
         visit (and after Reset), but localStorage still wins if the
         user has been flipping values around. */
      function preferredValue(d) {
        const pref = d.options.find(o => o[2]?.preferred);
        return pref ? pref[0] : d.default;
      }

      const state = (() => {
        let saved;
        try { saved = JSON.parse(localStorage.getItem(STATE_KEY) || "{}"); }
        catch (e) { saved = {}; }
        const defaults = Object.fromEntries(
          DECISIONS.map(d => [d.id, preferredValue(d)]),
        );
        return { ...defaults, ...saved };
      })();
      let currentStep =
        localStorage.getItem(STEP_KEY) || "structure";
      let grayscale = localStorage.getItem(GRAYSCALE_KEY) === "on";

      /* --- Sync state → DOM attributes --------------------------- */
      function apply() {
        for (const d of DECISIONS) {
          const v = state[d.id];
          if (v == null || v === "inherit") {
            html.removeAttribute(`data-${d.id}`);
          } else {
            html.setAttribute(`data-${d.id}`, v);
          }
        }
        html.setAttribute("data-step", currentStep);
        html.setAttribute(
          "data-grayscale", grayscale ? "on" : "off",
        );
      }

      function save() {
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
        localStorage.setItem(STEP_KEY, currentStep);
        localStorage.setItem(GRAYSCALE_KEY, grayscale ? "on" : "off");
      }

      /* --- Render step tabs ------------------------------------- */
      const stepTabsEl = document.getElementById("step-tabs");
      function renderTabs() {
        stepTabsEl.innerHTML = STEPS.map((s, i) => `
          <button class="step-tab"
                  data-step="${s.id}"
                  aria-current="${s.id === currentStep}">
            <span class="step-tab__num">
              ${String(i + 1).padStart(2, "0")}
            </span>
            <span class="step-tab__label">${s.label}</span>
            <span class="step-tab__sub">${s.sub}</span>
          </button>
        `).join("");
      }
      stepTabsEl.addEventListener("click", (e) => {
        const btn = e.target.closest(".step-tab");
        if (!btn) return;
        currentStep = btn.dataset.step;
        save(); apply(); renderTabs(); renderControls(); renderSub();
      });

      /* --- Render controls for the active step ------------------ */
      const controlBarEl = document.getElementById("control-bar");
      function renderControls() {
        const decisions = DECISIONS
          .filter(d => d.step === currentStep);
        controlBarEl.innerHTML = decisions.map(d => renderControl(d))
          .join("");
      }

      function renderControl(d) {
        if (d.kind === "swatch-palette" || d.kind === "swatch-accent") {
          return `
            <div class="control" data-decision="${d.id}">
              <span class="control__label">${d.label}</span>
              <div class="swatches">
                ${d.options.map(opt => {
                  const [val, lbl, color] = opt;
                  const meta = opt[3] || {};
                  const pressed = state[d.id] === val;
                  const cls = [
                    "swatch",
                    meta.preferred ? "is-preferred" : "",
                    meta.rejected ? "is-rejected" : "",
                  ].filter(Boolean).join(" ");
                  const title = [
                    lbl,
                    meta.preferred ? "(preferred)" : "",
                    meta.rejected
                      ? `(rejected${meta.reason ? ": " + meta.reason : ""})`
                      : "",
                  ].filter(Boolean).join(" ");
                  const style = color
                    ? `background:${color};`
                    : "background:repeating-linear-gradient(45deg,#ddd 0 4px,#fff 4px 8px);";
                  return `
                    <button class="${cls}"
                            data-value="${val}"
                            aria-pressed="${pressed}"
                            title="${title}"
                            style="${style}"></button>
                  `;
                }).join("")}
              </div>
            </div>
          `;
        }
        return `
          <div class="control" data-decision="${d.id}">
            <span class="control__label">${d.label}</span>
            <div class="seg">
              ${d.options.map(opt => {
                const [val, lbl] = opt;
                const meta = opt[2] || {};
                const cls = [
                  meta.preferred ? "is-preferred" : "",
                  meta.rejected ? "is-rejected" : "",
                ].filter(Boolean).join(" ");
                const title = [
                  meta.preferred ? "Preferred" : "",
                  meta.rejected
                    ? `Rejected${meta.reason ? ": " + meta.reason : ""}`
                    : "",
                ].filter(Boolean).join(" ");
                return `
                  <button data-value="${val}"
                          class="${cls}"
                          aria-pressed="${state[d.id] === val}"
                          title="${title}">
                    ${lbl}
                  </button>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }
      controlBarEl.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-value]");
        if (!btn) return;
        const decisionEl = btn.closest("[data-decision]");
        const id = decisionEl.dataset.decision;
        state[id] = btn.dataset.value;
        save(); apply(); renderControls();
      });

      /* --- Viewer bar (grayscale, width, theme, reset) ---------- */
      const grayBtn = document.getElementById("grayscale-btn");
      grayBtn.addEventListener("click", () => {
        grayscale = !grayscale;
        grayBtn.setAttribute(
          "aria-pressed", grayscale ? "true" : "false",
        );
        save(); apply();
      });

      document.querySelectorAll('[data-width]').forEach(btn => {
        btn.addEventListener("click", () => {
          const w = btn.dataset.width;
          html.setAttribute("data-preview-width", w);
          document.querySelectorAll('[data-width]').forEach(b =>
            b.setAttribute(
              "aria-pressed", b === btn ? "true" : "false",
            ),
          );
        });
      });

      document.querySelectorAll('.seg [data-theme]').forEach(btn => {
        btn.addEventListener("click", () => {
          const t = btn.dataset.theme;
          html.setAttribute("data-theme", t);
          try { localStorage.setItem("unicode-picker-theme", t); }
          catch (e) {}
          document.querySelectorAll('[data-theme]').forEach(b => {
            if (b.hasAttribute("data-theme") && b.tagName === "BUTTON") {
              b.setAttribute(
                "aria-pressed", b === btn ? "true" : "false",
              );
            }
          });
        });
      });
      // Sync theme buttons to current
      const curTheme = html.getAttribute("data-theme") || "light";
      document.querySelectorAll('.seg [data-theme]').forEach(b => {
        if (b.tagName === "BUTTON") {
          b.setAttribute(
            "aria-pressed",
            b.dataset.theme === curTheme ? "true" : "false",
          );
        }
      });

      document.getElementById("reset-btn").addEventListener("click", () => {
        for (const d of DECISIONS) state[d.id] = preferredValue(d);
        grayscale = false;
        grayBtn.setAttribute("aria-pressed", "false");
        save(); apply(); renderControls();
      });

      function renderSub() {
        const s = STEPS.find(s => s.id === currentStep);
        document.getElementById("viewer-sub").textContent =
          s ? `Phase ${STEPS.indexOf(s) + 1} · ${s.sub}` : "";
      }

      /* --- Block-nav dropdown (nav-narrow="dropdown") -----------
         Injects a native <select> right before the blocks-nav,
         populated from the same block buttons. Changing the select
         triggers a click on the matching button so the real scroll-
         into-view logic in the picker takes over. Kept in sync via
         MutationObserver on the nav. */
      function wireBlockJump() {
        const picker = document.querySelector("unicode-picker");
        if (!picker) return;
        const nav = picker.querySelector(".blocks-nav");
        if (!nav) return;

        const select = document.createElement("select");
        select.className = "block-jump";
        select.setAttribute("aria-label", "Jump to Unicode block");
        nav.parentNode.insertBefore(select, nav);

        let syncing = false;
        const sync = () => {
          const buttons = Array.from(
            nav.querySelectorAll("button")).filter(
            b => !b.disabled && b.offsetParent !== null
          );
          // Rebuild options (block list may change with search filter)
          const cur = buttons.find(
            b => b.getAttribute("aria-current") === "true");
          const curLabel = cur?.textContent.trim() || "";
          const opts = buttons.map(b => {
            const lbl = b.textContent.trim();
            return `<option ${
              lbl === curLabel ? "selected" : ""
            }>${lbl}</option>`;
          }).join("");
          syncing = true;
          select.innerHTML = opts;
          syncing = false;
        };

        // Initial + on change
        sync();
        const mo = new MutationObserver(() => sync());
        mo.observe(nav, {
          childList: true, subtree: true,
          attributes: true, attributeFilter: ["aria-current"],
        });

        select.addEventListener("change", () => {
          if (syncing) return;
          const wanted = select.value;
          const buttons = Array.from(nav.querySelectorAll("button"));
          const match = buttons.find(
            b => b.textContent.trim() === wanted);
          if (match) match.click();
        });
      }

      /* --- Boot ------------------------------------------------- */
      grayBtn.setAttribute(
        "aria-pressed", grayscale ? "true" : "false",
      );
      apply();
      renderTabs();
      renderControls();
      renderSub();

      // Wait for the picker's blocks-nav to populate (it happens
      // async after the TSV data loads), then wire the dropdown.
      const waitForNav = () => {
        const nav = document.querySelector("unicode-picker .blocks-nav");
        if (nav && nav.querySelector("button")) {
          wireBlockJump();
        } else {
          setTimeout(waitForNav, 80);
        }
      };
      waitForNav();
    </script>
  </body>
</html>
