<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1,
                   viewport-fit=cover" />
    <title>Unicode Picker — Design Prototype</title>

    <!-- Google Fonts for the Surface-phase typeface options -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Geist+Mono:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,700;1,6..72,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" />

    <!-- Real application stylesheets & theme bootstrap (unchanged) -->
    <link rel="stylesheet" href="../noto-fonts.css" />
    <link rel="stylesheet" href="../style.css" />
    <script>
      (function () {
        let saved;
        try {
          saved = localStorage.getItem("unicode-picker-theme");
        } catch (e) {}
        const theme = saved ||
          (matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
      })();
    </script>

    <style>
      /* ═══════════════════════════════════════════════════════════
         Design harness chrome
         ═══════════════════════════════════════════════════════════ */
      :root {
        --hc-bg:    #fff;
        --hc-bg-2:  #fafaf7;
        --hc-ink:   #1a1a1a;
        --hc-ink-60: rgba(26, 26, 26, 0.60);
        --hc-ink-40: rgba(26, 26, 26, 0.40);
        --hc-ink-12: rgba(26, 26, 26, 0.12);
        --hc-ink-06: rgba(26, 26, 26, 0.06);
        --hc-sans:
          "IBM Plex Sans", -apple-system, system-ui, sans-serif;
        --hc-mono:
          "IBM Plex Mono", ui-monospace, Menlo, monospace;
      }
      html[data-theme="dark"] .harness {
        --hc-bg:    #181818;
        --hc-bg-2:  #111;
        --hc-ink:   #eee;
        --hc-ink-60: rgba(238, 238, 238, 0.60);
        --hc-ink-40: rgba(238, 238, 238, 0.40);
        --hc-ink-12: rgba(238, 238, 238, 0.12);
        --hc-ink-06: rgba(238, 238, 238, 0.06);
      }

      /* Harness layout. The picker lives in a stage below. */
      body {
        height: 100dvh;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto auto auto 1fr;
      }
      .harness {
        font-family: var(--hc-sans);
        font-size: 13px;
        color: var(--hc-ink);
        background: var(--hc-bg);
        border-bottom: 1px solid var(--hc-ink-12);
      }
      .harness + .harness { border-top: 0; }

      /* Viewer bar */
      .viewer-bar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 18px;
        flex-wrap: wrap;
      }
      .viewer-bar__title {
        font-weight: 600;
        font-size: 13px;
      }
      .viewer-bar__sub {
        font-size: 11px;
        color: var(--hc-ink-60);
        flex: 1;
      }
      .viewer-bar__btn {
        appearance: none;
        font: inherit;
        font-size: 11px;
        padding: 5px 10px;
        border: 1px solid var(--hc-ink-12);
        border-radius: 4px;
        color: var(--hc-ink-60);
        background: var(--hc-bg);
        cursor: pointer;
      }
      .viewer-bar__btn:hover {
        color: var(--hc-ink);
        background: var(--hc-ink-06);
      }
      .viewer-bar__btn[aria-pressed="true"] {
        background: var(--hc-ink);
        color: var(--hc-bg);
        border-color: var(--hc-ink);
      }

      /* Step tabs */
      .step-tabs {
        display: flex;
        padding: 0 18px;
        background: var(--hc-bg);
        border-bottom: 1px solid var(--hc-ink-12);
      }
      .step-tab {
        appearance: none;
        font: inherit;
        display: flex;
        align-items: baseline;
        gap: 10px;
        padding: 12px 16px;
        background: none;
        border: 0;
        border-bottom: 2px solid transparent;
        color: var(--hc-ink-60);
        cursor: pointer;
      }
      .step-tab:hover { color: var(--hc-ink); }
      .step-tab[aria-current="true"] {
        color: var(--hc-ink);
        border-bottom-color: var(--hc-ink);
      }
      .step-tab__num {
        font-family: var(--hc-mono);
        font-size: 11px;
        color: var(--hc-ink-40);
        font-variant-numeric: tabular-nums;
      }
      .step-tab[aria-current="true"] .step-tab__num {
        color: var(--hc-ink);
      }
      .step-tab__label { font-weight: 500; font-size: 13px; }
      .step-tab__sub {
        font-size: 11px;
        color: var(--hc-ink-40);
        margin-left: 2px;
      }

      /* Control bar */
      .control-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 20px;
        padding: 14px 18px;
        background: var(--hc-bg-2);
      }
      html[data-theme="dark"] .control-bar { background: #0e0e0e; }

      .control {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .control__label {
        font-size: 9.5px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--hc-ink-60);
      }
      .seg {
        display: inline-flex;
        border: 1px solid var(--hc-ink-12);
        border-radius: 4px;
        overflow: hidden;
        background: var(--hc-bg);
      }
      .seg button {
        appearance: none;
        font: inherit;
        font-size: 11px;
        padding: 5px 10px;
        background: transparent;
        border: 0;
        border-right: 1px solid var(--hc-ink-12);
        color: var(--hc-ink-60);
        cursor: pointer;
        white-space: nowrap;
      }
      .seg button:last-child { border-right: 0; }
      .seg button:hover {
        color: var(--hc-ink);
        background: var(--hc-ink-06);
      }
      .seg button[aria-pressed="true"] {
        background: var(--hc-ink);
        color: var(--hc-bg);
      }
      /* Preferred marker — filled dot next to the option label */
      .seg button.is-preferred::before,
      .swatch.is-preferred::before {
        content: "";
        display: inline-block;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--hc-ink);
        margin-right: 6px;
        vertical-align: baseline;
      }
      .swatch.is-preferred::before {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        margin: 0;
        border: 0;
        width: 8px; height: 8px;
      }
      /* Dot color = whichever of near-white / near-black is
         perceptually furthest from the swatch's L. Neutral
         swatches render at step-3 and accent swatches at step-9,
         and those step L values flip with theme, so the dot
         color follows the active theme's ink (step-12) for
         neutral and the active theme's bg (step-1) for accent. */
      .swatch[data-role="neutral"].is-preferred::before {
        background: oklch(var(--step-12) 0 0);
      }
      .swatch[data-role="accent"].is-preferred::before {
        background: oklch(var(--step-1) 0 0);
      }
      .seg button.is-preferred[aria-pressed="true"]::before,
      .swatch.is-preferred[aria-pressed="true"]::before {
        background: var(--hc-bg);
      }

      /* Rejected marker — red X + strikethrough. Options flagged
         rejected are still clickable (so you can flip back to
         re-evaluate), but visibly deprioritized. */
      .seg button.is-rejected {
        color: rgba(26, 26, 26, 0.45);
        text-decoration: line-through;
        text-decoration-color: rgba(26, 26, 26, 0.35);
      }
      .seg button.is-rejected::before {
        content: "✕";
        color: #c0392b;
        font-weight: 700;
        margin-right: 5px;
        text-decoration: none;
        display: inline-block;
      }
      .seg button.is-rejected[aria-pressed="true"] {
        color: rgba(255, 255, 255, 0.85);
        text-decoration-color: rgba(255, 255, 255, 0.6);
      }
      .seg button.is-rejected[aria-pressed="true"]::before {
        color: #ff6b5e;
      }
      /* Swatch rejected state — diagonal strike + red X badge */
      .swatch.is-rejected::after {
        content: "";
        position: absolute;
        inset: 2px;
        background:
          linear-gradient(
            to top right,
            transparent calc(50% - 1px),
            #c0392b calc(50% - 1px),
            #c0392b calc(50% + 1px),
            transparent calc(50% + 1px)
          );
        border-radius: 3px;
        pointer-events: none;
      }
      .swatch.is-rejected::before {
        content: "✕";
        position: absolute;
        top: -6px; right: -6px;
        margin: 0;
        width: 14px; height: 14px;
        background: #c0392b;
        color: #fff;
        border: 2px solid var(--hc-bg);
        border-radius: 50%;
        font-size: 8px;
        font-weight: 700;
        line-height: 10px;
        text-align: center;
      }

      /* Swatch selector (for palette + accent) */
      .swatches {
        display: inline-flex;
        gap: 4px;
      }
      .swatch {
        appearance: none;
        width: 22px;
        height: 22px;
        border-radius: 4px;
        border: 1px solid var(--hc-ink-12);
        padding: 0;
        cursor: pointer;
        position: relative;
      }
      /* Theme-aware swatch backgrounds. --step-3 is tile surface,
         --step-9 is solid accent; both flip L between themes, so
         the preview matches how the chosen hue/chroma actually
         renders in the current theme. --sw-h falls back to the
         scale's live hue so chroma swatches follow the selected
         hue (they omit --sw-h). */
      .swatch[data-role="neutral"] {
        background: oklch(
          var(--step-3)
          var(--sw-c)
          var(--sw-h, var(--neutral-hue))
        );
      }
      .swatch[data-role="accent"] {
        background: oklch(
          var(--step-9)
          var(--sw-c)
          var(--sw-h, var(--accent-hue))
        );
      }
      .swatch[aria-pressed="true"]::after {
        content: "";
        position: absolute;
        inset: -3px;
        border: 2px solid var(--hc-ink);
        border-radius: 6px;
      }

      /* The stage that contains the real picker */
      .stage {
        overflow: hidden;
        background: var(--color-bg-base);
        display: grid;
        place-items: stretch;
        min-height: 0;
      }
      .stage__frame {
        width: 100%;
        height: 100%;
        overflow: hidden;
        margin: 0 auto;
        background: var(--color-bg-base);
      }
      html[data-preview-width="375"] .stage__frame { max-width: 375px; }
      html[data-preview-width="768"] .stage__frame { max-width: 768px; }
      html[data-preview-width="1200"] .stage__frame { max-width: 1200px; }

      /* Ensure the real picker fills the stage frame (it expects 100dvh) */
      .stage__frame unicode-picker {
        height: 100% !important;
      }

      /* ═══════════════════════════════════════════════════════════
         Grayscale — desaturate color only. Doesn't touch fonts or
         any other decision: the whole stage renders through a CSS
         filter so picks stay intact and the toggle is reversible.
         ═══════════════════════════════════════════════════════════ */
      html[data-grayscale="on"] .stage {
        filter: grayscale(1);
      }

      /* ═══════════════════════════════════════════════════════════
         STRUCTURE phase — layout, density, content sizing.
         Targets: real .main, .blocks-nav, char-grid via attrs on html.
         ═══════════════════════════════════════════════════════════ */

      /* 1. Block nav — wide. Scoped to wide container widths so these
         overrides don't fight the picker's built-in narrow container
         query (which converts the nav to a horizontal strip). */
      @container (min-width: 900px) {
        html[data-nav-wide="sidebar-right"] unicode-picker .main {
          flex-direction: row-reverse;
        }
        html[data-nav-wide="sidebar-right"] unicode-picker .blocks-nav {
          border-right: 0;
          border-left: 1px solid var(--color-border-subtle);
        }
        html[data-nav-wide="top-tabs"] unicode-picker .main {
          flex-direction: column;
        }
        html[data-nav-wide="top-tabs"] unicode-picker .blocks-nav {
          display: flex;
          width: auto;
          max-height: 44px;
          overflow-x: auto;
          overflow-y: hidden;
          border-right: 0;
          border-bottom: 1px solid var(--color-border-subtle);
          scrollbar-width: thin;
        }
        html[data-nav-wide="top-tabs"] unicode-picker .blocks-nav button {
          flex-shrink: 0;
          width: auto;
          white-space: nowrap;
          padding: var(--space-2) var(--space-3);
        }
      }

      /* 1c. Blocks nav label — optional "Jump to" header. Rendered
         via ::before so it sits at the top of the sidebar (when the
         nav is column-oriented) or at the start of the strip (when
         the nav is row-oriented). */
      html[data-nav-label="jump-to"] unicode-picker .blocks-nav {
        scroll-padding-top: 2rem;
        scroll-padding-left: 5rem;
      }
      html[data-nav-label="jump-to"] unicode-picker .blocks-nav::before {
        content: "Jump to";
        display: block;
        position: sticky;
        top: 0;
        left: 0;
        z-index: 1;
        padding: var(--space-2) var(--space-3);
        font-family: var(--font-ui);
        font-size: var(--text-xs);
        font-weight: var(--weight-medium);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-text-tertiary);
        background: var(--color-bg-raised);
        white-space: nowrap;
        flex-shrink: 0;
      }
      /* Dropdown variant at narrow widths: the label is a sibling
         text node injected by wireBlockJump(). ::before doesn't work
         on <select>. */
      .block-jump-label {
        display: none;
        padding: var(--space-2) var(--space-3) 0;
        font-family: var(--font-ui);
        font-size: var(--text-xs);
        font-weight: var(--weight-medium);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-text-tertiary);
      }
      @container (max-width: 900px) {
        html[data-nav-label="jump-to"][data-nav-narrow="dropdown"]
          unicode-picker .block-jump-label {
          display: block;
        }
      }

      /* 1b. Block nav — narrow (picker container <900px). Only kicks
         in at narrow widths; wide-mode nav-wide decision applies above. */
      .block-jump {
        display: none;
        margin: 0 var(--space-4) var(--space-2);
        padding: var(--space-2) var(--space-3);
        border: 1px solid var(--color-border-strong);
        border-radius: var(--radius-md);
        background: var(--color-input-bg);
        color: var(--color-text-primary);
        font: inherit;
        font-family: var(--font-ui);
        font-size: var(--text-sm);
      }
      @container (max-width: 900px) {
        html[data-nav-narrow="hidden"] unicode-picker .blocks-nav {
          display: none;
        }
        html[data-nav-narrow="dropdown"] unicode-picker .blocks-nav {
          display: none;
        }
        html[data-nav-narrow="dropdown"] unicode-picker .block-jump {
          display: block;
        }
      }

      /* 2. Cell min width */
      html[data-cell-min="80"]  char-grid { --_col-min: 80px; }
      html[data-cell-min="92"]  char-grid { --_col-min: 92px; }
      html[data-cell-min="104"] char-grid { --_col-min: 104px; }
      html[data-cell-min="118"] char-grid { --_col-min: 118px; }
      html[data-cell-min="140"] char-grid { --_col-min: 140px; }

      /* 3. Name lines (clamp) */
      html[data-name-lines="1"] char-grid .char-name {
        -webkit-line-clamp: 1;
      }
      html[data-name-lines="2"] char-grid .char-name {
        -webkit-line-clamp: 2;
      }
      html[data-name-lines="3"] char-grid .char-name {
        -webkit-line-clamp: 3;
      }

      /* 4. Density — vertical rhythm only (top/bottom padding + gap
         between glyph and name). Horizontal padding is left as the
         real app sets it so the inner content width stays constant
         across density changes — otherwise flipping Default → Airy
         would shrink the name's wrap column and make text wrap sooner
         for a reason that has nothing to do with density. */
      html[data-density="compact"] char-grid .char-cell {
        padding-top: var(--space-2);
        padding-bottom: var(--space-2);
        gap: 2px;
      }
      html[data-density="airy"] char-grid .char-cell {
        padding-top: var(--space-4);
        padding-bottom: var(--space-4);
        gap: var(--space-2);
      }

      /* 4b. Glyph size — controls --text-glyph independently of density. */
      html[data-glyph-size="small"]  char-grid { --text-glyph: 2.25rem; }
      html[data-glyph-size="large"]  char-grid { --text-glyph: 3.25rem; }
      html[data-glyph-size="xlarge"] char-grid { --text-glyph: 3.75rem; }

      /* 5. Section label scale */
      html[data-section-scale="micro"] char-grid .sticky-header,
      html[data-section-scale="micro"] char-grid .section-label {
        font-size: 0.625rem;
        letter-spacing: 0.14em;
      }
      html[data-section-scale="large"] char-grid .sticky-header,
      html[data-section-scale="large"] char-grid .section-label {
        font-size: 1.05rem;
        letter-spacing: 0;
        text-transform: none;
        font-weight: 500;
        height: 40px;
        margin-bottom: -40px;
      }

      /* ═══════════════════════════════════════════════════════════
         FORM phase — surface treatment, grayscale, hierarchy.
         ═══════════════════════════════════════════════════════════ */

      /* 1. Cell border style */
      html[data-cell-border="none"]   char-grid .char-cell { border: 0; }
      html[data-cell-border="dashed"] char-grid .char-cell {
        border-style: dashed;
      }
      html[data-cell-border="double"] char-grid .char-cell {
        border-style: double;
        border-width: 3px;
      }
      html[data-cell-border="heavy"]  char-grid .char-cell {
        border-width: 2px;
        border-color: var(--color-border-strong);
      }

      /* 2. Cell fill at rest */
      html[data-cell-fill="soft-tint"] char-grid .char-cell {
        background: var(--color-bg-surface);
      }
      html[data-cell-fill="glyph-box-only"] char-grid .char-cell {
        background: transparent;
        border: 0;
      }

      /* 3. Glyph background treatment */
      html[data-glyph-bg="none"] char-grid .char-glyph {
        background: transparent;
      }
      html[data-glyph-bg="outlined"] char-grid .char-glyph {
        background: transparent;
        border: 1px solid var(--color-border-subtle);
      }

      /* 4. Selected cell treatment */
      html[data-cell-selected="outlined"]
        char-grid .char-cell[aria-selected="true"] {
        background: transparent;
        outline: 2px solid var(--color-accent);
        outline-offset: -2px;
      }
      html[data-cell-selected="outlined"]
        char-grid .char-cell[aria-selected="true"] .char-glyph {
        background: var(--color-glyph-bg);
      }
      html[data-cell-selected="tinted"]
        char-grid .char-cell[aria-selected="true"] {
        background: var(--color-accent-subtle);
      }
      html[data-cell-selected="underline"]
        char-grid .char-cell[aria-selected="true"] {
        background: transparent;
        box-shadow: inset 0 -3px 0 var(--color-accent);
      }
      html[data-cell-selected="inverted"]
        char-grid .char-cell[aria-selected="true"] {
        background: var(--color-accent);
      }
      html[data-cell-selected="inverted"]
        char-grid .char-cell[aria-selected="true"] .char-glyph {
        color: var(--color-accent-text);
        background:
          color-mix(in oklab,
            var(--color-accent-text) 15%,
            transparent);
      }
      html[data-cell-selected="inverted"]
        char-grid .char-cell[aria-selected="true"] .char-name {
        color: var(--color-accent-text);
      }

      /* 6. Nav active treatment — split into WIDE (sidebar/top-tabs)
         and NARROW (top-strip / dropdown) via @container queries so
         each can be evaluated independently. */
      @container (min-width: 900px) {
        html[data-sidebar-active="filled"]
          unicode-picker .blocks-nav button[aria-current="true"] {
          background: var(--color-accent);
          color: var(--color-accent-text);
        }
        html[data-sidebar-active="underline"]
          unicode-picker .blocks-nav button[aria-current="true"] {
          color: var(--color-accent);
          box-shadow: inset 0 -2px 0 var(--color-accent);
        }
        html[data-sidebar-active="left-bar"]
          unicode-picker .blocks-nav button[aria-current="true"] {
          color: var(--color-accent);
          box-shadow: inset 3px 0 0 var(--color-accent);
        }
        html[data-sidebar-active="inverted"]
          unicode-picker .blocks-nav button[aria-current="true"] {
          background: var(--color-text-primary);
          color: var(--color-bg-base);
        }
      }

      @container (max-width: 900px) {
        /* Top-strip variant: style the active button directly. */
        html[data-nav-active-narrow="filled"]
          unicode-picker .blocks-nav button[aria-current="true"] {
          background: var(--color-accent);
          color: var(--color-accent-text);
        }
        html[data-nav-active-narrow="underline"]
          unicode-picker .blocks-nav button[aria-current="true"] {
          color: var(--color-accent);
          box-shadow: inset 0 -2px 0 var(--color-accent);
        }

        /* Dropdown variant: style the <select> so the current block
           reads as active. */
        html[data-nav-active-narrow="filled"]
          unicode-picker .block-jump {
          border: 2px solid var(--color-accent);
          color: var(--color-accent);
          font-weight: 500;
        }
        html[data-nav-active-narrow="underline"]
          unicode-picker .block-jump {
          border: 0;
          border-bottom: 2px solid var(--color-accent);
          border-radius: 0;
          color: var(--color-accent);
        }
      }

      /* 7. Search divider */
      html[data-search-divider="none"] unicode-picker .search-bar {
        border-bottom: 0;
      }
      html[data-search-divider="double"] unicode-picker .search-bar {
        border-bottom: 3px double var(--color-border-subtle);
      }

      /* 8. Section label role */
      html[data-section-role="serif-title"] char-grid .sticky-header,
      html[data-section-role="serif-title"] char-grid .section-label {
        font-family: "Newsreader", "Fraunces", Georgia, serif;
        text-transform: none;
        letter-spacing: 0;
        font-weight: 500;
        font-size: 1rem;
      }
      html[data-section-role="bold-bar"] char-grid .sticky-header,
      html[data-section-role="bold-bar"] char-grid .section-label {
        background: var(--color-text-primary);
        color: var(--color-bg-base);
        font-weight: 700;
        padding: 0 var(--space-3);
      }
      html[data-section-role="small-caps"] char-grid .sticky-header,
      html[data-section-role="small-caps"] char-grid .section-label {
        text-transform: none;
        font-variant: small-caps;
        letter-spacing: 0.05em;
      }

      /* 9. Section underline */
      html[data-section-underline="none"] char-grid .sticky-header,
      html[data-section-underline="none"] char-grid .section-label {
        border-bottom: 0;
      }
      html[data-section-underline="accent-bar"] char-grid .sticky-header,
      html[data-section-underline="accent-bar"] char-grid .section-label {
        border-bottom: 2px solid var(--color-accent);
      }
      html[data-section-underline="double"] char-grid .sticky-header,
      html[data-section-underline="double"] char-grid .section-label {
        border-bottom: 3px double var(--color-border-subtle);
      }

      /* 10. Glyph weight */
      html[data-glyph-weight="medium"] char-grid .char-glyph {
        font-weight: 500;
      }
      html[data-glyph-weight="bold"] char-grid .char-glyph {
        font-weight: 700;
      }

      /* 11. Search shape */
      html[data-search-shape="pill"] unicode-picker .search-bar input {
        border-radius: 999px;
      }
      html[data-search-shape="square"] unicode-picker .search-bar input {
        border-radius: 0;
      }

      /* ═══════════════════════════════════════════════════════════
         SURFACE phase — fonts + palette presets.
         ═══════════════════════════════════════════════════════════ */

      /* 1. Chrome typeface */
      html[data-chrome-font="ibm-plex-sans"] unicode-picker {
        --font-ui: "IBM Plex Sans", sans-serif;
      }
      html[data-chrome-font="inter"] unicode-picker {
        --font-ui: "Inter", sans-serif;
      }
      html[data-chrome-font="geist-mono"] unicode-picker {
        --font-ui: "Geist Mono", ui-monospace, monospace;
      }
      html[data-chrome-font="system"] unicode-picker {
        --font-ui: -apple-system, system-ui, sans-serif;
      }

      /* 2. Glyph typeface */
      html[data-glyph-font="iowan"] char-grid {
        --font-glyph:
          "Iowan Old Style", "Palatino", Georgia, serif;
      }
      html[data-glyph-font="fraunces"] char-grid {
        --font-glyph: "Fraunces", Georgia, serif;
      }
      html[data-glyph-font="plex-mono"] char-grid {
        --font-glyph: "IBM Plex Mono", ui-monospace, monospace;
      }
      html[data-glyph-font="jetbrains"] char-grid {
        --font-glyph: "JetBrains Mono", ui-monospace, monospace;
      }
      html[data-glyph-font="space-mono"] char-grid {
        --font-glyph: "Space Mono", ui-monospace, monospace;
      }

      /* 3. Scale parameters — four independent axes:
              neutral-hue + neutral-chroma (paper/ink)
              accent-hue  + accent-chroma  (brand accent)

         Every other design decision (step lightnesses, per-step
         chroma, semantic mapping) lives in style.css. Changing
         an axis swaps colors; nothing else moves.

         NOTE: CSS custom properties with var() references
         resolve at the DECLARING element's context, not the
         consumer's. The scales at :root read :root's default
         hue/chroma, so overrides on unicode-picker wouldn't
         propagate. To fix: re-declare the 24 scale tokens on
         unicode-picker here so they substitute against the
         picker-aware hue/chroma, and the semantic tokens (also
         redeclared here) resolve against those. */
      unicode-picker {
        /* Phase 1 — re-derive scales from palette-overridden
           hue/chroma. Per-step chroma multiplier (--step-N-c)
           comes from style.css and doesn't need redeclaring. */
        --neutral-1:   oklch(var(--step-1)  calc(var(--neutral-chroma) * var(--step-1-c))  var(--neutral-hue));
        --neutral-2:   oklch(var(--step-2)  calc(var(--neutral-chroma) * var(--step-2-c))  var(--neutral-hue));
        --neutral-3:   oklch(var(--step-3)  calc(var(--neutral-chroma) * var(--step-3-c))  var(--neutral-hue));
        --neutral-4:   oklch(var(--step-4)  calc(var(--neutral-chroma) * var(--step-4-c))  var(--neutral-hue));
        --neutral-5:   oklch(var(--step-5)  calc(var(--neutral-chroma) * var(--step-5-c))  var(--neutral-hue));
        --neutral-6:   oklch(var(--step-6)  calc(var(--neutral-chroma) * var(--step-6-c))  var(--neutral-hue));
        --neutral-7:   oklch(var(--step-7)  calc(var(--neutral-chroma) * var(--step-7-c))  var(--neutral-hue));
        --neutral-8:   oklch(var(--step-8)  calc(var(--neutral-chroma) * var(--step-8-c))  var(--neutral-hue));
        --neutral-9:   oklch(var(--step-9)  calc(var(--neutral-chroma) * var(--step-9-c))  var(--neutral-hue));
        --neutral-10:  oklch(var(--step-10) calc(var(--neutral-chroma) * var(--step-10-c)) var(--neutral-hue));
        --neutral-11:  oklch(var(--step-11) calc(var(--neutral-chroma) * var(--step-11-c)) var(--neutral-hue));
        --neutral-12:  oklch(var(--step-12) calc(var(--neutral-chroma) * var(--step-12-c)) var(--neutral-hue));

        --accent-1:   oklch(var(--step-1)  calc(var(--accent-chroma) * var(--step-1-c))  var(--accent-hue));
        --accent-2:   oklch(var(--step-2)  calc(var(--accent-chroma) * var(--step-2-c))  var(--accent-hue));
        --accent-3:   oklch(var(--step-3)  calc(var(--accent-chroma) * var(--step-3-c))  var(--accent-hue));
        --accent-4:   oklch(var(--step-4)  calc(var(--accent-chroma) * var(--step-4-c))  var(--accent-hue));
        --accent-5:   oklch(var(--step-5)  calc(var(--accent-chroma) * var(--step-5-c))  var(--accent-hue));
        --accent-6:   oklch(var(--step-6)  calc(var(--accent-chroma) * var(--step-6-c))  var(--accent-hue));
        --accent-7:   oklch(var(--step-7)  calc(var(--accent-chroma) * var(--step-7-c))  var(--accent-hue));
        --accent-8:   oklch(var(--step-8)  calc(var(--accent-chroma) * var(--step-8-c))  var(--accent-hue));
        --accent-9:   oklch(var(--step-9)  calc(var(--accent-chroma) * var(--step-9-c))  var(--accent-hue));
        --accent-10:  oklch(var(--step-10) calc(var(--accent-chroma) * var(--step-10-c)) var(--accent-hue));
        --accent-11:  oklch(var(--step-11) calc(var(--accent-chroma) * var(--step-11-c)) var(--accent-hue));
        --accent-12:  oklch(var(--step-12) calc(var(--accent-chroma) * var(--step-12-c)) var(--accent-hue));

        /* Phase 2 — per-element (scale, step) mapping.
           Each semantic token is `var(--{scale}-{step})`: the
           scale is "which of neutral / accent", the step is
           "contrast level on that scale". Role-* decisions
           below let the harness tweak individual steps at
           runtime. */
        --color-bg-base:        var(--neutral-1);
        --color-bg-raised:      var(--neutral-2);
        --color-bg-surface:     var(--neutral-3);
        --color-bg-hover:       var(--neutral-4);
        --color-input-bg:       var(--neutral-3);
        --color-text-primary:   var(--neutral-12);
        --color-text-secondary: var(--neutral-11);
        --color-text-tertiary:  var(--neutral-9);
        --color-border-subtle:  var(--neutral-5);
        --color-border-strong:  var(--neutral-7);
        --color-accent:         var(--accent-9);
        --color-accent-subtle:  var(--accent-3);
        --color-accent-text:    var(--neutral-1);
        --color-focus:
          color-mix(in oklab,
            var(--color-accent),
            transparent 55%);
        --color-success:        var(--color-accent);
        --color-success-text:   var(--color-accent-text);
        --color-glyph-bg:
          color-mix(in oklab,
            var(--color-text-primary) 12%,
            transparent);
        --color-toggle-track:   var(--neutral-3);
        --color-toggle-thumb:   var(--neutral-9);
        --color-toggle-icon:    var(--neutral-1);
      }

      /* Hue / chroma overrides set on html (the root) so both the
         picker AND the design-harness swatches (which live outside
         unicode-picker) inherit them. The var() lookups inside
         each --neutral-N / --accent-N declaration on unicode-picker
         resolve against the using element's cascade, so root-level
         overrides flow through. */

      /* Same hue set for both scales — the same hue ID maps to
         the same angle on each. Rendered swatches differ because
         neutral uses step-3 L and accent uses step-9 L. */
      html[data-neutral-hue="red"]     { --neutral-hue:  20; }
      html[data-neutral-hue="orange"]  { --neutral-hue:  45; }
      html[data-neutral-hue="yellow"]  { --neutral-hue:  90; }
      html[data-neutral-hue="green"]   { --neutral-hue: 150; }
      html[data-neutral-hue="teal"]    { --neutral-hue: 195; }
      html[data-neutral-hue="blue"]    { --neutral-hue: 250; }
      html[data-neutral-hue="violet"]  { --neutral-hue: 285; }
      html[data-neutral-hue="magenta"] { --neutral-hue: 340; }

      html[data-accent-hue="red"]     { --accent-hue:  20; }
      html[data-accent-hue="orange"]  { --accent-hue:  45; }
      html[data-accent-hue="yellow"]  { --accent-hue:  90; }
      html[data-accent-hue="green"]   { --accent-hue: 150; }
      html[data-accent-hue="teal"]    { --accent-hue: 195; }
      html[data-accent-hue="blue"]    { --accent-hue: 250; }
      html[data-accent-hue="violet"]  { --accent-hue: 285; }
      html[data-accent-hue="magenta"] { --accent-hue: 340; }

      /* Shared chroma labels (none/low/medium/high/vivid), scaled
         per role: neutral tops out low (paper shouldn't scream),
         accent goes much higher. */
      html[data-neutral-chroma="none"]   { --neutral-chroma: 0;     }
      html[data-neutral-chroma="low"]    { --neutral-chroma: 0.004; }
      html[data-neutral-chroma="medium"] { --neutral-chroma: 0.010; }
      html[data-neutral-chroma="high"]   { --neutral-chroma: 0.018; }
      html[data-neutral-chroma="vivid"]  { --neutral-chroma: 0.030; }

      html[data-accent-chroma="none"]   { --accent-chroma: 0;     }
      html[data-accent-chroma="low"]    { --accent-chroma: 0.050; }
      html[data-accent-chroma="medium"] { --accent-chroma: 0.100; }
      html[data-accent-chroma="high"]   { --accent-chroma: 0.140; }
      html[data-accent-chroma="vivid"]  { --accent-chroma: 0.180; }

      /* Phase 2 — per-element contrast controls.
         Each role-* decision re-points one semantic token at a
         different step on its scale. The underlying scale
         (neutral vs accent) is fixed per role to keep the
         surface small; stepping is what expresses "contrast
         level" in the mental model. */
      html[data-role-text-primary="10"]   unicode-picker { --color-text-primary:   var(--neutral-10); }
      html[data-role-text-primary="11"]   unicode-picker { --color-text-primary:   var(--neutral-11); }
      html[data-role-text-primary="12"]   unicode-picker { --color-text-primary:   var(--neutral-12); }

      html[data-role-text-secondary="9"]  unicode-picker { --color-text-secondary: var(--neutral-9);  }
      html[data-role-text-secondary="10"] unicode-picker { --color-text-secondary: var(--neutral-10); }
      html[data-role-text-secondary="11"] unicode-picker { --color-text-secondary: var(--neutral-11); }

      html[data-role-border-subtle="4"]   unicode-picker { --color-border-subtle:  var(--neutral-4);  }
      html[data-role-border-subtle="5"]   unicode-picker { --color-border-subtle:  var(--neutral-5);  }
      html[data-role-border-subtle="6"]   unicode-picker { --color-border-subtle:  var(--neutral-6);  }

      html[data-role-accent="8"]          unicode-picker { --color-accent:         var(--accent-8);   }
      html[data-role-accent="9"]          unicode-picker { --color-accent:         var(--accent-9);   }
      html[data-role-accent="10"]         unicode-picker { --color-accent:         var(--accent-10);  }

      html[data-role-surface="2"]         unicode-picker { --color-bg-surface:     var(--neutral-2);
                                                           --color-input-bg:       var(--neutral-2); }
      html[data-role-surface="3"]         unicode-picker { --color-bg-surface:     var(--neutral-3);
                                                           --color-input-bg:       var(--neutral-3); }
      html[data-role-surface="4"]         unicode-picker { --color-bg-surface:     var(--neutral-4);
                                                           --color-input-bg:       var(--neutral-4); }
    </style>
  </head>

  <body>

    <!-- Real app templates (unchanged). char-grid, copy-toast,
         and unicode-picker all read these. -->
    <template id="char-cell-template">
      <div class="char-cell">
        <span class="char-glyph"></span>

    <!-- ════════════════════════════════════════════════════════════

    <!-- ════════════════════════════════════════════════════════════
         Harness wiring — decisions, state, persistence, UI.
         ════════════════════════════════════════════════════════════ -->
    <script type="module">
      const html = document.documentElement;

      /* --- Decision model ---------------------------------------- */
      const STEPS = [
        { id: "structure", label: "Structure",
          sub: "Arrangement · sizing · density" },
        { id: "form",      label: "Form",
          sub: "Shape · hierarchy · interactive states" },

          sub: "Fonts · palette · accent" },

      const DECISIONS = [
        /* ─ Structure ─ */
        { id: "nav-wide", step: "structure", label: "Block nav (wide)",
          options: [

            ["default", "Default", { preferred: true }],

          ],
          default: "default" },
        { id: "glyph-size", step: "structure", label: "Glyph size",
          options: [
            ["small",   "Small"],
            ["default", "Default", { preferred: true }],
            ["large",   "Large"],
            ["xlarge",  "X-Large"],
          ],
          default: "default" },
        { id: "section-scale", step: "structure",
          label: "Section label scale",
          options: [
            ["micro",    "Micro"],
            ["standard", "Standard", { preferred: true }],
            ["large",    "Large"],

          default: "standard" },

        /* ─ Form ─ */

        { id: "glyph-bg", step: "form", label: "Glyph background",

        { id: "cell-selected", step: "form", label: "Selected tile",

            ["underline", "Underline"],

        { id: "search-shape", step: "form", label: "Search shape",

        /* ─ Surface ─ */
        { id: "chrome-font", step: "surface", label: "Chrome typeface",
          options: [
            ["plex-mono",     "Plex Mono"],
            ["ibm-plex-sans", "Plex Sans"],
            ["inter",         "Inter"],
            ["geist-mono",    "Geist Mono"],
            ["system",        "System"],
          ],
          default: "plex-mono" },
        { id: "glyph-font", step: "surface", label: "Glyph typeface",
          options: [
            ["noto",      "Noto"],
            ["iowan",     "Iowan"],
            ["fraunces",  "Fraunces"],
            ["plex-mono", "Plex Mono"],
            ["jetbrains", "JetBrains"],
            ["space-mono","Space Mono"],
          ],
          default: "noto" },
        /* Shared hue set — same 8 IDs for neutral and accent,
           so the two scales can rhyme. Per-swatch chroma (c) is
           tuned for perceptual visibility at the swatch's
           render step, not tied to the user's chroma decision. */
        { id: "neutral-hue", step: "surface", label: "Neutral hue",
          help: "Paper / ink scale hue.",
          kind: "swatch-palette",
          options: [
            ["red",     "Red",     { role: "neutral", h:  20, c: 0.030 }],
            ["orange",  "Orange",  { role: "neutral", h:  45, c: 0.030 }],
            ["yellow",  "Yellow",  { role: "neutral", h:  90, c: 0.030 }],
            ["green",   "Green",   { role: "neutral", h: 150, c: 0.030 }],
            ["teal",    "Teal",    { role: "neutral", h: 195, c: 0.030 }],
            ["blue",    "Blue",    { role: "neutral", h: 250, c: 0.030 }],
            ["violet",  "Violet",  { role: "neutral", h: 285, c: 0.030 }],
            ["magenta", "Magenta", { role: "neutral", h: 340, c: 0.030 }],
          ],
          default: "yellow" },
        { id: "neutral-chroma", step: "surface", label: "Neutral chroma",
          help: "How tinted the paper reads. Hue follows the selected neutral hue.",
          kind: "swatch-palette",
          options: [
            ["none",   "None",   { role: "neutral", c: 0 }],
            ["low",    "Low",    { role: "neutral", c: 0.004 }, { preferred: true }],
            ["medium", "Medium", { role: "neutral", c: 0.010 }],
            ["high",   "High",   { role: "neutral", c: 0.018 }],
            ["vivid",  "Vivid",  { role: "neutral", c: 0.030 }],
          ],
          default: "low" },
        { id: "accent-hue", step: "surface", label: "Accent hue",
          help: "Brand accent scale hue.",
          kind: "swatch-palette",
          options: [
            ["red",     "Red",     { role: "accent", h:  20, c: 0.13 }],
            ["orange",  "Orange",  { role: "accent", h:  45, c: 0.13 }],
            ["yellow",  "Yellow",  { role: "accent", h:  90, c: 0.12 }],
            ["green",   "Green",   { role: "accent", h: 150, c: 0.12 }],
            ["teal",    "Teal",    { role: "accent", h: 195, c: 0.10 }],
            ["blue",    "Blue",    { role: "accent", h: 250, c: 0.14 }],
            ["violet",  "Violet",  { role: "accent", h: 285, c: 0.14 }],
            ["magenta", "Magenta", { role: "accent", h: 340, c: 0.13 }],
          ],
          default: "green" },
        { id: "accent-chroma", step: "surface", label: "Accent chroma",
          help: "How saturated the accent reads. Hue follows the selected accent hue.",
          kind: "swatch-palette",
          options: [
            ["none",   "None",   { role: "accent", c: 0 }],
            ["low",    "Low",    { role: "accent", c: 0.050 }],
            ["medium", "Medium", { role: "accent", c: 0.100 }, { preferred: true }],
            ["high",   "High",   { role: "accent", c: 0.140 }],
            ["vivid",  "Vivid",  { role: "accent", c: 0.180 }],
          ],
          default: "medium" },

        /* ─ Roles (per-element contrast on chosen scale) ─
           Each decision re-points one semantic token at a
           different step of its scale. "Step" IS the contrast
           level — how far from step 1 (surface) the element
           sits. Chroma follows lightness automatically via the
           per-step multiplier in style.css, so lower-contrast
           steps read calmer. */
        { id: "role-surface", step: "surface", label: "Surface contrast",
          help: "Step of neutral scale used for cards/inputs (bg-surface / input-bg).",
          options: [
            ["2", "2"],
            ["3", "3", { preferred: true }],
            ["4", "4"],
          ],
          default: "3" },
        { id: "role-border-subtle", step: "surface", label: "Subtle border",
          help: "Step of neutral scale used for hairline dividers.",
          options: [
            ["4", "4"],
            ["5", "5", { preferred: true }],
            ["6", "6"],
          ],
          default: "5" },
        { id: "role-text-primary", step: "surface", label: "Primary text",
          help: "Step of neutral scale used for body text.",
          options: [
            ["10", "10"],
            ["11", "11"],
            ["12", "12", { preferred: true }],
          ],
          default: "12" },
        { id: "role-text-secondary", step: "surface", label: "Secondary text",
          help: "Step of neutral scale used for labels / meta.",
          options: [
            ["9",  "9"],
            ["10", "10"],
            ["11", "11", { preferred: true }],
          ],
          default: "11" },
        { id: "role-accent", step: "surface", label: "Accent strength",
          help: "Step of accent scale used for solid accent surfaces.",
          options: [
            ["8",  "8"],
            ["9",  "9", { preferred: true }],
            ["10", "10"],
          ],
          default: "9" },
      ];

      /* --- State ------------------------------------------------- */
      const STATE_KEY = "unicode-picker:design-decisions";
      const STEP_KEY = "unicode-picker:design-step";
      const GRAYSCALE_KEY = "unicode-picker:design-grayscale";

      /* The "preferred" value is whichever option is flagged
         { preferred: true }. It's the default that loads on first
         visit (and after Reset), but localStorage still wins if the
         user has been flipping values around. */
      function preferredValue(d) {
        const pref = d.options.find(o => o[2]?.preferred);
        return pref ? pref[0] : d.default;
      }

      const state = (() => {
        let saved;
        try { saved = JSON.parse(localStorage.getItem(STATE_KEY) || "{}"); }
        catch (e) { saved = {}; }
        const defaults = Object.fromEntries(
          DECISIONS.map(d => [d.id, preferredValue(d)]),
        );
        return { ...defaults, ...saved };
      })();
      let currentStep =
        localStorage.getItem(STEP_KEY) || "structure";
      let grayscale = localStorage.getItem(GRAYSCALE_KEY) === "on";

      /* --- Sync state → DOM attributes --------------------------- */
      function apply() {
        for (const d of DECISIONS) {
          const v = state[d.id];
          if (v == null || v === "inherit") {
            html.removeAttribute(`data-${d.id}`);
          } else {
            html.setAttribute(`data-${d.id}`, v);
          }
        }
        html.setAttribute("data-step", currentStep);
        html.setAttribute(
          "data-grayscale", grayscale ? "on" : "off",
        );
      }

      function save() {
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
        localStorage.setItem(STEP_KEY, currentStep);
        localStorage.setItem(GRAYSCALE_KEY, grayscale ? "on" : "off");
      }

      /* --- Render step tabs ------------------------------------- */
      const stepTabsEl = document.getElementById("step-tabs");
      function renderTabs() {
        stepTabsEl.innerHTML = STEPS.map((s, i) => `
          <button class="step-tab"
                  data-step="${s.id}"
                  aria-current="${s.id === currentStep}">
            <span class="step-tab__num">
              ${String(i + 1).padStart(2, "0")}
            </span>
            <span class="step-tab__label">${s.label}</span>
            <span class="step-tab__sub">${s.sub}</span>
          </button>
        `).join("");
      }
      stepTabsEl.addEventListener("click", (e) => {
        const btn = e.target.closest(".step-tab");
        if (!btn) return;
        currentStep = btn.dataset.step;
        save(); apply(); renderTabs(); renderControls(); renderSub();
      });

      /* --- Render controls for the active step ------------------ */
      const controlBarEl = document.getElementById("control-bar");
      function renderControls() {
        const decisions = DECISIONS
          .filter(d => d.step === currentStep);
        controlBarEl.innerHTML = decisions.map(d => renderControl(d))
          .join("");
      }

      function renderControl(d) {
        if (d.kind === "swatch-palette" || d.kind === "swatch-accent") {
          return `
            <div class="control" data-decision="${d.id}">
              <span class="control__label">${d.label}</span>
              <div class="swatches">
                ${d.options.map(opt => {
                  const [val, lbl, spec] = opt;
                  const meta = opt[3] || {};
                  const pressed = state[d.id] === val;
                  const cls = [
                    "swatch",
                    meta.preferred ? "is-preferred" : "",
                    meta.rejected ? "is-rejected" : "",
                  ].filter(Boolean).join(" ");
                  const title = [
                    lbl,
                    meta.preferred ? "(preferred)" : "",
                    meta.rejected
                      ? `(rejected${meta.reason ? ": " + meta.reason : ""})`
                      : "",
                  ].filter(Boolean).join(" ");
                  /* spec is either { role, h?, c? } (theme-aware,
                     uses --step-3 or --step-9 for L; omitted h
                     falls back to the scale's live hue via the
                     CSS custom-property fallback) or a raw
                     color string (fallback for legacy options). */
                  let dataRole = "";
                  let style = "";
                  if (spec && typeof spec === "object") {
                    dataRole = ` data-role="${spec.role}"`;
                    const parts = [];
                    if (spec.h != null) parts.push(`--sw-h:${spec.h}`);
                    if (spec.c != null) parts.push(`--sw-c:${spec.c}`);
                    style = parts.join(";") + (parts.length ? ";" : "");
                  } else if (spec) {
                    style = `background:${spec};`;
                  } else {
                    style = "background:repeating-linear-gradient(45deg,#ddd 0 4px,#fff 4px 8px);";
                  }
                  return `
                    <button class="${cls}"
                            data-value="${val}"
                            aria-pressed="${pressed}"
                            title="${title}"${dataRole}
                            style="${style}"></button>
                  `;
                }).join("")}
              </div>
            </div>
          `;
        }
        return `
          <div class="control" data-decision="${d.id}">
            <span class="control__label">${d.label}</span>
            <div class="seg">
              ${d.options.map(opt => {
                const [val, lbl] = opt;
                const meta = opt[2] || {};
                const cls = [
                  meta.preferred ? "is-preferred" : "",
                  meta.rejected ? "is-rejected" : "",
                ].filter(Boolean).join(" ");
                const title = [
                  meta.preferred ? "Preferred" : "",
                  meta.rejected
                    ? `Rejected${meta.reason ? ": " + meta.reason : ""}`
                    : "",
                ].filter(Boolean).join(" ");
                return `
                  <button data-value="${val}"
                          class="${cls}"
                          aria-pressed="${state[d.id] === val}"
                          title="${title}">
                    ${lbl}
                  </button>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }
      controlBarEl.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-value]");
        if (!btn) return;
        const decisionEl = btn.closest("[data-decision]");
        const id = decisionEl.dataset.decision;
        state[id] = btn.dataset.value;
        save(); apply(); renderControls();
      });

      /* --- Viewer bar (grayscale, width, theme, reset) ---------- */
      const grayBtn = document.getElementById("grayscale-btn");
      grayBtn.addEventListener("click", () => {
        grayscale = !grayscale;
        grayBtn.setAttribute(
          "aria-pressed", grayscale ? "true" : "false",
        );
        save(); apply();
      });

      document.querySelectorAll('[data-width]').forEach(btn => {
        btn.addEventListener("click", () => {
          const w = btn.dataset.width;
          html.setAttribute("data-preview-width", w);
          document.querySelectorAll('[data-width]').forEach(b =>
            b.setAttribute(
              "aria-pressed", b === btn ? "true" : "false",
            ),
          );
        });
      });

      document.getElementById("reset-btn").addEventListener("click", () => {
        for (const d of DECISIONS) state[d.id] = preferredValue(d);
        grayscale = false;
        grayBtn.setAttribute("aria-pressed", "false");
        save(); apply(); renderControls();
      });

      function renderSub() {
        const s = STEPS.find(s => s.id === currentStep);
        document.getElementById("viewer-sub").textContent =
          s ? `Phase ${STEPS.indexOf(s) + 1} · ${s.sub}` : "";
      }

      /* --- Block-nav dropdown (nav-narrow="dropdown") -----------
         Injects a native <select> right before the blocks-nav,
         populated from the same block buttons. Changing the select
         triggers a click on the matching button so the real scroll-
         into-view logic in the picker takes over. Kept in sync via
         MutationObserver on the nav. */
      function wireBlockJump() {
        const picker = document.querySelector("unicode-picker");
        if (!picker) return;
        const nav = picker.querySelector(".blocks-nav");
        if (!nav) return;

        const label = document.createElement("span");
        label.className = "block-jump-label";
        label.textContent = "Jump to";
        nav.parentNode.insertBefore(label, nav);

        const select = document.createElement("select");
        select.className = "block-jump";
        select.setAttribute("aria-label", "Jump to Unicode block");
        nav.parentNode.insertBefore(select, nav);

        let syncing = false;
        const sync = () => {
          const buttons = Array.from(
            nav.querySelectorAll("button")).filter(
            b => !b.disabled && b.offsetParent !== null
          );
          // Rebuild options (block list may change with search filter)
          const cur = buttons.find(
            b => b.getAttribute("aria-current") === "true");
          const curLabel = cur?.textContent.trim() || "";
          const opts = buttons.map(b => {
            const lbl = b.textContent.trim();
            return `<option ${
              lbl === curLabel ? "selected" : ""
            }>${lbl}</option>`;
          }).join("");
          syncing = true;
          select.innerHTML = opts;
          syncing = false;
        };

        // Initial + on change
        sync();
        const mo = new MutationObserver(() => sync());
        mo.observe(nav, {
          childList: true, subtree: true,
          attributes: true, attributeFilter: ["aria-current"],
        });

        select.addEventListener("change", () => {
          if (syncing) return;
          const wanted = select.value;
          const buttons = Array.from(nav.querySelectorAll("button"));
          const match = buttons.find(
            b => b.textContent.trim() === wanted);
          if (match) match.click();
        });
      }

      /* --- Boot ------------------------------------------------- */
      grayBtn.setAttribute(
        "aria-pressed", grayscale ? "true" : "false",
      );
      apply();
      renderTabs();
      renderControls();
      renderSub();

      // Wait for the picker's blocks-nav to populate (it happens
      // async after the TSV data loads), then wire the dropdown.
      const waitForNav = () => {
        const nav = document.querySelector("unicode-picker .blocks-nav");
        if (nav && nav.querySelector("button")) {
          wireBlockJump();
        } else {
          setTimeout(waitForNav, 80);
        }
      };
      waitForNav();
    </script>
  </body>
</html>
