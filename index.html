<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unicode Picker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="./noto-fonts.css" />
    <link rel="stylesheet" href="./style.css" />
    <script>
      // Apply saved theme before first paint to prevent FOUC
      (function () {
        var saved = localStorage.getItem("unicode-picker-theme");
        var theme = saved
          || (matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    
    <template id="char-cell-template">
      <div class="char-cell">
        <span class="char-glyph"></span>
        <span class="char-name"></span>
      </div>
    </template>
    
    <template id="char-grid-empty-template">
      <div class="empty"></div>
    </template>
    
    <template id="char-grid-template">
      <div class="scroll-container">
        <div class="sticky-header"></div>
        <div class="scroll-spacer">
          <div class="grid"></div>
        </div>
      </div>
    </template>
    
    <template id="unicode-picker-template">
      <div class="search-bar">
        <div class="search-row">
        <div class="input-wrapper">
          <input
            type="text"
            placeholder="Search Unicode characters…"
            autofocus
          />
          <button type="button" class="clear-btn" disabled aria-label="Clear search">
            <svg
              aria-hidden="true"
              focusable="false"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <label class="theme-toggle" title="Toggle light/dark mode">
          <input
            type="checkbox"
            role="switch"
            aria-label="Dark mode"
          />
          <span class="toggle-track">
            <span class="toggle-thumb">
              <svg class="icon-sun" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4" />
                <line x1="12" y1="2" x2="12" y2="4" />
                <line x1="12" y1="20" x2="12" y2="22" />
                <line x1="4.93" y1="4.93" x2="6.34" y2="6.34" />
                <line x1="17.66" y1="17.66" x2="19.07" y2="19.07" />
                <line x1="2" y1="12" x2="4" y2="12" />
                <line x1="20" y1="12" x2="22" y2="12" />
                <line x1="4.93" y1="19.07" x2="6.34" y2="17.66" />
                <line x1="17.66" y1="6.34" x2="19.07" y2="4.93" />
              </svg>
              <svg class="icon-moon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </span>
          </span>
        </label>
        </div>
        <div class="status">Loading…</div>
      </div>
      <div class="main">
        <nav class="blocks-nav" role="listbox" aria-label="Unicode blocks"></nav>
        <div class="results">
          <char-grid></char-grid>
        </div>
      </div>
      <copy-toast></copy-toast>
    </template>
    
    <unicode-picker></unicode-picker>
    <script type="module" src="./components/unicode-picker.js"></script>
  </body>
</html>
