<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unicode Picker</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <template id="copy-toast-template">
      <style>
        :host {
          position: fixed;
          bottom: 24px;
          left: 50%;
          z-index: 10;
          padding: 10px 24px;
          border-radius: 8px;
          font-size: 14px;
          font-weight: 500;
          color: #fff;
          background: #4a9;
          transform: translateX(-50%) translateY(100px);
          transition: transform 0.2s ease;
          pointer-events: none;
        }
        
        :host(.visible) {
          transform: translateX(-50%) translateY(0);
        }
      </style>
      <slot></slot>
    </template>
    
    <template id="char-cell-template">
      <div class="char-cell">
        <span class="char-glyph"></span>
        <span class="char-name"></span>
      </div>
    </template>
    
    <template id="char-grid-empty-template">
      <div class="empty"></div>
    </template>
    
    <template id="char-grid-label-template">
      <div class="section-label"></div>
    </template>
    
    <template id="char-grid-template">
      <style>
        :host {
          display: block;
        }
        
        .grid {
          display: grid;
          grid-template-columns:
            repeat(auto-fill, minmax(104px, 1fr));
          gap: 4px;
        }
        
        .char-cell {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 8px 4px;
          border-radius: 8px;
          gap: 4px;
          overflow: hidden;
          cursor: pointer;
        }
        
        .char-cell:hover,
        .char-cell.selected {
          background: #2a2a2a;
        }
        
        .char-cell.selected {
          background: #333;
          outline: 1px solid #555;
        }
        
        .char-glyph {
          font-family:
            "Apple Symbols",
            "Noto Sans Symbols 2",
            "Noto Sans Symbols",
            "Noto Sans",
            "Segoe UI Symbol",
            "Arial Unicode MS",
            system-ui,
            sans-serif;
          font-size: 48px;
          line-height: 1.2;
        }
        
        .char-name {
          display: -webkit-box;
          -webkit-box-orient: vertical;
          -webkit-line-clamp: 2;
          max-width: 100%;
          overflow: hidden;
          font-size: 11px;
          line-height: 1.2;
          text-align: center;
          text-overflow: ellipsis;
          word-break: break-word;
          color: #888;
        }
        
        .empty {
          padding: 48px;
          font-size: 16px;
          text-align: center;
          color: #666;
        }
        
        .section-label {
          padding: 8px 4px;
          font-size: 11px;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          color: #666;
        }
      </style>
    </template>
    
    <template id="unicode-picker-template">
      <style>
        *, *::before, *::after {
          box-sizing: border-box;
        }
        
        :host {
          display: flex;
          flex-direction: column;
          height: 100vh;
          overflow: hidden;
        }
        
        .search-bar {
          flex-shrink: 0;
          padding: 16px;
          border-bottom: 1px solid #333;
          background: #222;
        }
        
        .search-bar input {
          width: 100%;
          padding: 12px 16px;
          border: 1px solid #444;
          border-radius: 8px;
          font-size: 18px;
          color: #fff;
          background: #2a2a2a;
          outline: none;
        }
        
        .search-bar input:focus {
          border-color: #6a9fff;
          box-shadow:
            0 0 0 2px rgba(106, 159, 255, 0.25);
        }
        
        .search-bar input::placeholder {
          color: #666;
        }
        
        .status {
          flex-shrink: 0;
          padding: 8px 16px;
          font-size: 12px;
          color: #888;
          background: #222;
        }
        
        .results {
          flex: 1;
          padding: 12px;
          overflow-y: auto;
        }
      </style>
      <div class="search-bar">
        <input
          type="text"
          placeholder="Search Unicode characters…"
          autofocus
        />
      </div>
      <div class="status">Loading…</div>
      <div class="results">
        <char-grid></char-grid>
      </div>
      <copy-toast></copy-toast>
    </template>
    
    <unicode-picker></unicode-picker>
    <script type="module" src="./components/unicode-picker.js"></script>
  </body>
</html>
