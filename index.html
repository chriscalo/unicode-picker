<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unicode Picker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="./noto-fonts.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    
    <template id="char-cell-template">
      <div class="char-cell">
        <span class="char-glyph"></span>
        <span class="char-name"></span>
      </div>
    </template>
    
    <template id="char-grid-empty-template">
      <div class="empty"></div>
    </template>
    
    <template id="char-grid-template">
      <div class="scroll-container">
        <div class="sticky-header"></div>
        <div class="scroll-spacer">
          <div class="grid"></div>
        </div>
      </div>
    </template>
    
    <template id="unicode-picker-template">
      <div class="search-bar">
        <div class="input-wrapper">
          <input
            type="text"
            placeholder="Search Unicode characters…"
            autofocus
          />
          <button type="button" class="clear-btn" disabled aria-label="Clear search">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="status">Loading…</div>
      </div>
      <div class="main">
        <nav class="blocks-nav" role="listbox" aria-label="Unicode blocks"></nav>
        <div class="results">
          <char-grid></char-grid>
        </div>
      </div>
      <copy-toast></copy-toast>
    </template>
    
    <unicode-picker></unicode-picker>
    <script type="module" src="./components/unicode-picker.js"></script>
  </body>
</html>
